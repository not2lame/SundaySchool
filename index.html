    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "He Will Swallow Up Death in Victory",
            dateRange: "March 30 – April 5, 2026",
            valediction: "Rejoice in Jesus Christ’s glorious Resurrection and infinite Atonement. Through His victory over sin and death, He offers us redemption, healing, and the certain promise of eternal life and joy."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Mar 30', title: 'The Universal Gift of Resurrection 🌅', text: 'The Atonement of Jesus Christ connects all of God\'s children across time. While the Fall of Adam brought physical death to everyone, the Savior’s victory over the grave ensures that the gift of resurrection is equally universal. As the Apostle Paul taught, \'in Christ shall all be made alive.\' It is the ultimate assurance that physical death is not the end for anyone, but merely a step in our eternal journey.', prompt: 'Reflection: How does knowing that every person will receive the free gift of resurrection change the way you view the Savior\'s universal, unconditional love?', scriptureRef: '1 Corinthians 15:22', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/15?lang=eng&id=p22', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Mar 31', title: 'A Sure Foundation of Witnesses 📜', text: 'We are blessed to have ancient scriptures and modern prophets testifying of Jesus Christ. Isaiah anciently prophesied that the Savior would \'bear our griefs, and carry our sorrows.\' Today, living apostles continue to bear special witness that Jesus Christ is the resurrected Son of God. Elder S. Mark Palmer promised that as we listen to their testimonies, the Spirit will confirm their truth to our minds and hearts.', prompt: 'Challenge: As you listen to general conference this week, listen specifically for the apostles\' testimonies of the Savior and write down how their words make you feel.', scriptureRef: 'Isaiah 53:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/isa/53?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Apr 1', title: 'Peace, Not as the World Giveth 🕊️', text: 'Easter is a season of profound joy, but mortality still brings heavy trials. Elder Jeffrey R. Holland taught that the Savior offers us a unique peace—\'not as the world giveth.\' Worldly peace often relies on having a perfect bank account or a life free of conflict. But the Savior\'s peace provides an internal, eternal stillness that sustains us even in the middle of our most severe personal storms.', prompt: 'Reflection: Where in your life are you currently relying on worldly peace, and how can you seek the Savior\'s true, lasting peace instead?', scriptureRef: 'John 14:27', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/14?lang=eng&id=p27', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Apr 2', title: 'He Knows Perfectly How to Help ❤️‍🩹', text: 'The Savior didn\'t just suffer for our sins; He chose to experience our physical pains, sicknesses, and emotional heartbreaks \'according to the flesh.\' Elder Ulisses Soares taught that Christ is our ultimate spiritual Caregiver. Because He has felt exactly what we feel, He knows perfectly how to \'succor\' us—to run to our aid with perfect empathy and strength when we are weak.', prompt: 'Challenge: Pray today with the specific knowledge that Jesus Christ perfectly understands your current exhaustion, sorrow, or temptation. Allow Him to succor you.', scriptureRef: 'Alma 7:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/alma/7?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Apr 3', title: 'The Ultimate Price Paid for You 🩸', text: 'Doctrine and Covenants 19 is incredibly sacred because it is the Savior\'s first-person account of His suffering. He describes the agony as so severe that it caused Him, the \'greatest of all,\' to tremble and bleed from every pore. He endured this incomprehensible price out of boundless love, so that we would not have to suffer the full weight of our mistakes if we choose to repent.', prompt: 'Reflection: What feelings arise when you deeply ponder the specific, agonizing price Jesus Christ willingly paid for your personal salvation?', scriptureRef: 'Doctrine and Covenants 19:16-19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/19?lang=eng&id=p16-19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Apr 4', title: 'The Grave Has No Victory 🌷', text: 'Losing a loved one brings some of mortality\'s deepest sorrows. But as Sister Reyna I. Aburto testified, the Resurrection of Jesus Christ ensures that broken hearts can be healed and distress can become hope. Because He broke the bands of death, \'the grave hath no victory.\' Our deceased loved ones are alive in the spirit world, and we will absolutely see them again.', prompt: 'Challenge: Think of a loved one who has passed away. Take a moment today to thank Heavenly Father for the reality of the Resurrection that makes a future reunion possible.', scriptureRef: 'Mosiah 16:7-8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/mosiah/16?lang=eng&id=p7-8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Apr 5', title: 'Swallowing Up Death in Victory ✨', text: 'Today we celebrate the most majestic victory in human history: Jesus Christ\'s triumph over sin and death! Elder Ahmad S. Corbitt reminded us that without a Savior, we would face two insurmountable obstacles: physical death and separation from God. But Jesus Christ suffered, died, and rose again to swallow up death in victory. He is our ultimate Deliverer!', prompt: 'Reflection: As you watch General Conference today, ponder the profound joy of the empty tomb. How does the reality of the living Christ change your daily life?', scriptureRef: 'Isaiah 25:8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/isa/25?lang=eng&id=p8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' }
        ];

        const YM_DATA = [
            { id: 'monday', day: 'Mon', date: 'Mar 30', title: 'The Ultimate Reset Button 🎮', text: 'Because of the Fall of Adam, physical death became a universal problem for everyone. But the Apostle Paul taught that \'in Christ shall all be made alive.\' The Savior\'s Resurrection is the ultimate reset button on physical death! Because of His victory over the grave, every single person gets the free gift of immortality, regardless of their mistakes.', prompt: 'Reflection: Think about how massive God’s love must be to offer the gift of resurrection to every single person. How does that universal love change the way you view the people around you today?', scriptureRef: '1 Corinthians 15:22', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/15?lang=eng&id=p22', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 31', title: 'He Stepped Up 🛡️', text: 'We all mess up, and justice demands a penalty for our sins that we can\'t pay on our own. But Jesus Christ stepped up to pay the ultimate price. He described His suffering as so intense that it caused Him to tremble and bleed from every pore. He willingly took that agonizing hit out of pure love, so we wouldn\'t have to suffer if we choose to repent.', prompt: 'Challenge: Don\'t let the Savior\'s sacrifice go to waste by hiding your mistakes. Take a moment tonight to pray, repent, and thank Him for buying your forgiveness.', scriptureRef: 'Doctrine and Covenants 19:16-19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/19?lang=eng&id=p16-19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 1', title: 'He Actually Gets It 💯', text: 'Sometimes it feels like nobody understands the pressure you are under—whether it’s stress from school, sports, or trying to fit in. But Jesus didn\'t just suffer for our sins; He also chose to experience our exact pains, sicknesses, and temptations. Elder Ulisses Soares taught that Christ is our ultimate spiritual Caregiver. He perfectly knows how to run to your aid because He has felt exactly what we feel.', prompt: 'Reflection: What is a specific stress or temptation you are facing right now? Talk to the Savior about it today, knowing you are speaking to someone who truly understands.', scriptureRef: 'Alma 7:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/alma/7?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 2', title: 'Worldly Hype vs. True Peace ✌️', text: 'The world tries to tell us that peace comes from having the best stuff, zero problems, or a ton of followers. But the Savior offers us peace \'not as the world giveth.\' Elder Jeffrey R. Holland taught that the Savior\'s peace is an internal strength that keeps you calm and confident even when life is completely chaotic. It’s a peace that outlasts the temporary hype of the world.', prompt: 'Challenge: Unplug for just five minutes today. Put your phone in another room, read a few verses of scripture, and focus on feeling the Savior’s lasting peace.', scriptureRef: 'John 14:27', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/14?lang=eng&id=p27', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 3', title: 'Witnesses You Can Trust 🎤', text: 'Ancient prophets like Isaiah testified centuries in advance that the Savior would bear our griefs and carry our sorrows. Today, we have living apostles who do the exact same thing! Elder S. Mark Palmer promised that if we listen to the testimonies of modern apostles with real intent, the Holy Ghost will confirm to our minds and hearts that Jesus Christ truly lives.', prompt: 'Reflection: As you listen to general conference this weekend, pay close attention when the prophet and apostles testify of Jesus Christ. How does hearing their sure witness strengthen your own?', scriptureRef: 'Isaiah 53:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/isa/53?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 4', title: 'The Ultimate Comeback 🏆', text: 'Losing someone you love is incredibly hard, but the Easter story is the ultimate comeback story! Sister Reyna I. Aburto taught that because of Christ’s Resurrection, the grave has no victory and death has no permanent sting. It is just a temporary separation. We are guaranteed to see our loved ones again because the Savior completely conquered the grave.', prompt: 'Challenge: Think of a family member or hero who has passed away. Take a moment to thank Heavenly Father that because of Jesus Christ, you will get to see them again.', scriptureRef: 'Mosiah 16:7-8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/mosiah/16?lang=eng&id=p7-8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 5', title: 'Swallowing Up Death in Victory 🌅', text: 'Happy Easter! Today we celebrate the greatest victory in history. Elder Ahmad S. Corbitt taught that we face two massive obstacles in this life: physical death and spiritual death (sin). We are completely powerless to beat them on our own. But Jesus Christ suffered, died, and rose again to completely swallow up death in victory and save us from both! He is our ultimate Deliverer.', prompt: 'Reflection: As you watch General Conference today, think about the empty tomb and the victory of the Savior. How does knowing He won the ultimate battle give you courage for the week ahead?', scriptureRef: 'Isaiah 25:8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/isa/25?lang=eng&id=p8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Mar 30', title: 'The Ultimate Reset Button 🌷', text: 'We all know the sadness of losing a loved one, or the fear of what happens after we die. But 1 Corinthians 15:22 promises that because of Jesus Christ, *everyone* will live again! He hit the ultimate \'reset button\' on physical death, giving every single one of us the free gift of immortality. We are all forever connected by His incredible, universal love.', prompt: 'Reflection: Who are you most excited to see again someday in the next life? Take a moment to thank Heavenly Father for the gift of the Resurrection that makes it possible.', scriptureRef: '1 Corinthians 15:22', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/15?lang=eng&id=p22', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 31', title: 'The True Influencers 📱✨', text: 'It’s easy to follow influencers online, but modern prophets and apostles are the ultimate guides because they point us straight to Jesus Christ! Elder S. Mark Palmer promised that when we listen to apostles testify of the Savior, the Holy Ghost will confirm it right to our hearts. Their sure witness provides a total anchor of hope when the world feels chaotic.', prompt: 'Challenge: During General Conference this weekend, listen closely for a quote about Jesus Christ that stands out to you. Write it in your journal or put it on a sticky note on your mirror!', scriptureRef: 'Isaiah 53:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/isa/53?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 1', title: 'Real Peace vs. Fake Peace ✌️', text: 'The world tries to tell us that peace comes from having the perfect aesthetic, zero drama, or lots of likes. But Jesus offers real peace—\'not as the world giveth.\' Elder Jeffrey R. Holland taught that the Savior\'s peace is an inner stillness that keeps you calm, confident, and grounded, even when your life feels like a massive storm.', prompt: 'Reflection: What is one thing making you anxious right now? Take three deep breaths and ask the Savior to replace that anxiety with His lasting peace today.', scriptureRef: 'John 14:27', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/14?lang=eng&id=p27', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 2', title: 'He Actually Gets It 💖', text: 'Do you ever feel like literally *no one* understands what you are going through? Jesus does. He didn\'t just suffer for our sins; He also chose to feel all our physical pains, sicknesses, and emotional heartbreak. He knows exactly how to comfort and help you because He has walked in your exact shoes and felt your exact sorrow.', prompt: 'Challenge: Talk to the Savior today in prayer about something you usually hide from others, knowing you are speaking to someone who perfectly understands you and will not judge you.', scriptureRef: 'Alma 7:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/alma/7?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 3', title: 'Unimaginable Love ❤️‍🩹', text: 'The Savior paid an unimaginable price for us. In Doctrine and Covenants 19, Jesus personally describes His suffering in Gethsemane, saying it caused Him to tremble and bleed from every pore. He went through all of that terrifying agony voluntarily because He loves *you* that much and wants you to be able to repent, heal, and come home.', prompt: 'Reflection: When you think about how much Jesus suffered just for you, how does it change the way you feel about repenting?', scriptureRef: 'Doctrine and Covenants 19:16-19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/19?lang=eng&id=p16-19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 4', title: 'The Grave Has No Victory 🕊️', text: 'Losing someone you love is one of the hardest parts of mortality. Sister Reyna I. Aburto shared that her heart was broken when her brother died in an earthquake, but she found immense hope in knowing that because of Christ, \'the grave hath no victory.\' Death is just a temporary goodbye. Because He lives, broken hearts can be totally healed!', prompt: 'Challenge: Think of a family member or hero who has passed away. Send a text to your parents or a sibling sharing a happy memory of that person to celebrate their life today!', scriptureRef: 'Mosiah 16:7-8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/mosiah/16?lang=eng&id=p7-8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 5', title: 'The Ultimate Comeback 👑✨', text: 'Happy Easter! Today we celebrate the most epic comeback in history. Jesus Christ triumphed over both sin and death so that we wouldn\'t have to face them alone. Because of His empty tomb, your mistakes don\'t define you, and your trials won\'t last forever. He swallowed up death in victory and is our ultimate Deliverer!', prompt: 'Reflection: As you watch General Conference today, think about the joy of the empty tomb. Thank Heavenly Father for the gift of His Son and the fresh start you get every single week.', scriptureRef: 'Isaiah 25:8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/isa/25?lang=eng&id=p8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/14?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'The Universal Gift of Resurrection 🌅', devotionalText: 'The Atonement of Jesus Christ connects all of God\'s children across time. While the Fall of Adam brought physical death to everyone, the Savior’s victory over the grave ensures that the gift of resurrection is equally universal.', 
                hymnTitle: 'He Is Risen!', hymnLink: 'https://www.youtube.com/watch?v=jVD7LCiBNAA', hymnAnalysis: '"He Is Risen!" is a triumphant hymn that captures the absolute joy and overarching magnitude of the first Easter morning. The devotional teaches that the Savior\'s victory over the grave ensures that the gift of resurrection is universal. The lyrics boldly declare, "He is risen! He is risen! Tell it out with joyful voice," reminding us that this is a message meant for all of mankind. The Tabernacle Choir\'s majestic and powerful delivery reflects the magnitude of this universal gift.' ,
                songTitle: 'Because He Lives (Amen)', songArtist: 'Matt Maher', songLink: 'https://www.youtube.com/watch?v=cFmJRSJYCBk', songAnalysis: 'This powerful contemporary anthem focuses on the practical, deeply personal implications of Christ’s resurrection. The lyrics proclaim, "I\'m alive, I\'m alive, because He lives," which directly echoes the Apostle Paul’s teaching in the devotional that "in Christ shall all be made alive." Matt Maher\'s driving melody turns a profound theological truth into an intensely personal declaration of hope.' },
            { id: 'tuesday', day: 'Tue', title: 'A Sure Foundation of Witnesses 📜', devotionalText: 'We are blessed to have ancient scriptures and modern prophets testifying of Jesus Christ. Today, living apostles continue to bear special witness that Jesus Christ is the resurrected Son of God.',

                songTitle: 'The Commission', songArtist: 'CAIN', songLink: 'https://www.youtube.com/watch?v=yjNjctz-Ffo', songAnalysis: '"The Commission" brings the concept of "bearing witness" to a deeply personal level. Written from the perspective of the Savior giving His final charge to His disciples to "go tell the world about me," this song connects flawlessly with the devotional\'s focus on modern apostles who carry out that exact commission today.' },
            { id: 'wednesday', day: 'Wed', title: 'Peace, Not as the World Giveth 🕊️', devotionalText: 'Easter is a season of profound joy, but mortality still brings heavy trials. Elder Jeffrey R. Holland taught that the Savior offers us a unique peace—\'not as the world giveth.\'', 
                hymnTitle: 'Where Can I Turn for Peace?', hymnLink: 'https://www.youtube.com/watch?v=qMk6Tbmyppk', hymnAnalysis: '"Where Can I Turn for Peace?" is a tender, introspective hymn that perfectly mirrors the vulnerability of navigating mortality\'s heavy trials. The devotional contrasts the fragile peace of the world with the eternal stillness offered by the Savior. The lyrics ask the aching question of a heavy heart: "Where is the quiet hand to calm my anguish?" and beautifully answer, "He, only One."' ,
                songTitle: 'Peace Be Still', songArtist: 'Hope Darst', songLink: 'https://www.youtube.com/watch?v=lsIpGiz3SfQ', songAnalysis: '"Peace Be Still" is a powerful modern plea for the Savior to calm the internal storms of anxiety and fear that define mortality. The lyrics explicitly reject relying on worldly circumstances for peace: "I don\'t want to fear the storm, just because I hear it roar." Instead, the song relies on the spoken word of the Savior to provide an anchor of stillness over the waves.' },
            { id: 'thursday', day: 'Thu', title: 'He Knows Perfectly How to Help ❤️‍🩹', devotionalText: 'The Savior didn\'t just suffer for our sins; He chose to experience our physical pains, sicknesses, and emotional heartbreaks \'according to the flesh.\'',

                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                            <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">Swallowing Up Death in Victory: A Thematic Musical Companion</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (<p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p>))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
