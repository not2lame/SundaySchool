    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "I Have Remembered My Covenant",
            dateRange: "March 23 – March 29, 2026",
            valediction: "Look to Jesus Christ as your true Deliverer, finding strength in His covenants and peace in His perfect timing as He redeems you with a stretched-out arm."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Mar 23', title: 'I Have Remembered My Covenant 🤝', text: 'When life becomes overwhelmingly difficult, it\'s easy to wonder if God has forgotten us. The Israelites groaned under the weight of Egyptian slavery, feeling completely abandoned. Yet, the Lord powerfully declared to them, "I have remembered my covenant," promising to redeem them with a "stretched out arm." God never forgets His people, and He is intimately aware of your personal burdens today.', prompt: 'Reflection: How has the Lord shown you recently that He remembers you and is aware of your specific burdens?', scriptureRef: 'Exodus 6:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/6?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Mar 24', title: 'Fearing God More Than Man 🛡️', text: 'When Pharaoh commanded the Hebrew midwives to do the unthinkable and kill the newborn boys, they found themselves in a perilous situation. However, the scriptures say they "feared God" more than the king of Egypt. Elder David A. Bednar teaches that godly fear isn\'t terror, but a deep reverence and awe that empowers us to do what is right. God used these ordinary, courageous women to preserve the deliverer of Israel.', prompt: 'Challenge: In what area of your life do you need to let your "fear of God" (your reverence and love for Him) outweigh your fear of the world\'s opinions today?', scriptureRef: 'Exodus 1:17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/1?lang=eng&id=p17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Mar 25', title: 'The Ultimate Deliverer 🕊️', text: 'Did you know the life of Moses is a profound foreshadowing of Jesus Christ? Both escaped royal decrees of death as infants, both spent forty days fasting in the wilderness, and both were called to deliver their people from bondage. Just as Moses was called to physically deliver Israel from Egypt, Jesus Christ came to spiritually deliver all of humanity from sin and death. He is our ultimate Deliverer!', prompt: 'Reflection: How does recognizing Jesus Christ as your personal Deliverer give you confidence when you are facing "impossible odds"?', scriptureRef: 'Moses 1:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/pgp/moses/1?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Mar 26', title: 'Standing on Holy Ground 🏔️', text: 'When Moses approached the burning bush, the Lord commanded him to remove his shoes because he was standing on "holy ground." Today, we are blessed with sacred spaces like the temple and our meetinghouses. However, Elder Gérald Caussé warned that we must not lose our sense of awe or become too casual about sacred things. We must intentionally prepare our hearts to truly see and appreciate the wonders of the restored gospel.', prompt: 'Challenge: Evaluate your Sabbath worship. What is one small, intentional change you can make this Sunday to show the Lord more reverence during the sacrament?', scriptureRef: 'Exodus 3:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/3?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Mar 27', title: 'Whom the Lord Calls, He Qualifies ⛰️', text: 'When God called Moses to confront Pharaoh, Moses was overwhelmed with inadequacy, asking, "Who am I, that I should go?" He focused heavily on his own weaknesses and his slow speech. But the Lord didn\'t list Moses\'s talents in response; He simply promised, "Certainly I will be with thee." When the Lord calls us to a task—whether it\'s a new calling, parenting, or ministering—He doesn\'t expect us to be perfect. He just asks us to be willing, and He will provide the power.', prompt: 'Reflection: Think of a time you felt inadequate in a calling or assignment. How did the Lord step in and make up the difference for you?', scriptureRef: 'Exodus 3:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/3?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Mar 28', title: 'Waiting on the Lord\'s Timing ⏳', text: 'When Moses first obeyed God and asked Pharaoh to free the Israelites, Pharaoh actually made their slavery much worse! Moses was heartbroken, feeling like his obedience only caused more pain. Elder Jeffrey R. Holland teaches that faith means trusting God in good times and bad, even when help seems slow in coming. Sometimes things get harder before the miracle arrives, but God\'s promises are always fulfilled on His perfect calendar.', prompt: 'Challenge: Are you waiting for a righteous prayer to be answered? Choose to consciously trust in the Lord\'s timing today, knowing He is working behind the scenes for your eternal good.', scriptureRef: 'Exodus 5:22-23', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/5?lang=eng&id=p22-23', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Mar 29', title: 'Partakers of the Divine Nature ✨', text: 'The entire story of the Exodus is about God fulfilling His "exceeding great and precious promises" to Israel. Elder David A. Bednar teaches that God gives us these incredible promises so we can eventually "be partakers of the divine nature." As we partake of the sacrament today, we are renewing our own covenant connection with Him. Because of the Savior\'s infinite Atonement, the promise of eternal life and ultimate deliverance is absolutely sure!', prompt: 'Reflection: As you take the sacrament today, ponder the "exceeding great and precious promises" God has made to you personally. How do they bring you peace during your mortal journey?', scriptureRef: '2 Peter 1:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/2-pet/1?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' }
        ];

        const YM_DATA = [
            { id: 'monday', day: 'Mon', date: 'Mar 23', title: 'He Hasn\'t Forgotten You 🏋️‍♂️', text: 'Sometimes life feels like you\'re carrying a massive weight—like the pressure of school, sports, or just trying to fit in. The Israelites felt completely crushed by their slavery in Egypt and probably wondered if God had forgotten them. But the Lord powerfully declared, "I have remembered my covenant," promising to free them with a "stretched out arm". Whatever heavy burden you are carrying today, God knows exactly what you are going through, and He hasn\'t forgotten you.', prompt: 'Reflection: What is a heavy burden or stress you are carrying right now? How can you turn it over to the Lord and let Him help you carry it today?', scriptureRef: 'Exodus 6:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/6?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 24', title: 'Standing Up to the Crowd 🛡️', text: 'Imagine the most powerful guy in the world ordering you to do something completely wrong. That’s what Pharaoh did to the Hebrew midwives, commanding them to harm the Israelite babies. But they "feared God" more than the king and bravely refused to cave. Having "godly fear" means you respect God\'s opinion way more than you fear the crowd\'s judgment. It takes serious guts to stand up for your standards, but God will always back you up.', prompt: 'Challenge: When you face pressure today to lower your standards (like laughing at an inappropriate joke or participating in bad media), be bold like the midwives and choose God’s side.', scriptureRef: 'Exodus 1:17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/1?lang=eng&id=p17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 25', title: 'The Ultimate Hero 🦸‍♂️', text: 'Moses is one of the most epic figures in history, but his whole life was actually meant to point us to the ultimate Hero: Jesus Christ. Both survived wicked kings trying to kill them as babies, both fasted in the wilderness for 40 days, and both were sent to rescue their people. Moses freed Israel from physical slavery, but Jesus Christ is the True Deliverer who frees us from the spiritual slavery of our sins and mistakes.', prompt: 'Reflection: How does knowing that Jesus Christ is your personal Deliverer give you the confidence to overcome your daily struggles and temptations?', scriptureRef: 'Moses 1:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/pgp/moses/1?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 26', title: 'Not Just Another Hangout 🏔️', text: 'When Moses walked up to the burning bush, God told him to take off his shoes because he was standing on "holy ground." As an Aaronic Priesthood holder, you handle holy things every week when you prepare, bless, or pass the sacrament. It is easy to get casual and treat Sunday like just another day to hang out with friends. But the Lord wants us to show deep respect and awe for His sacred spaces and ordinances.', prompt: 'Challenge: This Sunday, treat your priesthood duties with extra respect. Put your phone away, dress your best, and focus completely on the Savior during the sacrament ordinance.', scriptureRef: 'Exodus 3:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/3?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 27', title: 'You Are Enough ⚡', text: 'When God told Moses to go free the Israelites, Moses basically said, "Wait, who am I to do that?" He felt totally unqualified and worried about his weaknesses, like his slow speech. But God didn\'t list off a bunch of leadership skills Moses needed; He simply promised, "Certainly I will be with thee." When God asks you to do something hard—like serve a mission, lead your quorum, or share the gospel—He doesn\'t need you to be perfect. He just needs you to be willing.', prompt: 'Reflection: Think of a time you felt totally unqualified for a calling, a test, or a difficult task. How did you see God step in and help you crush it?', scriptureRef: 'Exodus 3:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/3?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 28', title: 'Pushing Through the Burn 🏃‍♂️', text: 'Have you ever tried doing the right thing, but your life actually got *harder*? Moses did exactly what God asked, but Pharaoh responded by making the Israelites\' slavery way worse! Moses was super frustrated. Elder Jeffrey R. Holland teaches that faith means trusting God even when help seems slow. Sometimes you have to push through the hardest part of the workout before you see the results. God\'s promises are real, but they happen on His perfect timeline.', prompt: 'Challenge: Are you feeling frustrated that a prayer hasn\'t been answered yet? Choose to trust God\'s timing today, knowing He is using the resistance to build your spiritual muscles.', scriptureRef: 'Exodus 5:22-23', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/5?lang=eng&id=p22-23', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 29', title: 'Remember Who You Are 👑', text: 'It is easy to let the world tell you who you are based on your grades, your athletic skills, or what people say on social media. But your true, eternal identity is a son of God! The entire story of Exodus is about God rescuing His covenant children. Because of Jesus Christ\'s Atonement, your ultimate victory over sin and death is already guaranteed. You have His divine power on your side.', prompt: 'Reflection: As you take the sacrament today, think about what it really means to be a son of God. How does remembering your divine identity change the way you act around your friends this week?', scriptureRef: 'Doctrine and Covenants 14:7', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/14?lang=eng&id=p7', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Mar 23', title: 'The Power of Righteous Women 👑', text: 'Moses became a great prophet, but he wouldn\'t have even survived his childhood if it weren\'t for the incredibly brave women who protected him! The faithful midwives, his mother Jochebed, his sister Miriam, and even Pharaoh\'s daughter all stepped up to do what was right. As a young woman today, your righteous choices, compassion, and everyday courage can literally change the world and help fulfill Heavenly Father\'s plan.', prompt: 'Challenge: How can you be a brave defender of someone who needs help, or a friend who is feeling left out today?', scriptureRef: 'Exodus 1:17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/1?lang=eng&id=p17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 24', title: 'Fearing God > Fearing the Crowd 🛡️', text: 'The Hebrew midwives were ordered by the most powerful king in the world to do something terrible, but they bravely refused because they "feared God" more than the king. Having "godly fear" just means you respect and care about Heavenly Father\'s opinion way more than you fear the world\'s judgment. It takes serious guts to stand up for your standards when everyone else is compromising, but God will always have your back!', prompt: 'Reflection: Where in your life do you feel pressure to lower your standards? How can you choose to value God\'s opinion over the crowd\'s today?', scriptureRef: 'Exodus 1:17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/1?lang=eng&id=p17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 25', title: 'He Remembers You 💖', text: 'When the Israelites were slaves in Egypt, they probably felt completely abandoned and forgotten. But the Lord powerfully declared, "I have remembered my covenant". Sometimes middle school or high school can feel incredibly lonely or overwhelming, but God never forgets His daughters. He knows your divine identity, He knows your specific burdens, and He promises to help you carry them.', prompt: 'Reflection: Think of a time recently when you felt a small "tender mercy" that proved Heavenly Father remembers you and knows exactly what you are going through.', scriptureRef: 'Exodus 6:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/6?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 26', title: 'You Are Totally Enough ✨', text: 'When God called Moses to free the Israelites, Moses panicked and basically asked, "Who am I? I can\'t do this!" He felt totally unqualified and focused on all his weaknesses. But God didn\'t give him a pep talk about his talents; He just promised, "Certainly I will be with thee". When you feel inadequate, remember that God doesn\'t need you to be perfect—He just needs you to be willing. Whom the Lord calls, He qualifies!', prompt: 'Challenge: Next time you feel like you aren\'t "enough" (whether at school, in your calling, or with friends), pause and remind yourself that with God\'s help, you can do hard things!', scriptureRef: 'Exodus 3:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/3?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 27', title: 'Not Just Another Hangout 🏔️💕', text: 'When Moses approached the burning bush, God told him to take off his shoes because he was standing on "holy ground". We are blessed with holy places today, like the temple and our chapels! It’s easy to get casual and treat Sunday like just another day to socialize or check our phones, but the Lord wants us to show deep respect and awe for His sacred spaces. Reverence is a beautiful way to show our love for Him!', prompt: 'Challenge: This Sunday, treat your time at church with extra respect. Try putting your phone away and focusing completely on the Savior during the sacrament.', scriptureRef: 'Exodus 3:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/3?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 28', title: 'Trusting the Timeline ⏳', text: 'Moses did exactly what God asked, but Pharaoh responded by making the Israelites\' lives way harder! Moses was heartbroken. Elder Jeffrey R. Holland teaches that faith means trusting God even when help seems slow. Sometimes things get harder before the miracle arrives, but God\'s promises are always fulfilled on His perfect calendar.', prompt: 'Reflection: Are you feeling frustrated that a prayer hasn\'t been answered yet? Choose to trust God\'s timing today, knowing He is working behind the scenes for your eternal good.', scriptureRef: 'Exodus 5:22-23', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/5?lang=eng&id=p22-23', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 29', title: 'The Ultimate Rescuer 🕊️', text: 'Moses\'s entire life was actually meant to point us to the ultimate Hero: Jesus Christ! Both survived wicked kings as babies, and both were sent to rescue their people. Moses was sent to free Israel from physical slavery, but Jesus Christ is the True Deliverer who rescues us from the spiritual slavery of our sins, mistakes, and heartaches. Because of Him, your ultimate victory is already guaranteed!', prompt: 'Challenge: As you take the sacrament today, think about the Savior as your personal Rescuer. Thank Him for being willing to save you from your daily struggles and mistakes.', scriptureRef: 'Moses 1:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/pgp/moses/1?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/13?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'I Have Remembered My Covenant 🤝', devotionalText: 'When life becomes overwhelmingly difficult, it\'s easy to wonder if God has forgotten us. The Israelites groaned under the weight of Egyptian slavery, feeling completely abandoned. Yet, the Lord powerfully declared to them, "I have remembered my covenant," promising to redeem them with a "stretched out arm." God never forgets His people, and He is intimately aware of your personal burdens today.', 
                hymnTitle: 'Redeemer of Israel', hymnLink: 'https://www.youtube.com/watch?v=qIK4rXTG8KQ', hymnAnalysis: '"Redeemer of Israel" is a triumphant anthem that perfectly captures the overarching theme of Exodus. Singing or listening to this majestic arrangement by The Tabernacle Choir reminds us that just as God remembered His ancient covenant to redeem Israel from Egypt, He remains our active, present Redeemer today. As the choir sings of the "shadow by day and our pillar by night," we are reassured that the Lord\'s "stretched out arm" is still reaching into our lives to lift and guide us.' ,
                songTitle: 'Rescue', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=9PugD11k3JU', songAnalysis: '"Rescue" is a tender, deeply personal song written from the perspective of God speaking to a soul in distress. The lyrics beautifully mirror the complete exhaustion of the enslaved Israelites. Lauren Daigle\'s passionate chorus promises that God will send out an army to find us in the darkest night, translating the Lord\'s scriptural promise of deliverance into a modern musical reassurance. It testifies that He is actively working to rescue us from our personal captivity, proving that we are never hidden or forgotten.' },
            { id: 'tuesday', day: 'Tue', title: 'Fearing God More Than Man 🛡️', devotionalText: 'When Pharaoh commanded the Hebrew midwives to do the unthinkable and kill the newborn boys, they found themselves in a perilous situation. However, the scriptures say they "feared God" more than the king of Egypt. Elder David A. Bednar teaches that godly fear isn\'t terror, but a deep reverence and awe that empowers us to do what is right.', 
                hymnTitle: 'Do What Is Right', hymnLink: 'https://www.youtube.com/watch?v=EvHecEAG9HM', hymnAnalysis: 'The energetic and resolute march of "Do What Is Right" serves as the perfect soundtrack for the quiet, life-saving rebellion of the Hebrew midwives. The lyrics declare, "Do what is right; let the consequence follow," echoing the exact choice these women faced when defying Pharaoh\'s deadly edict. This hymn inspires us to trust that God will protect and bless us when we prioritize His commandments over the fear of man.' ,
                songTitle: 'Brave', songArtist: 'Nichole Nordeman', songLink: 'https://www.youtube.com/watch?v=0iyrHs960HM', songAnalysis: '"Brave" is an uplifting contemporary song about stepping out of our comfort zones and standing up for truth, even when our voices shake. The song acknowledges the very human temptation to stay quiet and safe—a temptation the midwives surely felt when threatened by the Egyptian king. It inspires us to let our deep love for Heavenly Father overshadow our fear of the world\'s opinions, taking bold, faithful action regardless of the social or personal costs.' },

        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {

                    return () => clearTimeout(timer);
                }

            if (!show) return null;
            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

                const dateStr = dayData.date ? dayData.date : "";
                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg whitespace-pre-line">{data.text}</p>
                            
                            {data.prompt && (
                                <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                    <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                        <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                        {data.prompt.split(':')[0]}
                                    </h3>
                                    <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                                </div>
                            )}

                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>

                            <button 
                                onClick={() => copyToClipboard(data)}
                                className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors"
                            >
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed whitespace-pre-line">{data.text}</p>
                            {data.prompt && (
                                <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                    <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                    <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                                </div>
                            )}
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">A Mighty Hand: A Thematic Musical Companion to Exodus 1-6</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (<p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p>))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
