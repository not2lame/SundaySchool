    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "Beware Lest Thou Forget the Lord",
            dateRange: "May 11 – May 17, 2026",
            valediction: "Remember the Lord's greatness, keep His covenants etched in your heart, choose life by letting God prevail, and serve others generously as you journey to the promised land."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'May 11', title: 'Our Ultimate Priority 🥇', text: 'Moses pleaded with Israel to love God with all their heart, soul, and might. Relating this to our busy adult lives, President M. Russell Ballard asked if we love the Savior more than the things of this world—our careers, our bank accounts, or our digital distractions. Putting Heavenly Father and Jesus Christ first is the absolute foundation of our spiritual survival.', prompt: 'Reflection: Are there any worldly distractions or priorities competing for your time, attention, and devotion to the Savior today?', scriptureRef: 'Deuteronomy 6:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'May 12', title: 'Beware Lest Thou Forget 🧠✨', text: 'After warning Israel not to forget the Lord, Moses reminded them of their miraculous deliverance. Elder Dale G. Renlund taught that reflecting every day on the goodness and greatness of God actually transforms us. When we intentionally remember His past blessings, we become more spiritually receptive, humble, and Christlike in our daily lives.', prompt: 'Challenge: Take three minutes today to specifically write down or mentally ponder three "great things" the Lord has done for your family.', scriptureRef: 'Deuteronomy 6:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'May 13', title: 'God\'s Treasured Possession 💎', text: 'The Lord told the Israelites they were a "special people" to Him. The original Hebrew word used is *segullah*, which means "valued property" or "treasure." President Russell M. Nelson taught that when we make covenants with God, it changes our relationship with Him forever, giving us an extra measure of His love and making us His "peculiar treasure."', prompt: 'Reflection: How does understanding that your covenants make you Heavenly Father\'s "valued treasure" change how you view your self-worth and your relationship with Him?', scriptureRef: 'Deuteronomy 7:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/7?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'May 14', title: 'Open Thine Hand Wide 🤲', text: 'The Lord commanded the Israelites to "open thine hand wide" to the poor and needy in their communities. We are commanded to help those in need because we have all been spiritually bankrupt at times, and the Lord has generously redeemed us. When we care for others with a willing heart and a generous hand, we beautifully reflect the ultimate generosity of Jesus Christ.', prompt: 'Challenge: Look for an opportunity today to "open your hand wide" to someone in need, whether that means a physical donation, a listening ear, or a text message of encouragement.', scriptureRef: 'Deuteronomy 15:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/15?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'May 15', title: 'A Circumcised Heart ❤️‍🔥', text: 'Moses taught the people about having a "circumcised heart." This deeply symbolic language means that our covenants have become a fundamental part of our nature. Elder Dale G. Renlund taught that true conversion means our commitment to God is so etched in our hearts that we never forget it, no matter what other stresses or trials are happening in our adult lives.', prompt: 'Reflection: Has your commitment to the Lord become so deeply embedded in your heart that it naturally guides your daily decisions without hesitation?', scriptureRef: 'Deuteronomy 30:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/30?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'May 16', title: 'Therefore Choose Life 🌱', text: 'In his final pleas to Israel, Moses set before them life and death, blessing and cursing, and then explicitly invited them to "choose life." As adults navigating complex challenges, we are constantly invited to choose the Savior, who *is* the Life. Every small, daily choice to obey is a choice to bind ourselves to Him and invite His eternal blessings into our homes.', prompt: 'Challenge: When faced with a difficult or frustrating decision today, pause and intentionally ask yourself which option allows you to "choose life" and follow the Savior\'s example.', scriptureRef: 'Deuteronomy 30:19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/30?lang=eng&id=p19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'May 17', title: 'Preserving the Covenant Voice 🗣️', text: 'Moses commanded the Israelites to teach God\'s words diligently to their children. Brother Jan E. Newman taught that it isn’t enough for faith to be just a family tradition; the rising generation must own it. By consistently sharing our testimonies and reading scriptures together, we preserve the voice of the covenant and help the youth deeply know Jesus Christ for themselves.', prompt: 'Reflection: As you partake of the sacrament today, ponder how you can more intentionally share your testimony of the Savior with the children, grandchildren, or youth in your life this week.', scriptureRef: 'Deuteronomy 6:7', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p7', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' }
        ];

        const YM_DATA = [
            { id: 'monday', day: 'Mon', date: 'May 11', title: 'Who Takes the Trophy? 🏆', text: 'Moses told the Israelites to love God with *all* their heart and might. Relating this to us today, President M. Russell Ballard asked if we love the Savior more than the things of this world. It’s totally fine to love sports, video games, or hanging out with your friends, but Heavenly Father needs to hold the #1 spot in your life. If He is your ultimate priority, everything else will fall into its proper place!', prompt: 'Reflection: Look at your screen time or how you spend your weekends. Does your schedule show that God takes the top spot in your life, or is something else taking the trophy?', scriptureRef: 'Deuteronomy 6:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'May 12', title: 'Don\'t Get Amnesia 🧠⚡', text: 'Moses warned the Israelites not to forget the crazy miracles God performed to free them. Spiritual amnesia is real! When life gets stressful with school or drama, it’s super easy to forget the times you\'ve felt the Spirit. Elder Dale G. Renlund taught that taking time every single day to remember God’s greatness actually transforms you and makes you spiritually stronger and more confident.', prompt: 'Challenge: Set a reminder on your phone right now. Take 2 minutes tonight before you go to sleep to think of one awesome thing God has done for you recently.', scriptureRef: 'Deuteronomy 6:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'May 13', title: 'God’s MVP 🏅', text: 'The Lord told the Israelites they were a "special people" to Him. The original Hebrew word is *segullah*, which literally translates to "valued property" or "treasure." When you made covenants at baptism, you leveled up your relationship with God. You aren\'t just another guy in the crowd; as an Aaronic Priesthood holder, you are God\'s highly valued, VIP treasure!', prompt: 'Reflection: How does knowing you are Heavenly Father\'s ultimate "treasure" give you confidence when the world or social media tries to bring you down?', scriptureRef: 'Deuteronomy 7:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/7?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'May 14', title: 'Open Your Hand 🤝', text: 'In the Old Testament, the Lord commanded His people to "open thine hand wide" to help the poor and needy. Today, "poor and needy" doesn\'t just mean someone who needs money. It could be the new kid sitting alone at lunch, a friend struggling with anxiety, or a sibling who needs help with homework. A true priesthood man is always looking out for the underdog!', prompt: 'Challenge: Who is someone in your ward, school, or family who might need a helping hand today? Send them an encouraging text or step up to help them out.', scriptureRef: 'Deuteronomy 15:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/15?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'May 15', title: 'Carved in Stone 🪨', text: 'Moses taught the Israelites about having a "circumcised heart." That sounds intense, but it just means your covenants become a permanent part of who you are. Elder Dale G. Renlund taught that true conversion means your commitment to God is etched into your heart—just like you never forget your own name, you never forget you are a disciple of Jesus Christ, no matter where you are or who you are with.', prompt: 'Reflection: Is your commitment to the Savior "carved" into your heart so deeply that it guides your choices even when your parents or quorum leaders aren\'t watching?', scriptureRef: 'Deuteronomy 30:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/30?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'May 16', title: 'The Ultimate Choice 🎮', text: 'In his final speech, Moses gave the Israelites the ultimate choice: he set before them life and death, and then basically said, "Choose life!" Every single day, you are faced with choices. Clicking on a bad link or hanging with a toxic crowd is choosing spiritual death. But every time you keep a commandment, read your scriptures, or take the sacrament, you are actively choosing the Savior, who *is* Life!', prompt: 'Challenge: When you are faced with a tough decision or temptation this weekend, pause and ask yourself, "Which choice leads to life and peace?"', scriptureRef: 'Deuteronomy 30:19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/30?lang=eng&id=p19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'May 17', title: 'Own Your Faith 🔥', text: 'Moses commanded the Israelites to talk about the gospel constantly. Why? Because the next generation needed to own their faith! Brother Jan E. Newman warned that it isn\'t enough for your belief in Jesus Christ to just be a "family tradition." You can\'t survive on your parents\' testimonies alone. As a young man, you have to dig deep and build your own solid rock foundation on Jesus Christ.', prompt: 'Reflection: As you pass or prepare the sacrament today, think about your own testimony. Are you relying entirely on your family\'s faith, or are you doing the spiritual work to "own" it for yourself?', scriptureRef: 'Deuteronomy 6:7', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p7', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'May 11', title: 'Who Gets Your Top Spot? 🥇', text: 'Moses told the Israelites to love God with *all* their heart and might. Relating this to us today, President M. Russell Ballard asked if we love the Savior more than the things of this world. It’s completely okay to love fashion, your friends, or scrolling through your favorite apps, but Heavenly Father needs to hold the #1 spot in your heart. When He is your ultimate priority, everything else in your life will beautifully fall into place!', prompt: 'Reflection: If someone looked at your screen time or how you spend your weekends, would they know that Heavenly Father and Jesus Christ are your biggest priorities?', scriptureRef: 'Deuteronomy 6:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'May 12', title: 'Cure for Spiritual Amnesia 🧠✨', text: 'Moses warned the Israelites not to forget the crazy miracles God performed to free them. When life gets stressful with school, homework, or friend drama, "spiritual amnesia" is a real thing! Elder Dale G. Renlund taught that taking time every single day to remember God’s greatness actually transforms you, making you spiritually stronger and more confident.', prompt: 'Challenge: Set a reminder on your phone right now! Take two minutes tonight before you go to sleep to write down or think of one awesome thing God has done for you recently.', scriptureRef: 'Deuteronomy 6:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'May 13', title: 'You Are the Ultimate Treasure 💎', text: 'The Lord told the Israelites they were a "special people" to Him. The original Hebrew word is *segullah*, which literally translates to "valued property" or "treasure." When you made covenants at baptism, you leveled up your relationship with God. You aren\'t just another girl trying to fit into the crowd; as a covenant daughter of God, you are His highly valued, VIP treasure!', prompt: 'Reflection: How does knowing you are Heavenly Father\'s ultimate "treasure" give you confidence when you are tempted to compare yourself to others on social media?', scriptureRef: 'Deuteronomy 7:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/7?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'May 14', title: 'Open Your Hand 🤝💖', text: 'In the Old Testament, the Lord commanded His people to "open thine hand wide" to help the poor and needy. Today, "needy" doesn\'t just mean someone who needs money. It could be the new girl sitting alone at lunch, a friend struggling with severe anxiety, or a younger sibling who needs help with homework. A true covenant woman is always looking out for the lonely!', prompt: 'Challenge: Who is someone in your ward, school, or family who might need a helping hand today? Send them a sweet text or sit next to them to lift them up.', scriptureRef: 'Deuteronomy 15:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/15?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'May 15', title: 'Etched in Your Heart ✍️', text: 'Moses taught the Israelites about having a "circumcised heart." That sounds intense, but it just means your covenants become a permanent part of who you are. Elder Dale G. Renlund taught that true conversion means your commitment to God is etched into your heart. Just like you never forget your own name, you never forget you are a disciple of Jesus Christ, no matter what crowd you are hanging out with!', prompt: 'Reflection: Is your love for the Savior "etched" into your heart so deeply that it guides your choices even when your parents or Young Women leaders aren\'t watching?', scriptureRef: 'Deuteronomy 30:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/30?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'May 16', title: 'The Ultimate Choice 🌸', text: 'In his final speech, Moses gave the Israelites the ultimate choice: he set before them life and death, and then basically pleaded with them to "Choose life!" Every single day, you are faced with choices. Participating in toxic gossip or viewing bad media is choosing spiritual death. But every time you keep a standard, read your scriptures, or uplift a friend, you are actively choosing the Savior, who *is* Life!', prompt: 'Challenge: When you are faced with a tough decision or temptation this weekend, pause and ask yourself, "Which choice leads to light, peace, and life?"', scriptureRef: 'Deuteronomy 30:19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/30?lang=eng&id=p19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'May 17', title: 'Own Your Faith 🔥', text: 'Moses commanded the Israelites to talk about the gospel constantly. Why? Because the next generation needed to own their faith! Brother Jan E. Newman warned that it isn\'t enough for your belief in Jesus Christ to just be a "family tradition." You can\'t survive on your parents\' testimonies alone. As a Young Woman, you get to dig deep and build your own beautiful, solid foundation on Jesus Christ.', prompt: 'Reflection: As you take the sacrament today, think about your own testimony. Are you relying entirely on your family\'s faith, or are you doing the spiritual work to "own" it for yourself?', scriptureRef: 'Deuteronomy 6:7', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/deut/6?lang=eng&id=p7', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'Our Ultimate Priority 🥇', devotionalText: 'Moses pleaded with Israel to love God with all their heart, soul, and might. Relating this to our busy adult lives, President M. Russell Ballard asked if we love the Savior more than the things of this world—our careers, our bank accounts, or our digital distractions. Putting Heavenly Father and Jesus Christ first is the absolute foundation of our spiritual survival.', 
                hymnTitle: 'Nearer, My God, to Thee', hymnLink: 'https://www.youtube.com/watch?v=WyxXGdG3-Io', hymnAnalysis: 'The devotional challenges us to prioritize the Savior over our digital distractions and worldly careers. BYU Vocal Point’s stunning a cappella arrangement of "Nearer, My God, to Thee" brings fresh urgency to this classic hymn. The soaring harmonies reflect the upward pull of dedicating our heart, soul, and might entirely to Heavenly Father, leaving the passing things of this world behind.\nListening to this passionate performance inspires us to evaluate our daily focus. The repeating plea to draw nearer to God serves as a personal declaration, beautifully reinforcing the day\'s reflection question. It reminds us that drawing near to the Savior is the ultimate foundation of our spiritual survival and must remain our absolute priority.' ,
                songTitle: '10,000 Reasons (Bless the Lord)', songArtist: 'Matt Redman', songLink: 'https://www.youtube.com/watch?v=DXDGE_lRI0E', songAnalysis: 'Putting God first requires an intentional, daily focus on worship. Matt Redman’s beloved contemporary anthem challenges us to find "10,000 reasons" to bless His holy name, no matter what worldly distractions or career stresses exist. The gentle acoustic start building into a powerful chorus mirrors how a daily commitment to the Lord grows into an unshakeable priority in our busy lives.\nThis song grounds our attention entirely on the Savior\'s goodness. By choosing to "sing like never before," we actively set aside our digital distractions and place our devotion back where it belongs, fulfilling Moses’s plea to love God with all our might.' },
            { id: 'tuesday', day: 'Tue', title: 'Beware Lest Thou Forget 🧠✨', devotionalText: 'After warning Israel not to forget the Lord, Moses reminded them of their miraculous deliverance. Elder Dale G. Renlund taught that reflecting every day on the goodness and greatness of God actually transforms us. When we intentionally remember His past blessings, we become more spiritually receptive, humble, and Christlike in our daily lives.', 
                hymnTitle: 'How Great Thou Art', hymnLink: 'https://www.youtube.com/watch?v=e4BthL6pcLM', hymnAnalysis: 'Moses warned Israel to never forget their miraculous deliverance. "How Great Thou Art" is an exultant hymn of remembrance, specifically reminding us to ponder the Savior\'s ultimate sacrifice and the worlds His hands have made. This breathtaking and deeply reverent performance instills a profound sense of awe, directly supporting Elder Renlund\'s teaching that remembering God’s greatness transforms us.\nAs the music swells, it keeps us spiritually receptive and anchored in deep gratitude. It serves as the perfect soundtrack for the day\'s challenge, inviting us to mentally ponder the "great things" the Lord has done, softening our hearts, and fostering a Christlike humility as we journey forward.' ,
                songTitle: 'I Can Only Imagine', songArtist: 'MercyMe', songLink: 'https://www.youtube.com/watch?v=N_lrrq_opng', songAnalysis: 'This contemporary classic perfectly pairs with the challenge to remember the "great things" of God by keeping our eyes focused on eternity. By looking forward to the ultimate blessing of standing before Jesus Christ, we are humbled in our present circumstances and reminded of His continuous grace and past deliverance.\nThe deeply emotional crescendo helps shift our minds from daily stresses to eternal promises, keeping us spiritually grounded. It perfectly aligns with the day\'s challenge to pause and reflect on the miraculous future we have been promised, transforming our perspective for the rest of the day.' },
            { id: 'wednesday', day: 'Wed', title: 'God\'s Treasured Possession 💎', devotionalText: 'The Lord told the Israelites they were a "special people" to Him. The original Hebrew word used is segullah, which means "valued property" or "treasure." President Russell M. Nelson taught that when we make covenants with God, it changes our relationship with Him forever, giving us an extra measure of His love and making us His "peculiar treasure."', 
                hymnTitle: 'I Am a Child of God', hymnLink: 'https://www.youtube.com/watch?v=xglz6kryORQ', hymnAnalysis: 'The concept of being God\'s "valued treasure" is beautifully distilled in the simple, profound lyrics of "I Am a Child of God." The devotional teaches that our covenants give us an extra measure of His love. This cherished choral performance anchors our self-worth entirely in that divine, relational heritage.\nListening to this beloved hymn reminds us that before any worldly title, our eternal identity as Heavenly Father\'s peculiar treasure is absolute and unchanging. It directly answers the day\'s reflection question by drastically altering how we view our potential, reminding us of the loving relationship He desires to cultivate with us through covenants.' ,
                songTitle: 'You Say', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=sIaT8Jl2zpI', songAnalysis: 'Lauren Daigle\'s Grammy-winning track is the ultimate modern anthem of divine self-worth. When the world makes us feel inadequate or average, the lyrics proclaim, "You say I am loved when I can\'t feel a thing." This directly echoes President Nelson\'s teaching that our covenant relationship with God gives us a special measure of belonging.\nThe soulful, piano-driven melody reinforces our identity as His segullah (treasured possession), hushing the negative voices of the world. It is a powerful reminder that our self-worth is not dictated by our adult stresses or societal standards, but by the eternal promises of a God who calls us His own.' },
            { id: 'thursday', day: 'Thu', title: 'Open Thine Hand Wide 🤲', devotionalText: 'The Lord commanded the Israelites to "open thine hand wide" to the poor and needy in their communities. We are commanded to help those in need because we have all been spiritually bankrupt at times, and the Lord has generously redeemed us. When we care for others with a willing heart and a generous hand, we beautifully reflect the ultimate generosity of Jesus Christ.', 
                hymnTitle: 'A Poor Wayfaring Man of Grief', hymnLink: 'https://www.youtube.com/watch?v=vnNT5aak4ZI', hymnAnalysis: 'The Lord’s command to "open thine hand wide" to the poor and needy is deeply connected to recognizing our own spiritual bankruptcy. "A Poor Wayfaring Man of Grief" is a powerful narrative hymn about encountering the Savior in the guise of the marginalized and suffering. The devotional points out that the Lord has generously redeemed us, which should be the primary motivation for our charity.\nThis reverent performance inspires a willing heart, encouraging us to look for practical ways to divide our gifts with those in need today. It reminds us that when we offer a listening ear or a generous hand, we are directly serving and reflecting the ultimate generosity of Jesus Christ.' ,
                songTitle: 'Do Something', songArtist: 'Matthew West', songLink: 'https://www.youtube.com/watch?v=b_RjndG0IX8', songAnalysis: 'When we observe the immense needs in our communities, it is natural to feel overwhelmed and wish someone would step in. Matthew West’s "Do Something" shakes us out of that complacency with a striking realization: "I shook my fist at Heaven [and] said, \'God, why don\'t You do something?\' He said, \'I did. I created you.\'"\nThis modern, upbeat track is a driving call to action that perfectly aligns with Deuteronomy\'s command to open our hands wide. Its high-energy tempo transforms the ancient law into a vibrant, modern-day mission. It inspires us to stop waiting for others and actively fulfill the day\'s challenge by offering encouragement, a donation, or our time today.' },
            { id: 'friday', day: 'Fri', title: 'A Circumcised Heart ❤️‍🔥', devotionalText: 'Moses taught the people about having a "circumcised heart." This deeply symbolic language means that our covenants have become a fundamental part of our nature. Elder Dale G. Renlund taught that true conversion means our commitment to God is so etched in our hearts that we never forget it, no matter what other stresses or trials are happening in our adult lives.', 
                hymnTitle: 'I Need Thee Every Hour', hymnLink: 'https://www.youtube.com/watch?v=PPEdmbgga_o', hymnAnalysis: 'A "circumcised heart" means our covenants have become a fundamental part of our nature, deeply etched within us so we can withstand the trials of adult life. "I Need Thee Every Hour" expresses the profound humility and constant reliance on the Lord that characterizes a truly converted heart.\nThe Choir\'s tender performance fortifies our spiritual resolve. It reminds us that navigating unpredictable stresses requires staying close to the Savior. When our core nature is aligned with Him, we naturally seek His steady guidance without hesitation, embedding His presence deeply into our daily decisions.' ,
                songTitle: 'Oceans (Where Feet May Fail)', songArtist: 'Hillsong UNITED', songLink: 'https://www.youtube.com/watch?v=dy9nwe9_xzw', songAnalysis: 'A circumcised heart implies a trust in God so profound that it guides us through any unknown. "Oceans" is a masterful, atmospheric song about stepping out into deep waters with absolute, unchanging faith. As the music swells, the lyrics declare, "Spirit lead me where my trust is without borders," illustrating a commitment that supersedes fear.\nThis modern worship track mirrors the devotional\'s reflection question, asking if our commitment to the Lord is so etched in our nature that we will follow His daily guidance through the harshest trials of our adult lives. It invites a level of surrender that defines true, lasting conversion.' },
            { id: 'saturday', day: 'Sat', title: 'Therefore Choose Life 🌱', devotionalText: 'In his final pleas to Israel, Moses set before them life and death, blessing and cursing, and then explicitly invited them to "choose life." As adults navigating complex challenges, we are constantly invited to choose the Savior, who is the Life. Every small, daily choice to obey is a choice to bind ourselves to Him and invite His eternal blessings into our homes.', 
                hymnTitle: 'Choose the Right', hymnLink: 'https://www.youtube.com/watch?v=gIqKsJ5xG9c', hymnAnalysis: 'Moses explicitly invited Israel to "choose life" and bind themselves to God. The classic anthem "Choose the Right" acts as a spiritual clarion call to action, reminding us that God\'s light is continually marching before us. The lyrics call us to stand firmly on the side of the Savior amidst the complex challenges of mortality.\nThe Tabernacle Choir\'s majestic performance instills a profound spiritual courage. It reinforces the day\'s challenge, reminding us that every small daily choice to obey is a choice to actively align with eternity, choosing life and inviting His unshakeable blessings into our homes.' ,
                songTitle: 'Chain Breaker', songArtist: 'Zach Williams', songLink: 'https://www.youtube.com/watch?v=JGYjKR69M6U', songAnalysis: 'Choosing the Savior—the ultimate "Life"—means choosing freedom from the spiritual death of sin, pride, and frustration. Zach Williams’s "Chain Breaker" is a bold, southern-rock-infused testimony of Christ\'s power to deliver us when we finally choose to turn to Him. The lyrics lay out the clear options before us: "If you\'ve got pain, He\'s a pain taker; if you feel lost, He\'s a way maker."\nThe song’s raw energy forcefully motivates the day\'s challenge. It reminds us that our small, daily choices to obey are not restrictive rules, but rather the very actions that break the chains of our bad habits and complex struggles, allowing us to walk in the abundant life He offers.' },
            { id: 'sunday', day: 'Sun', title: 'Preserving the Covenant Voice 🗣️', devotionalText: 'Moses commanded the Israelites to teach God\'s words diligently to their children. Brother Jan E. Newman taught that it isn’t enough for faith to be just a family tradition; the rising generation must own it. By consistently sharing our testimonies and reading scriptures together, we preserve the voice of the covenant and help the youth deeply know Jesus Christ for themselves.', 
                hymnTitle: 'Teach Me to Walk in the Light', hymnLink: 'https://www.youtube.com/watch?v=kK7XnmUzUUA', hymnAnalysis: 'The solemn commandment to teach God’s words diligently to our children is captured beautifully in the hymn "Teach Me to Walk in the Light." The devotional highlights that faith cannot merely be a passive tradition; it must be taught and caught by the rising generation. As the hymn’s verses ask parents to "teach me to pray to my Father above," it underscores our essential role in preserving the covenant voice.\nThis beautiful choral performance perfectly models the intergenerational sharing of testimony required to build a Zion society. It inspires us to intentionally guide the youth in our lives toward their own profound relationship with Jesus Christ, answering the day\'s reflection to be more deliberate in our teaching.' ,
                songTitle: 'Glorious', songArtist: 'David Archuleta and One Voice Children’s Choir', songLink: 'https://www.youtube.com/watch?v=nomxXk6Q1rk', songAnalysis: 'Preserving the covenant voice helps the youth discover their own divine potential in Jesus Christ. David Archuleta\'s uplifting track "Glorious" is a vibrant, empowering anthem for the rising generation. It teaches that every individual is like a unique, essential note in a grand symphony, needing to discover their voice.\nThe bright energy of the song perfectly complements the day\'s reflection to intentionally uplift the youth. It serves as a reminder that as we diligently teach them, we are equipping them to add their own confident, converted voices to the ongoing, glorious melody of the Restoration, ensuring they truly own their faith.' }

        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);
            if (!show) return null;
            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

        const ToggleAnswer = ({ question, answer }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="mb-6 border-l-4 border-amber-200 pl-4">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="text-left font-bold text-amber-900 w-full hover:text-amber-700 transition-colors flex items-start gap-2"
                    >
                        <span className="mt-1">{isOpen ? <IconChevronDown className="w-5 h-5" /> : <IconChevronRight className="w-5 h-5" />}</span>
                        <span>{question}</span>
                    </button>
                    {isOpen && (
                        <div className="mt-3 p-4 bg-stone-100 rounded-lg text-stone-700 italic border border-stone-200 fade-in">
                            <span className="font-bold not-italic text-stone-500 text-xs uppercase tracking-wider block mb-1">Possible Answer</span>
                            <div className="whitespace-pre-line">{answer}</div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('devotional');
            const [activeDayId, setActiveDayId] = useState('');
            const [showToast, setShowToast] = useState(false);
            const [youthGroup, setYouthGroup] = useState('ym'); 

            useEffect(() => {
                const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
                const todayIndex = new Date().getDay();
                setActiveDayId(dayMap[todayIndex]);
            }, []);

            const getActiveData = (dataArray) => {
                return dataArray.find(d => d.id === activeDayId) || dataArray[0];
            };

            const copyToClipboard = (dayData) => {
                const promptParts = dayData.prompt.split(':');
                const promptLabel = promptParts[0];
                const promptText = promptParts.slice(1).join(':').trim();
                const scriptureText = (dayData.scriptureRef && dayData.scriptureLink)
                    ? `Scripture: ${dayData.scriptureRef}\n${dayData.scriptureLink}\n\n`
                    : ""; 
                const dateStr = dayData.date ? dayData.date : "";
                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                            <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">Choosing Life: A Thematic Musical Companion</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (
                                        typeof p === 'string' ? <p key={i} className="text-stone-700 mb-3 leading-relaxed whitespace-pre-line">{p}</p> : <React.Fragment key={i}>{p}</React.Fragment>
                                    ))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
