    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "Rebel Not Ye against the Lord, Neither Fear",
            dateRange: "May 4 – May 10, 2026",
            valediction: "Look to God and live. Cultivate meekness, balance personal and prophetic revelation, choose faith over fear, and replace murmuring with gratitude to reach your eternal promised land."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'May 4', title: 'Closing the Spiritual Distance 🚶‍♂️', text: 'Even on foot, it wouldn\'t take 40 years to travel from Egypt to the promised land. But the children of Israel needed that time to cover the *spiritual distance*—the distance between who they currently were and who God needed them to become as His covenant people. When we feel stuck in our own "spiritual wilderness" and wonder why our trials are lasting so long, we can find peace in knowing the Lord is patiently shaping us for our eternal destination.', prompt: 'Reflection: What "spiritual distance" or personal growth do you feel the Lord is helping you cover in your current season of life?', scriptureRef: 'Numbers 14:33', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/14?lang=eng&id=p33', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'May 5', title: 'Two Essential Lines 📡', text: 'Moses famously declared, "would God that all the Lord\'s people were prophets!" Heavenly Father truly desires to speak to all of His children. President Dallin H. Oaks taught that God has given us two lines of communication: the *personal line* to receive direct guidance for our own lives, and the *priesthood line* to receive doctrine and direction for the Church through living prophets. Balancing and honoring both lines keeps us anchored to truth.', prompt: 'Challenge: Evaluate how you are using your "personal line" of communication. Take an extra few minutes after your prayers today to sit quietly and truly listen for the Holy Ghost.', scriptureRef: 'Numbers 11:29', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/11?lang=eng&id=p29', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'May 6', title: 'The Power of Meekness 🕊️', text: 'Despite his immense power and the stunning miracles he performed, the scriptures describe Moses as "very meek, above all the men which were upon the face of the earth." Elder David A. Bednar beautifully clarified that meekness isn\'t weakness; it is distinguished by "righteous responsiveness, willing submissiveness, and strong self-restraint." It is a divine attribute of the Savior that protects us from pride and allows us to be magnified as instruments in God\'s hands.', prompt: 'Reflection: How can practicing Christlike meekness and "strong self-restraint" change the way you respond when you are criticized or misunderstood by others?', scriptureRef: 'Numbers 12:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/12?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'May 7', title: 'Faith Over Fear 🛡️', text: 'When twelve spies returned from exploring Canaan, ten of them focused on the terrifying "giants" and caused the camp to panic. But Joshua and Caleb stood firm with a completely different spirit, declaring, "The Lord is with us: fear them not." When we face modern "giants" in our adult lives—like health crises, financial stress, or family struggles—we can either retreat in fear or move forward in faith, trusting that God will fight our battles.', prompt: 'Challenge: Identify a "giant" causing you anxiety today. Choose to actively trust that "the Lord is with us," and consciously hand that worry over to Him.', scriptureRef: 'Numbers 14:9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/14?lang=eng&id=p9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'May 8', title: 'Look and Live 🐍✨', text: 'When the Israelites were bitten by venomous serpents, Moses raised a brass serpent on a pole. The cure was incredibly simple: just look and live. Elder D. Todd Christofferson reminded us that the brass serpent is a type of Jesus Christ. When we are "bitten" by the pains, offenses, and trials of a fallen world, we don\'t need a complicated cure—we simply need to look to the Savior and His Atonement to be healed.', prompt: 'Reflection: Are there any areas in your life where you are overcomplicating the gospel? How can you simply "look" to Jesus Christ for relief and perspective today?', scriptureRef: 'Numbers 21:8-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/21?lang=eng&id=p8-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'May 9', title: 'Standing Firm Under Pressure 🏔️', text: 'King Balak repeatedly tried to bribe and pressure Balaam to curse the Israelites. Initially, Balaam boldly pushed back, declaring, "I cannot go beyond the word of the Lord my God, to do less or more." In our complex world, we constantly face social, cultural, and professional pressures to compromise our covenants. True discipleship means standing firm in God\'s will, even when the world offers honor or riches to conform.', prompt: 'Challenge: Think of a standard or belief you sometimes feel pressured to compromise on. Recommit today to firmly align your choices with the Lord\'s will, regardless of outside opinions.', scriptureRef: 'Numbers 22:18', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/22?lang=eng&id=p18', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'May 10', title: 'The Antidote to Murmuring 💛', text: 'The Israelites\' wilderness journey was painfully prolonged because they constantly complained against the Lord. Elder Dale G. Renlund taught that distancing ourselves from God often leads to a sense of entitlement and a tendency to murmur about perceived unfairness. As we participate in Sunday worship, we have the perfect opportunity to replace complaints about our own "wilderness" with profound gratitude for everything the Lord *has* given us.', prompt: 'Reflection: As you partake of the sacrament today, how can you shift your perspective from focusing on what you lack to expressing deep gratitude for how God is sustaining you right now?', scriptureRef: 'Numbers 11:1', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/11?lang=eng&id=p1', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' }
        ];

        const YM_DATA = [
            { id: 'monday', day: 'Mon', date: 'May 4', title: 'Leveling Up in the Wilderness 🏜️', text: 'The 40-year trip through the wilderness wasn\'t just about the physical miles; it was about the "spiritual distance" the Israelites needed to cover to become God’s covenant people. Sometimes it feels like you are stuck waiting to reach your goals—like a mission, graduation, or getting your driver\'s license. God uses that waiting time to prepare you, level you up spiritually, and make you into the priesthood man He needs you to become.', prompt: 'Reflection: What is one spiritual weakness you think Heavenly Father is trying to help you "level up" and overcome right now?', scriptureRef: 'Numbers 14:33', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/14?lang=eng&id=p33', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'May 5', title: 'Your Two Comms Channels 📡', text: 'President Dallin H. Oaks taught that Heavenly Father gave us two essential communication lines: the "personal line" to get direct guidance through the Holy Ghost, and the "priesthood line" to get direction for the Church through living prophets. As an Aaronic Priesthood holder, you need both! Listening to the prophet keeps you safe on the right path, and your personal revelation tells you exactly how to apply that guidance to your specific teenage life.', prompt: 'Challenge: Test your "personal line" today. Turn off your music, social media, or games for a few minutes and just sit quietly to let the Holy Ghost speak to your mind.', scriptureRef: 'Numbers 11:29', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/11?lang=eng&id=p29', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'May 6', title: 'The Ultimate Flex 💪🕊️', text: 'Moses performed insane miracles and stood up to Pharaoh, but the scriptures actually call him "very meek". Elder David A. Bednar taught that meekness isn\'t weakness—it\'s actually "strong self-restraint". It means having total power and control over your temper, your pride, and your actions, instead of just reacting to the drama around you. Walking away from a fight or choosing not to talk trash is the ultimate flex of a true disciple!', prompt: 'Reflection: How can having "strong self-restraint" help you the next time someone tries to provoke you or disrespect you?', scriptureRef: 'Numbers 12:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/12?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'May 7', title: 'Giant Killers 🗡️', text: 'When 10 of the spies saw the massive people in the promised land, they panicked and said they felt like grasshoppers facing giants. But Joshua and Caleb didn\'t flinch, telling the people, "The Lord is with us: fear them not". When you face massive "giants" in your life—like huge exams, pressure to break the law of chastity, or anxiety about your future—don\'t back down. Move forward in faith and trust that the Lord is on your team!', prompt: 'Challenge: Think of a "giant" causing you stress right now. Pray specifically today for the courage of Joshua and Caleb to face it head-on with God\'s help.', scriptureRef: 'Numbers 14:9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/14?lang=eng&id=p9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'May 8', title: 'It Really Is That Simple 🐍✨', text: 'When venomous snakes attacked the Israelites, the cure was ridiculously simple: just look at the brass serpent Moses built on a pole and live. Elder D. Todd Christofferson reminded us that this is a perfect symbol of Jesus Christ. Sometimes we overcomplicate repentance or feel like we are too far gone to be forgiven. But the Savior\'s message is simple: Look to Him, repent, and let Him heal you. It really is that straightforward to get back on track!', prompt: 'Reflection: Are you overcomplicating things? How can you simply "look to Christ" when you are tempted or feeling discouraged this weekend?', scriptureRef: 'Numbers 21:8-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/21?lang=eng&id=p8-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'May 9', title: 'Hold the Line 🛑', text: 'King Balak tried everything to pressure Balaam into cursing the Israelites, offering him massive honor and riches. At first, Balaam held his ground, declaring he couldn\'t go against God\'s word for any amount of money or clout. You are going to face intense pressure from peers or social media to compromise your standards. A true Aaronic Priesthood man holds the line and refuses to sell out his covenants for popularity!', prompt: 'Challenge: Pick one standard from the *For the Strength of Youth* guide and commit to never compromising on it, no matter how much pressure your friends put on you.', scriptureRef: 'Numbers 22:18', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/22?lang=eng&id=p18', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'May 10', title: 'Drop the Murmuring 💛', text: 'The Israelites got miraculously fed manna from heaven every single day, and yet they still complained about it! Elder Dale G. Renlund warned that when we get distant from God, we start feeling entitled and complain about how "unfair" life is. As you step up to pass or prepare the sacrament today, check your attitude. Drop the complaining and trade it for true gratitude for what God *has* given you.', prompt: 'Reflection: As you participate in the sacrament today, think of three specific blessings you usually take for granted, and silently thank Heavenly Father for them.', scriptureRef: 'Numbers 11:1', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/11?lang=eng&id=p1', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'May 4', title: 'The Ultimate Glow-Up Takes Time ⏳', text: 'The Israelites took 40 years to cover a short geographical distance because they needed time to cover the *spiritual distance* to become God\'s covenant people. If you feel like your personal goals or spiritual growth are taking forever, don\'t stress! Heavenly Father is patiently using this waiting period in your life to shape you into the beautiful, strong woman He knows you can become.', prompt: 'Reflection: What is one area of personal growth where you need to be a little more patient with yourself this week?', scriptureRef: 'Numbers 14:33', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/14?lang=eng&id=p33', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'May 5', title: 'Your Personal DM from Heaven 💌', text: 'President Dallin H. Oaks taught that Heavenly Father gave us two essential lines of communication. The "priesthood line" guides the whole Church through the prophet, but the "personal line" is specifically for *you*! God wants to send you personal revelation through the Holy Ghost to help you navigate your unique teenage life, friendships, and daily choices.', prompt: 'Challenge: Unplug for just five minutes today. Put your phone away and sit quietly so you can actually "read" the promptings the Holy Ghost is trying to send you.', scriptureRef: 'Numbers 11:29', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/11?lang=eng&id=p29', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'May 6', title: 'The Ultimate Power Move 💪✨', text: 'The scriptures call Moses "very meek". Sometimes people think being meek means letting people walk all over you, but Elder David A. Bednar taught that meekness is actually "strong self-restraint". It’s the ultimate power move! It means having the spiritual confidence to walk away from toxic drama, gossip, or arguments without needing to react or prove yourself.', prompt: 'Reflection: How can practicing "strong self-restraint" help you the next time you are tempted to get involved in some school drama or a social media argument?', scriptureRef: 'Numbers 12:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/12?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'May 7', title: 'Slaying Your Giants 🗡️', text: 'When the Israelites saw the massive people in the promised land, they panicked and felt like tiny grasshoppers facing giants. But Joshua and Caleb didn\'t flinch, saying, "The Lord is with us: fear them not". When you face massive "giants" in your life—like anxiety, a huge test, or feeling like you don\'t fit in—don\'t back down. Move forward in faith knowing the Lord is completely on your side!', prompt: 'Challenge: What "giant" is causing you stress right now? Say a prayer today asking for the courage of Joshua and Caleb to face it head-on.', scriptureRef: 'Numbers 14:9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/14?lang=eng&id=p9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'May 8', title: 'It Really Is That Simple 🐍💖', text: 'When the Israelites were bitten by poisonous snakes, the cure was ridiculously simple: just look at the brass serpent Moses made, and live. Elder D. Todd Christofferson taught that this is a perfect symbol of Jesus Christ. Sometimes we overcomplicate repentance or feel like we are too broken to be healed. But the Savior\'s message is simple: Look to Him, let Him heal your heart, and live!', prompt: 'Reflection: Are you overcomplicating things or being too hard on yourself? How can you simply "look to Christ" for peace and healing this weekend?', scriptureRef: 'Numbers 21:8-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/21?lang=eng&id=p8-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'May 9', title: 'Holding Your Ground 🛑', text: 'King Balak tried everything to pressure Balaam into cursing the Israelites, offering him major status and riches. At first, Balaam held his ground, saying he couldn\'t go against God\'s word for any amount of clout. You are definitely going to face intense pressure from friends or social media to compromise your standards. A true covenant daughter of God holds her ground and refuses to sell out her beliefs for popularity!', prompt: 'Challenge: Choose one standard from the *For the Strength of Youth* guide that you will absolutely never compromise on, no matter what your peers say.', scriptureRef: 'Numbers 22:18', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/22?lang=eng&id=p18', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'May 10', title: 'Ditch the Drama 💛', text: 'The Israelites were miraculously fed manna from heaven every single day, but they still found a way to complain about it! Elder Dale G. Renlund warned that when we distance ourselves from God, we start feeling entitled and complain about how "unfair" our lives are. The absolute best cure for feeling aggrieved and murmuring is deep, genuine gratitude.', prompt: 'Reflection: As you take the sacrament today, check your attitude. Think of three specific blessings you usually take for granted and silently thank Heavenly Father for them.', scriptureRef: 'Numbers 11:1', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/num/11?lang=eng&id=p1', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/19?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'Closing the Spiritual Distance 🚶‍♂️', devotionalText: 'Even on foot, it wouldn\'t take 40 years to travel from Egypt to the promised land. But the children of Israel needed that time to cover the  spiritual distance —the distance between who they currently were and who God needed them to become as His covenant people. When we feel stuck in our own "spiritual wilderness" and wonder why our trials are lasting so long, we can find peace in knowing the Lord is patiently shaping us for our eternal destination.', 
                hymnTitle: 'Guide Us, O Thou Great Jehovah', hymnLink: 'https://www.youtube.com/watch?v=UYjqWLY9OTA', hymnAnalysis: 'The devotional highlights the "spiritual distance" the Israelites needed to cover to become a holy people. "Guide Us, O Thou Great Jehovah" is the quintessential hymn of the wilderness journey. As we plead to be guided as "pilgrims through this barren land," we acknowledge our own reliance on God\'s patient direction.\nThe Tabernacle Choir\'s magnificent arrangement evokes the grandeur and scale of Israel\'s journey, instilling a deep sense of trust in God\'s eternal patience. As the music swells, it provides profound reassurance that our own mortal wanderings are guided by the "Great Jehovah" who knows exactly what it takes to shape us for our promised destination.' ,
                songTitle: 'Trust in You', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=F4dmG9DU_io', songAnalysis: 'When we feel stuck in our own "spiritual wilderness," Lauren Daigle\'s "Trust in You" is a powerful anthem of relying on God\'s timing. The devotional addresses the frustration of prolonged trials, and Daigle\'s lyrics mirror this emotion: "When You don\'t move the mountains I\'m needing You to move... I will trust in You."\nThis contemporary track\'s driving rhythm and passionate vocals offer an uplifting boost of encouragement. It shifts our perspective from questioning why the wilderness journey is taking so long to actively trusting the Lord\'s refining process, knowing His plans are always good.' },
            { id: 'tuesday', day: 'Tue', title: 'Two Essential Lines 📡', devotionalText: 'Moses famously declared, "would God that all the Lord\'s people were prophets!" Heavenly Father truly desires to speak to all of His children. President Dallin H. Oaks taught that God has given us two lines of communication: the  personal line  to receive direct guidance for our own lives, and the  priesthood line  to receive doctrine and direction for the Church through living prophets. Balancing and honoring both lines keeps us anchored to truth.',

                songTitle: 'Word of God Speak', songArtist: 'MercyMe Cover by Christian Baker', songLink: 'https://www.youtube.com/watch?v=-HersuGC_RU', songAnalysis: 'MercyMe\'s "Word of God Speak" is a beautiful, reflective prayer that captures the essence of the "personal line" of communication. The devotional challenges us to sit quietly and truly listen for the Holy Ghost. This song\'s plea to "be still and know that You\'re in this place" sets the perfect tone for that quiet listening.\nThe gentle, acoustic melody helps strip away the noise of the world, creating a sanctuary where the Spirit can minister to our minds and hearts. It proves that God truly desires to speak to all of His children, often meeting us when we are at a loss for words.' },
            { id: 'wednesday', day: 'Wed', title: 'The Power of Meekness 🕊️', devotionalText: 'Despite his immense power and the stunning miracles he performed, the scriptures describe Moses as "very meek, above all the men which were upon the face of the earth." Elder David A. Bednar beautifully clarified that meekness isn\'t weakness; it is distinguished by "righteous responsiveness, willing submissiveness, and strong self-restraint." It is a divine attribute of the Savior that protects us from pride and allows us to be magnified as instruments in God\'s hands.', 
                hymnTitle: 'More Holiness Give Me', hymnLink: 'https://www.youtube.com/watch?v=2V1s8SmtX7g', hymnAnalysis: 'Meekness is a divine attribute that requires immense spiritual strength and submissiveness, a desire eloquently expressed in the hymn "More Holiness Give Me." The devotional teaches that meekness is not weakness, but a righteous responsiveness to God\'s will and a refining of our natural reactions.\nThis hymn, performed with deep reverence by The Tabernacle Choir, is a personal plea to develop those exact Christlike traits. By asking the Lord for "more meekness in trial" and "more strength to o\'ercome," it guides our hearts toward the self-restraint and humility that defined the Savior\'s life.' ,
                songTitle: 'Thy Will', songArtist: 'Hillary Scott & The Scott Family', songLink: 'https://www.youtube.com/watch?v=PAmh3yvmzXs', songAnalysis: 'True meekness requires "willing submissiveness" to the Father\'s plan, especially when it differs from our own desires. "Thy Will" captures the raw emotion of surrendering completely to God. The lyrics, "like a child on my knees, all that comes to me is \'Thy will be done,\'" perfectly illustrate the spiritual strength embedded in submission.\nHillary Scott’s vulnerable and honest vocal performance strips away any facade of self-sufficiency. It reminds us that yielding our hearts is not a sign of weakness, but an expression of profound trust in a loving God. The song encourages us to let go of our need for control, answering the devotional’s call for Christlike restraint.' },
            { id: 'thursday', day: 'Thu', title: 'Faith Over Fear 🛡️', devotionalText: 'When twelve spies returned from exploring Canaan, ten of them focused on the terrifying "giants" and caused the camp to panic. But Joshua and Caleb stood firm with a completely different spirit, declaring, "The Lord is with us: fear them not." When we face modern "giants" in our adult lives—like health crises, financial stress, or family struggles—we can either retreat in fear or move forward in faith, trusting that God will fight our battles.', 
                hymnTitle: 'Let Us All Press On', hymnLink: 'https://www.youtube.com/watch?v=a2qPlvxuCLg', hymnAnalysis: 'When faced with the terrifying "giants" of Canaan, Caleb and Joshua boldly declared, "The Lord is with us: fear them not." "Let Us All Press On" captures that identical, unwavering spirit. The soaring, triumphant voices of the Choir enthusiastically sing, "Fear not, though the enemy deride; Courage, for the Lord is on our side."\nThis performance serves as a spiritual battle cry for our own modern challenges. It actively dispels the panic that the ten spies felt, giving us the musical courage to stop retreating in fear and start moving forward in absolute faith, knowing our God is far larger than our most intimidating giants.' ,
                songTitle: 'Trust in the Lord', songArtist: '2022 Youth Theme', songLink: 'https://www.youtube.com/watch?v=LarcujFiD9Y', songAnalysis: 'The devotional challenges us to identify our anxieties and actively hand them over to Him. This contemporary anthem declares, "There may be mountains on the way, but we choose faith, not fear." The upbeat, modern energy transforms the ancient story of the Israelite spies into a relatable, current-day strategy for survival.\nIt reminds us that while the "giants" of financial stress or health crises are very real, choosing to trust in the Lord changes our spiritual trajectory entirely. The song replaces our innate panic with a clear, guided path forward, reassuring us that if we trust Him, He will direct our paths.' },
            { id: 'friday', day: 'Fri', title: 'Look and Live 🐍✨', devotionalText: 'When the Israelites were bitten by venomous serpents, Moses raised a brass serpent on a pole. The cure was incredibly simple: just look and live. Elder D. Todd Christofferson reminded us that the brass serpent is a type of Jesus Christ. When we are "bitten" by the pains, offenses, and trials of a fallen world, we don\'t need a complicated cure—we simply need to look to the Savior and His Atonement to be healed.', 
                hymnTitle: 'Where Can I Turn for Peace?', hymnLink: 'https://www.youtube.com/watch?v=1Lv3Qv9pjjc', hymnAnalysis: 'The brass serpent was an incredibly simple cure for those who were "bitten" by venomous snakes. Today, we are bitten by the pains, offenses, and deep trials of a fallen world. This hymn asks the profound question of where to turn when we are "anguished" and need a "quiet hand." The answer, beautifully outlined in the final verse, is simply looking to the Savior: "He answers privately... Savior and friend."\nThe gentle, contemplative melody creates a safe space for spiritual healing. It echoes the stark simplicity of looking to Him without overcomplicating our repentance or our desperate search for comfort, reinforcing the divine truth that peace is found in Christ alone.' ,
                songTitle: 'Look and Live', songArtist: 'Katherine Nelson', songLink: 'https://www.youtube.com/watch?v=9UqlaVG6uPY', songAnalysis: 'Elder Christofferson reminds us that the brass serpent is a type of Christ. This uplifting, acoustic track from the Especially for Youth (EFY) album is entirely dedicated to that very scriptural metaphor. The lyrics invite us to let go of our exhausting, complicated attempts to save ourselves and instead, simply "look and live."\nThe song\'s warmth and clarity beautifully deepen our understanding of the day\'s reflection question. It encourages us to strip away the overwhelming complexities of modern life and refocus our eyes entirely on the Savior\'s Atonement, trusting that His simple grace is fully sufficient to heal us.' },
            { id: 'saturday', day: 'Sat', title: 'Standing Firm Under Pressure 🏔️', devotionalText: 'King Balak repeatedly tried to bribe and pressure Balaam to curse the Israelites. Initially, Balaam boldly pushed back, declaring, "I cannot go beyond the word of the Lord my God, to do less or more." In our complex world, we constantly face social, cultural, and professional pressures to compromise our covenants. True discipleship means standing firm in God\'s will, even when the world offers honor or riches to conform.', 
                hymnTitle: 'True to the Faith', hymnLink: 'https://www.youtube.com/watch?v=5biUaVLqq50', hymnAnalysis: 'Balaam\'s initial response to pressure was a resolute refusal to go beyond the word of the Lord, no matter the worldly bribe. In a modern world full of social and professional pressures to compromise, "True to the Faith" serves as an anthem of unbreakable discipleship.\nThe Choir\'s booming, rhythmic delivery of "We will not falter, we will not fail" instills a profound sense of spiritual backbone. Listening to this powerful hymn prepares our minds to accept the day\'s challenge to recommit to our covenants, firmly aligning our choices with God and refusing to trade our spiritual birthright for the world\'s passing applause.' ,
                songTitle: 'Dare to Stand Alone', songArtist: 'Zac Love', songLink: 'https://www.youtube.com/watch?v=fLs3ooo-IYc', songAnalysis: 'This song was heavily inspired by prophetic counsel to hold fast to our standards even when we are the absolute only ones doing so. It aligns perfectly with the theme of pushing back against social, cultural, and professional pressures. The lyrics urge the listener to stand firm in God\'s will, no matter the isolation it may temporarily bring.\nThe upbeat, contemporary pop-rock style frames standing firm not as a heavy, isolating burden, but as an empowering, heroic choice. It perfectly underscores the day\'s challenge by reassuring us that when we boldly align our choices with the Lord\'s will, we are accompanied by heaven and never truly standing alone.' },
            { id: 'sunday', day: 'Sun', title: 'The Antidote to Murmuring 💛', devotionalText: 'The Israelites\' wilderness journey was painfully prolonged because they constantly complained against the Lord. Elder Dale G. Renlund taught that distancing ourselves from God often leads to a sense of entitlement and a tendency to murmur about perceived unfairness. As we participate in Sunday worship, we have the perfect opportunity to replace complaints about our own "wilderness" with profound gratitude for everything the Lord  has  given us.', 
                hymnTitle: 'Count Your Blessings', hymnLink: 'https://www.youtube.com/watch?v=RlMvUEw4g2c', hymnAnalysis: 'The devotional teaches that the perfect, divine antidote to murmuring and entitlement is profound gratitude. No hymn teaches this principle more directly or joyfully than "Count Your Blessings." The energetic cadence of this performance acts as a spiritual reset button for an ungrateful heart.\nAs we partake of the sacrament, the mental exercise of literally naming our blessings "one by one" actively shifts our perspective. It moves us out of the barren "wilderness" of focusing on what we lack, opening our eyes to the incredible, sustaining abundance of what God has already provided for us along the journey.' ,
                songTitle: 'Gratitude', songArtist: 'Brandon Lake', songLink: 'https://www.youtube.com/watch?v=QKVJQkrQ35I', songAnalysis: 'Sunday worship offers us a perfect opportunity to replace our worldly complaints with heavenly praise. Brandon Lake\'s "Gratitude" captures the overwhelming, humbling feeling of having nothing perfectly adequate to offer God except a simple "hallelujah."\n\nThe song builds from a quiet, acoustic whisper to a soaring, passionate chorus, beautifully mirroring the personal journey from a murmuring heart to a fully converted, thankful soul. This deeply moving worship song perfectly answers the reflection question, helping us express deep, authentic gratitude for exactly how God is sustaining us right now, regardless of our circumstances.' }

        const IconLink = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
        const IconPlayCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>;
        const IconPrinter = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;

        // ==========================================
        // COMPONENTS
        // ==========================================

        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);
            if (!show) return null;
            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

        const ToggleAnswer = ({ question, answer }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="mb-6 border-l-4 border-amber-200 pl-4">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="text-left font-bold text-amber-900 w-full hover:text-amber-700 transition-colors flex items-start gap-2"
                    >
                        <span className="mt-1">{isOpen ? <IconChevronDown className="w-5 h-5" /> : <IconChevronRight className="w-5 h-5" />}</span>
                        <span>{question}</span>
                    </button>
                    {isOpen && (
                        <div className="mt-3 p-4 bg-stone-100 rounded-lg text-stone-700 italic border border-stone-200 fade-in">
                            <span className="font-bold not-italic text-stone-500 text-xs uppercase tracking-wider block mb-1">Possible Answer</span>
                            <div className="whitespace-pre-line">{answer}</div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('devotional');
            const [activeDayId, setActiveDayId] = useState('');
            const [showToast, setShowToast] = useState(false);
            const [youthGroup, setYouthGroup] = useState('ym'); 

            useEffect(() => {
                const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
                const todayIndex = new Date().getDay();
                setActiveDayId(dayMap[todayIndex]);
            }, []);

            const getActiveData = (dataArray) => {
                return dataArray.find(d => d.id === activeDayId) || dataArray[0];
            };

            const copyToClipboard = (dayData) => {
                const promptParts = dayData.prompt.split(':');
                const promptLabel = promptParts[0];
                const promptText = promptParts.slice(1).join(':').trim();
                const scriptureText = (dayData.scriptureRef && dayData.scriptureLink)
                    ? `Scripture: ${dayData.scriptureRef}\n${dayData.scriptureLink}\n\n`
                    : ""; 
                const dateStr = dayData.date ? dayData.date : "";
                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                            <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">Journey to the Promised Land: A Thematic Musical Companion</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (
                                        typeof p === 'string' ? <p key={i} className="text-stone-700 mb-3 leading-relaxed whitespace-pre-line">{p}</p> : <React.Fragment key={i}>{p}</React.Fragment>
                                    ))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
