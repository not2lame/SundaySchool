        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Apr 27', title: 'The Ultimate Goal is Holiness 🏔️', text: 'Leaving the bondage of Egypt was a massive miracle, but simply living a comfortable life in the promised land wasn\'t God\'s ultimate goal for Israel. He wanted them to become holy! The Lord declared, "Ye shall be holy: for I the Lord your God am holy." Our mortal journey isn\'t just about escaping the "Egypt" of our sins; it\'s about intentionally seeking holiness through the Savior, who promises He is able to make us holy.', prompt: 'Reflection: In what ways are you actively seeking to become more holy?', scriptureRef: 'Leviticus 19:2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/lev/19?lang=eng&id=p2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Apr 28', title: 'A Willing Offering 🤲', text: 'When the Lord commanded the Israelites to build the tabernacle in the wilderness, they didn\'t hesitate or complain about the cost. The scriptures record that "every one whose heart stirred him up" brought their precious offerings to the Lord. Heavenly Father might not ask us for gold, silver, or fine linen today, but He does ask for our time, our talents, and our willing hearts to build up His kingdom.', prompt: 'Challenge: What is one specific talent or resource the Lord has blessed you with, and how can you offer it to Him with a "willing heart" this week?', scriptureRef: 'Exodus 35:21', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/35?lang=eng&id=p21', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Apr 29', title: 'Symbols of the Savior 🕎', text: 'Every item in the ancient tabernacle was carefully designed to point the Israelites to Jesus Christ. The altar of sacrifice represented giving up sins, the laver of water represented cleansing, and the candlestick symbolized the light of the Holy Ghost. Just as the tabernacle was a physical map guiding Israel back to God\'s presence, the Savior\'s Atonement is the ultimate, living path that leads us back to our Heavenly Home.', prompt: 'Reflection: Think about the objects and ordinances in our modern temples. How do they direct your focus completely toward Jesus Christ and His sacrifice?', scriptureRef: 'Exodus 40:26-27', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/40?lang=eng&id=p26-27', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Apr 30', title: 'Holiness and Happiness ✨', text: 'Sometimes the world tricks us into thinking that living a strictly obedient, holy life will restrict our fun or limit our joy. But President Henry B. Eyring taught that "greater happiness comes from greater personal holiness." As we utilize the Atonement of Jesus Christ to cleanse and perfect us through daily repentance, we experience a profound, lasting peace that the world simply cannot offer. True happiness and holiness are forever linked!', prompt: 'Reflection: How have you seen the "miracle of happiness" come into your life as a direct result of striving to be more holy and keeping your covenants?', scriptureRef: 'Alma 41:10', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/alma/41?lang=eng&id=p10', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'May 1', title: 'Parting the Veil 🕊️', text: 'Under the law of Moses, only the high priest could enter the Holy of Holies, passing through the veil to sprinkle the atoning blood. But the Apostle Paul taught that Jesus Christ is our "Great High Priest." Through the shedding of His own blood, the Savior parted the veil for all of us, empowering every one of God\'s covenant people to "come boldly unto the throne of grace."', prompt: 'Challenge: When you pray today, visualize yourself coming "boldly" to the throne of grace, knowing the Savior has opened the way for you to commune directly with Heavenly Father.', scriptureRef: 'Hebrews 4:16', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/heb/4?lang=eng&id=p16', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'May 2', title: 'The True Sacrifice 🐑', text: 'The detailed animal sacrifices in Leviticus can seem strange to us today, but they perfectly foreshadowed the infinite Atonement of Jesus Christ. Because He offered Himself as the ultimate sacrifice, the Lord no longer requires the shedding of animal blood. Instead, He asks us to offer a "broken heart and a contrite spirit"—a humble willingness to repent and submit entirely to His will.', prompt: 'Reflection: What does offering a "broken heart and a contrite spirit" look like in your daily adult life when you make mistakes?', scriptureRef: '3 Nephi 9:19-20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/3-ne/9?lang=eng&id=p19-20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'May 3', title: 'Washed, Anointed, and Clothed 🏛️', text: 'Before ancient priests could serve in the tabernacle, Moses was commanded to wash, anoint, and clothe them in holy garments. These sacred practices were given anciently and are beautifully preserved in our modern temples today! As we participate in these sacred ordinances, we are endowed with a gift of light and power to help us honor our commitments and navigate the challenges of mortality.', prompt: 'Reflection: As you partake of the sacrament today, ponder the covenants you have made in the house of the Lord. How do those sacred temple covenants give you power in your daily life?', scriptureRef: 'Exodus 40:12-13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/40?lang=eng&id=p12-13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' }
        ];

            { id: 'tuesday', day: 'Tue', date: 'Apr 28', title: 'The Ultimate Draft Pick 🤝', text: 'When God asked the Israelites to build the ancient tabernacle, the guys who stepped up were those whose "heart stirred him up" to do the work. Heavenly Father doesn\'t need you to donate gold or silver to build a physical tent today. But He is drafting guys who are willing to offer their time, energy, and talents with a willing heart to bless the sacrament, serve in their quorum, and build up His kingdom!', prompt: 'Challenge: How can you offer your time with a "willing heart" to help your family or a guy in your quorum today?', scriptureRef: 'Exodus 35:21', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/35?lang=eng&id=p21', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },

            { id: 'thursday', day: 'Thu', date: 'Apr 30', title: 'The Happiness Hack ✨', text: 'The world tries to sell you the lie that keeping God\'s rules ruins your fun or limits your freedom. But President Henry B. Eyring taught the ultimate life hack: "Greater happiness comes from greater personal holiness". Leveling up your spiritual life through daily faith and repentance doesn\'t hold you back; it actually brings the deepest, most lasting confidence and joy you can ever experience!', prompt: 'Challenge: Try proving this "hack" today! Make one choice to be a little more obedient or pure today, and pay attention to the quiet confidence and peace it brings.', scriptureRef: 'Alma 41:10', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/alma/41?lang=eng&id=p10', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'May 1', title: 'Stay Coachable 🏈', text: 'Anciently, the Israelites sacrificed animals to point their minds to the coming of the Savior. But since Jesus Christ completely paid the price through His infinite and eternal sacrifice, He doesn\'t ask for animal sacrifices anymore. Now, He asks you to bring a "broken heart and a contrite spirit". That just means being humble, staying coachable, and being willing to quickly repent and try again when you mess up!', prompt: 'Reflection: What does it look like to have a "broken heart and a contrite spirit" when you make a mistake at home or at school?', scriptureRef: '3 Nephi 9:19-20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/3-ne/9?lang=eng&id=p19-20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'May 2', title: 'Suiting Up for the Lord 👔', text: 'Before the ancient priests could serve in the tabernacle, they had to be washed and clothed in holy garments. Today, we do something super similar! When you go to the temple to do baptisms for the dead, you change into clean white clothes to symbolize purity and that we are all equal before God. It is an epic privilege to suit up, enter the Lord\'s house, and stand in as a savior on Mount Zion for your ancestors.', prompt: 'Challenge: If you have a temple recommend, pull it out and make sure it\'s current. If you don\'t, text your bishop or youth leader today to set up an interview to get one!', scriptureRef: 'Exodus 40:12-13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/40?lang=eng&id=p12-13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'May 3', title: 'VIP Access 🚪', text: 'Anciently, only the high priest could enter the "most holy place" of the tabernacle once a year. But because Jesus Christ is our Great High Priest, His Atonement completely parted the veil and opened the way for everyone! Because of His ultimate sacrifice, you have VIP access to Heavenly Father. You are invited to "come boldly" to His throne of grace in prayer anytime, anywhere.', prompt: 'Reflection: As you pass or prepare the sacrament today, think about the Savior\'s sacrifice that gives you direct access to Heavenly Father. Take a moment to pray "boldly" and thank Him.', scriptureRef: 'Hebrews 4:16', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/heb/4?lang=eng&id=p16', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Apr 27', title: 'The Ultimate Glow-Up ✨', text: 'Escaping Egypt was a massive miracle for the Israelites, but God didn\'t just want them to hang out in the wilderness forever; He wanted them to become holy! He told them, "Ye shall be holy: for I the Lord your God am holy." Walking away from bad habits or toxic influences is an amazing first step, but Heavenly Father\'s ultimate goal is for you to experience a true spiritual glow-up. He wants to help you become a holy, confident daughter of God!', prompt: 'Reflection: What is one way you are actively trying to "glow up" spiritually right now, rather than just settling for being "good enough"?', scriptureRef: 'Leviticus 19:2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/lev/19?lang=eng&id=p2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Apr 28', title: 'Bring Your Unique Vibe 💖', text: 'When God asked the Israelites to build the ancient tabernacle, the people who stepped up were those whose "heart stirred them up." They willingly brought their colorful fabrics, jewelry, and talents to build something beautiful. Heavenly Father doesn\'t need you to donate gold or silver today, but He absolutely needs your uniqueness! He needs your creativity, your kindness, and your willing heart to build up your Young Women class and His kingdom.', prompt: 'Challenge: What is one unique talent or personality trait God has blessed you with? Find a way to use it with a "willing heart" to bless a friend or family member today.', scriptureRef: 'Exodus 35:21', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/35?lang=eng&id=p21', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },

            { id: 'thursday', day: 'Thu', date: 'Apr 30', title: 'The Happiness Hack ☀️', text: 'The world tries to sell you the lie that keeping God\'s rules ruins your fun, cramps your style, or limits your freedom. But President Henry B. Eyring taught the ultimate life hack: "Greater happiness comes from greater personal holiness." Keeping your standards and repenting daily doesn\'t hold you back—it actually brings the deepest, most lasting confidence and joy you can ever experience!', prompt: 'Challenge: Try proving this "hack" today! Make one choice to be a little more obedient or pure today, and pay attention to the quiet confidence and peace it brings.', scriptureRef: 'Alma 41:10', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/alma/41?lang=eng&id=p10', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'May 1', title: 'Stay Teachable 🕊️', text: 'Anciently, the Israelites sacrificed animals to point their minds to the coming of the Savior. But since Jesus Christ completely paid the price through His perfect Atonement, He doesn\'t ask for animal sacrifices anymore. Now, He asks you to bring a "broken heart and a contrite spirit." That just means being humble, staying teachable, and being willing to quickly repent and try again when you make a mistake!', prompt: 'Reflection: What does it look like to have a "broken heart and a contrite spirit" when you have a disagreement with your parents or a friend?', scriptureRef: '3 Nephi 9:19-20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/3-ne/9?lang=eng&id=p19-20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'May 2', title: 'Dressed in White 🤍', text: 'Before the ancient priests could serve in the tabernacle, they had to be washed and clothed in holy garments. Today, we do something super similar! When you go to the temple to do baptisms, you change into clean white clothes to symbolize purity. It is a beautiful reminder that the world\'s labels don\'t matter in the Lord\'s house—we are all equal, beloved daughters of Heavenly Father.', prompt: 'Challenge: If you have a temple recommend, pull it out and make sure it\'s current! If you don\'t, text your Bishop or Young Women president today to find out how you can prepare to get one.', scriptureRef: 'Exodus 40:12-13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/40?lang=eng&id=p12-13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'May 3', title: 'VIP Access 🚪👑', text: 'Anciently, only the high priest could enter the "most holy place" of the tabernacle once a year. But because Jesus Christ is our Great High Priest, His Atonement completely parted the veil and opened the way for everyone! Because of His ultimate sacrifice, you have VIP access to Heavenly Father. You are invited to "come boldly" to His throne of grace in prayer anytime, anywhere, and about anything.', prompt: 'Reflection: As you take the sacrament today, think about the Savior\'s sacrifice that gives you direct access to Heavenly Father. Take a moment to pray "boldly" and thank Him for His love.', scriptureRef: 'Hebrews 4:16', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/heb/4?lang=eng&id=p16', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/18?lang=eng' }

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'The Ultimate Goal is Holiness 🏔️', devotionalText: 'Leaving the bondage of Egypt was a massive miracle, but simply living a comfortable life in the promised land wasn\'t God\'s ultimate goal for Israel. He wanted them to become holy! The Lord declared, "Ye shall be holy: for I the Lord your God am holy." Our mortal journey isn\'t just about escaping the "Egypt" of our sins; it\'s about intentionally seeking holiness through the Savior, who promises He is able to make us holy.',

            return (

                    {message}
                </div>
            );
        };

            const copyToClipboard = (dayData) => {
                const promptParts = dayData.prompt.split(':');
                const promptLabel = promptParts[0];
                const promptText = promptParts.slice(1).join(':').trim();
                const scriptureText = (dayData.scriptureRef && dayData.scriptureLink)
                    ? `Scripture: ${dayData.scriptureRef}\n${dayData.scriptureLink}\n\n`
                    : ""; 
                const dateStr = dayData.date ? dayData.date : "";
                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                            <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">The Path to Holiness: A Thematic Musical Companion</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (
                                        typeof p === 'string' ? <p key={i} className="text-stone-700 mb-3 leading-relaxed whitespace-pre-line">{p}</p> : <React.Fragment key={i}>{p}</React.Fragment>
                                    ))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
