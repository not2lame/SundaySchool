    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "The Lord Was with Joseph",
            dateRange: "March 9 – March 15, 2026",
            valediction: "May you feel the Savior’s infinite capacity to save and sustain you , remaining faithful as you build a foundation of preparedness and peace."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Mar 9', title: 'The Lord Was With Him 🤝', text: 'Joseph’s life was full of extreme highs and devastating lows—betrayed by his own family, sold as a slave, and falsely imprisoned. Yet, the scriptures repeatedly remind us that through it all, \"the Lord was with Joseph.\" Elder Dieter F. Uchtdorf taught that the Lord never left Joseph because Joseph never left the Lord. God is intimately aware of us and stands ready to be with us, both in our times of prosperity and in our darkest pits.', prompt: 'Reflection: When have you distinctly felt the Lord’s presence and comfort during a particularly difficult season of life?', scriptureRef: 'Genesis 39:2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/39?lang=eng&id=p2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Mar 10', title: 'Not a Cosmic Vending Machine 🎰', text: 'Joseph was thrown into a dungeon *because* he valiantly chose to keep the law of chastity. Sometimes doing the right thing actually seems to make life harder! Elder D. Todd Christofferson reminded us that God’s plan is not a \"cosmic vending machine\" where righteous choices instantly dispense the blessings we want on our exact timetable. True faith is trusting in God’s character and timeline, knowing that all things will eventually work together for our good.', prompt: 'Challenge: Are you keeping the commandments just to get a reward, or because you love God? Make a conscious choice today to obey Him purely out of love and trust.', scriptureRef: 'Romans 8:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/rom/8?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Mar 11', title: 'Fleeing Temptation 🏃‍♂️', text: 'When Potiphar’s wife aggressively tempted Joseph, he didn’t stick around to debate or negotiate. He literally left his garment and fled! As adults, we face both subtle and overt temptations that can compromise our covenants—whether it\'s unethical practices at work, inappropriate media, or toxic gossip. Joseph’s example teaches us that sometimes the most spiritually mature thing to do is physically or mentally remove ourselves from a compromising situation immediately.', prompt: 'Reflection: Is there a situation, media habit, or environment in your life right now that you need to intentionally \"flee\" from?', scriptureRef: 'Genesis 39:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/39?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Mar 12', title: 'He Understands the Pit ❤️‍🩹', text: 'When Joseph was thrown into the pit by his brothers, he surely felt profound betrayal, anxiety, and loneliness. Because Jesus Christ lived a perfect, sinless life, we sometimes wrongly assume He can\'t relate to our messy mortal struggles. But as He descended *below* all things, He experienced our exact pains. When we face heartache, depression, exhaustion, or betrayal, we can turn to the Savior, knowing He says to us, \"I know perfectly how you feel.\"', prompt: 'Reflection: How does knowing that Jesus Christ experienced excruciating loneliness and betrayal change how you approach Him in prayer during your own trials?', scriptureRef: 'Matthew 26:38', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/matt/26?lang=eng&id=p38', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Mar 13', title: 'Giving God the Glory ✨', text: 'When Pharaoh asked Joseph to interpret his terrifying dreams, Joseph could have easily used the moment to gain personal glory or secure his freedom. Instead, his immediate response was, \"It is not in me: God shall give Pharaoh an answer of peace.\" True discipleship means pointing others to the Source of our light and recognizing that our gifts, talents, and deliverance ultimately come from Heavenly Father.', prompt: 'Challenge: Look for an opportunity today to humbly deflect personal praise and give the glory to God for the good things you have been able to accomplish.', scriptureRef: 'Genesis 41:16', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/41?lang=eng&id=p16', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Mar 14', title: 'Preparing for the Famine 🌾', text: 'Joseph’s inspired interpretation of Pharaoh’s dreams led to life-saving preparation for a devastating seven-year famine. The Lord continues to warn us of coming physical and spiritual hardships through His living prophets today. As we incrementally follow prophetic counsel to prepare our homes temporally and build a solid spiritual foundation, we can face an uncertain future with confidence and peace rather than fear.', prompt: 'Reflection: What is one small, practical step you can take this weekend to better prepare your home or your heart for future hardships?', scriptureRef: 'Genesis 41:53-54', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/41?lang=eng&id=p53-54', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Mar 15', title: 'A Similitude of the Savior 🍞', text: 'Joseph’s life is a beautiful type and shadow of Jesus Christ. Both were beloved sons, both were betrayed for pieces of silver, and both were falsely accused. Ultimately, Joseph became the savior of his family, generously providing life-saving bread to the very brothers who hurt him. As we partake of the sacrament today, we remember Jesus Christ, the true \"Bread of Life,\" who provides the ultimate forgiveness and deliverance for the entire human family.', prompt: 'Challenge: During the sacrament today, ponder the parallels between Joseph saving the brothers who betrayed him, and the Savior\'s infinite capacity to forgive and save us despite our mistakes.', scriptureRef: 'John 6:35', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/6?lang=eng&id=p35', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' }
        ];

             { id: 'monday', day: 'Mon', date: 'Mar 9', title: 'He Has Your Back 🤝', text: 'Joseph got thrown into a literal pit by his brothers, sold as a slave, and falsely accused of a crime. Yet, through all of that brutal unfairness, the scriptures remind us that \"the Lord was with Joseph.\" Elder Dieter F. Uchtdorf taught that the Lord never left Joseph because Joseph never left the Lord. Whatever you are going through right now—whether it\'s sports drama, stress at school, or feeling lonely—Heavenly Father is in your corner.', prompt: 'Reflection: Think about a tough time you recently went through. How did the Lord show up and prove He was \"with you\" in that situation?', scriptureRef: 'Genesis 39:2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/39?lang=eng&id=p2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 10', title: 'Not a Cosmic Vending Machine 🎰', text: 'Joseph absolutely refused to break the law of chastity, and his \"reward\" was being thrown into prison! Sometimes doing the right thing actually seems to make life harder in the short term. Elder D. Todd Christofferson taught that God isn\'t a \"cosmic vending machine\" where obedience instantly spits out the exact blessing we want right when we want it. True faith is trusting God\'s long-term plan, even when the immediate results are tough.', prompt: 'Challenge: Are you only keeping the commandments because you want a reward? Make a conscious choice today to obey God purely because you love Him, no matter the immediate outcome.', scriptureRef: 'Romans 8:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/rom/8?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 11', title: 'The Power to Flee 🏃‍♂️💨', text: 'When Potiphar’s wife aggressively tempted Joseph, he didn\'t stick around to argue or test his willpower. He literally dropped his coat and sprinted out of there! When you face intense temptations—like clicking a bad link, listening to the wrong music, or staying at a sketchy party—the strongest, most priesthood-worthy thing you can do is physically or digitally run away.', prompt: 'Challenge: Make your \"game plan\" right now. What is your exact exit strategy the next time a bad image or a compromising situation suddenly pops up on your phone or in real life?', scriptureRef: 'Genesis 39:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/39?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 12', title: 'He Understands the Pit 🕳️', text: 'Sitting in the dark at the bottom of a pit, Joseph probably felt totally abandoned. Because Jesus Christ lived a perfect life, we sometimes think He doesn\'t \"get\" our messes. But He descended *below* all things to experience our exact pains. Whether you\'re dealing with anxiety, exhaustion, or feeling betrayed by your friends, the Savior knows exactly how you feel and knows perfectly how to help you.', prompt: 'Reflection: How does knowing that Jesus Christ has felt your exact pain and loneliness change the way you pray to Him when you are struggling?', scriptureRef: 'Matthew 26:38', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/matt/26?lang=eng&id=p38', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 13', title: 'Pass the Credit 🙌', text: 'When Pharaoh needed his dream interpreted, Joseph could have totally flexed his spiritual gifts and taken all the credit to win his freedom. Instead, his immediate response was, \"It is not in me: God shall give Pharaoh an answer of peace.\" True confidence as a priesthood man is pointing the glory back to God. Our talents and our deliverance ultimately come from Him.', prompt: 'Challenge: When someone compliments you today on a talent or a job well done, say \"thank you\" out loud, but silently give the credit and gratitude to Heavenly Father for blessing you with that ability.', scriptureRef: 'Genesis 41:16', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/41?lang=eng&id=p16', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 14', title: 'Don\'t Cram for the Exam 📚', text: 'Joseph warned Pharaoh about a coming seven-year famine, and they started preparing the very next day. Elder David A. Bednar taught that mortality is a test, and just like school, procrastinating your preparation leads to failing the exam. Whether it\'s prepping to serve a mission, making temple covenants, or building real spiritual resilience, putting in the work *now* means you won\'t panic when life gets hard.', prompt: 'Reflection: What is one spiritual \"subject\" (like reading the Book of Mormon daily or paying tithing) that you need to stop cramming for and start preparing for consistently?', scriptureRef: 'Genesis 41:53-54', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/41?lang=eng&id=p53-54', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 15', title: 'The Ultimate Brotherhood 🍞', text: 'Joseph\'s life is an incredible symbol of Jesus Christ. Joseph was betrayed by his brothers for pieces of silver, yet he ended up being the exact person who saved them from starvation with life-saving bread. He forgave them and rescued them! As you participate in the sacrament ordinance today, think of the Savior, the true \"Bread of Life.\" Even when we mess up, He stands ready to forgive, heal, and save us.', prompt: 'Challenge: As you prepare or pass the sacrament today, think about the Savior offering you the \"Bread of Life.\" Ponder on His incredible willingness to forgive your mistakes, just as Joseph forgave his brothers.', scriptureRef: 'John 6:35', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/6?lang=eng&id=p35', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Mar 9', title: 'He Has Your Back 🤝', text: 'Joseph’s life had extreme highs and devastating lows—he was betrayed by his brothers, sold as a slave, and falsely imprisoned. Yet, the scriptures continually remind us that through all of that brutal unfairness, \"the Lord was with Joseph\". Elder Dieter F. Uchtdorf taught that the Lord never left Joseph because Joseph never left the Lord. Whether you are dealing with friend drama, loneliness, or stress at school, Heavenly Father is in your corner and is always ready to strengthen and comfort you.', prompt: 'Reflection: Think about a tough time you recently went through. How did the Lord show up and prove He was \"with you\" in that situation?', scriptureRef: 'Genesis 39:2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/39?lang=eng&id=p2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 10', title: 'Not a Cosmic Vending Machine 🎰', text: 'Joseph absolutely refused to break the law of chastity, and his \"reward\" was being thrown into prison! Sometimes doing the right thing—like keeping your standards or avoiding bad media—seems to leave you isolated or makes life harder. Elder D. Todd Christofferson taught that God isn\'t a \"cosmic vending machine\" where obedience instantly spits out the exact blessing we want right when we want it. True faith is trusting God\'s long-term plan, knowing that doing the right thing is always worth it in the end.', prompt: 'Challenge: Are you only keeping the commandments because you want a reward? Make a conscious choice today to obey God purely because you love Him, no matter the immediate outcome.', scriptureRef: 'Romans 8:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/rom/8?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 11', title: 'The Power to Flee 🏃‍♀️💨', text: 'When Potiphar’s wife aggressively tempted Joseph, he didn\'t stick around to argue or test his willpower; he literally dropped his coat and sprinted out of there! When you face intense temptations—like clicking a bad link, joining in on toxic gossip, or staying at a sketchy party—the strongest thing you can do is physically or digitally run away.', prompt: 'Challenge: Make your \"game plan\" right now. What is your exact exit strategy the next time a bad image or a compromising situation suddenly pops up on your phone or in real life?', scriptureRef: 'Genesis 39:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/39?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 12', title: 'He Understands the Pit 🕳️❤️‍🩹', text: 'Sitting in the dark at the bottom of a pit or in a prison cell, Joseph probably felt totally abandoned. Because Jesus Christ lived a perfect life, we sometimes think He doesn\'t \"get\" our messy mortal struggles. But He descended *below* all things to experience our exact pains. Whether you\'re dealing with anxiety, exhaustion, or feeling betrayed by your friends, the Savior knows exactly how you feel and knows perfectly how to help you.', prompt: 'Reflection: How does knowing that Jesus Christ has felt your exact pain and loneliness change the way you pray to Him when you are struggling?', scriptureRef: 'Matthew 26:38', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/matt/26?lang=eng&id=p38', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 13', title: 'Pass the Credit ✨', text: 'When Pharaoh needed his dream interpreted, Joseph could have totally flexed his spiritual gifts and taken all the credit to win his freedom. Instead, his immediate response was, \"It is not in me: God shall give Pharaoh an answer of peace\". True confidence as a covenant daughter of God is pointing the glory back to Him. Your unique gifts, talents, and successes ultimately come from Heavenly Father!', prompt: 'Challenge: When someone compliments you today on a talent or a job well done, say \"thank you\" out loud, but silently give the credit and gratitude to Heavenly Father for blessing you with that ability.', scriptureRef: 'Genesis 41:16', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/41?lang=eng&id=p16', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 14', title: 'Don\'t Cram for the Exam 📚', text: 'Joseph warned Pharaoh about a coming seven-year famine, and they started preparing the very next day. Elder David A. Bednar taught that mortality is a test, and just like school, procrastinating your preparation leads to failing the exam. Whether it\'s prepping for your future or building real spiritual resilience, putting in the daily work *now* (like reading your scriptures) means you won\'t panic when life gets hard.', prompt: 'Reflection: What is one spiritual \"subject\" (like reading the Book of Mormon daily or paying tithing) that you need to stop cramming for and start preparing for consistently?', scriptureRef: 'Genesis 41:53-54', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/41?lang=eng&id=p53-54', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 15', title: 'The Ultimate Forgiveness 🍞💕', text: 'Joseph\'s life is an incredible symbol of Jesus Christ. Joseph was betrayed by his brothers for pieces of silver, yet he ended up being the exact person who saved them from starvation with life-saving bread. He forgave them and rescued them! As you participate in the sacrament ordinance today, think of the Savior, the true \"Bread of Life\". Even when we mess up, He stands ready to completely forgive, heal, and save us.', prompt: 'Challenge: As you take the sacrament today, think about the Savior offering you the \"Bread of Life\". Ponder on His incredible willingness to forgive your mistakes, just as Joseph forgave his brothers.', scriptureRef: 'John 6:35', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/6?lang=eng&id=p35', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/11?lang=eng' }

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'The Lord Was With Him 🤝', devotionalText: 'Joseph’s life was full of extreme highs and devastating lows—betrayed by his own family, sold as a slave, and falsely imprisoned. Yet, the scriptures repeatedly remind us that through it all, \"the Lord was with Joseph.\"\n\nReflection: When have you distinctly felt the Lord’s presence and comfort during a particularly difficult season of life?', 
                hymnTitle: 'Be Still, My Soul', hymnLink: 'https://www.youtube.com/watch?v=OudatufR4To', hymnAnalysis: 'This classic hymn resonates deeply with Joseph\'s journey in the pit and the prison. The lyrics counsel patience and trust, reminding us that God will guide the future as He has the past. The Tabernacle Choir\'s sweeping arrangement invites a profound sense of peace. It affirms the devotional\'s message that God is intimately aware of our struggles, providing a musical comfort that we are never abandoned by our \"best, thy heav\'nly Friend.\"' ,
                songTitle: 'Rescue', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=9PugD11k3JU', songAnalysis: 'This modern anthem serves as a moving message sung from the perspective of a loving Heavenly Father to a struggling child. The promise to \"send out an army to find you\" embodies the sustaining power Joseph must have felt when he was betrayed and isolated. It perfectly echoes Elder Uchtdorf\'s teaching, reminding us that no matter how deep our pit, the Lord stands ready to actively reach out and rescue us in the middle of our darkest nights.' },
            { id: 'tuesday', day: 'Tue', title: 'Not a Cosmic Vending Machine 🎰', devotionalText: 'Joseph was thrown into a dungeon because he valiantly chose to keep the law of chastity. Sometimes doing the right thing actually seems to make life harder! Elder D. Todd Christofferson reminded us that God’s plan is not a \"cosmic vending machine\" where righteous choices instantly dispense the blessings we want on our exact timetable.\n\nChallenge: Are you keeping the commandments just to get a reward, or because you love God? Make a conscious choice today to obey Him purely out of love and trust.',

        // 1. Toast Notification Component
        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);

            if (!show) return null;

            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>

                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>

                            <button 
                                onClick={() => copyToClipboard(data)}
                                className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors"
                            >
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        {/* Toggle Switch for YM/YW */}
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button 
                                onClick={() => setYouthGroup('ym')}
                                className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}
                            >
                                Young Men
                            </button>
                            <button 
                                onClick={() => setYouthGroup('yw')}
                                className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}
                            >
                                Young Women
                            </button>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            {/* Decorative Top Border */}
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>

                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button 
                                onClick={() => copyToClipboard(data)}
                                className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors"
                            >
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Soul</h2>
                            <p className="mt-2 text-stone-500 text-sm">Music to invite the Spirit into your daily study.</p>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            
                            <div className="space-y-8">
                                {/* Hymn Section */}
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Hymn Selection
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>

                                <hr className="border-stone-100" />

                                {/* Song Section */}
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Contemporary Song
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full">
                                    <h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1>
                                 </div>
                                 <button 
                                    onClick={() => window.print()} 
                                    className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all"
                                    aria-label="Print Discussion Guide"
                                    title="Print Discussion Guide"
                                >
                                    <IconPrinter className="w-6 h-6" />
                                </button>
                            </div>

                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            
                            {/* --- ADDED IMAGE HERE --- */}
                            <div className="mb-8">
                                <img 
                                    src="Graphic.jpg" 
                                    alt="Infographic: Old Testament" 
                                    className="w-full h-auto rounded-lg shadow-md border border-stone-200"
                                    onError={(e) => {e.target.style.display = 'none'}} 
                                />
                            </div>
                            {/* ------------------------ */}
                            
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    
                                    {section.content && section.content.map((p, i) => (
                                        <p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p>
                                    ))}

                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}

                                    {section.quote && (
                                        <blockquote className="border-l-4 border-stone-300 pl-4 py-1 my-4 text-stone-600 italic bg-stone-50 p-3 rounded-r-lg">
                                            {section.quote}
                                        </blockquote>
                                    )}

                                    {section.question && (
                                        <ToggleAnswer question={section.question} answer={section.answer} />
                                    )}

                                    {section.questions && section.questions.map((qItem, qIdx) => (
                                        <ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // Dynamic Footer based on view
            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    {/* Header */}
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>

                            {/* Main Nav Tabs */}
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Secondary Day Navigation (Horizontal Scroll) - Only show for Daily, Youth, Songs */}
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button
                                            key={d.id}
                                            onClick={() => setActiveDayId(d.id)}
                                            className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}
                                        >
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Content Area - Scrollable */}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>

                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
