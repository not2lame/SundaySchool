    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "Remember This Day, in Which Ye Came Out from Egypt - Exodus 7-13",
            dateRange: "April 6 – April 12, 2026",
            valediction: "Remember your deliverance through Jesus Christ. Yield to the Spirit, cast out sin in haste, and rejoice in the redeeming blood of the Lamb who saves you from bondage."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Apr 6', title: 'There is None Like Him 🌍', text: 'The plagues of Egypt were undeniable proof that Jehovah is infinitely more powerful than any worldly influence or false god. The Lord wanted to leave no doubt in the minds of the Israelites that \'there is none like me in all the earth.\' When we face our own modern trials or feel trapped by impossible circumstances, we can find peace in remembering that the exact same God who parted the Red Sea is fighting our battles today!', prompt: 'Reflection: How has the Lord unmistakably demonstrated His unique power and love in your life recently?', scriptureRef: 'Exodus 9:14', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/9?lang=eng&id=p14', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Apr 7', title: 'Softening Our Hearts 💧', text: 'Pharaoh repeatedly hardened his heart, stubbornly refusing to yield to God\'s will despite witnessing clear miracles. As adults navigating complex lives, we can sometimes develop our own \'hard hearts\' through pride, resentment, or by ignoring the promptings of the Spirit. True spiritual maturity requires us to intentionally put off the natural man and soften our hearts through daily repentance and humility.', prompt: 'Challenge: Identify one area where you might be resisting the Spirit\'s promptings or holding onto pride. Pray today for the Savior\'s help to create a softer, more submissive heart.', scriptureRef: 'Mosiah 3:19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/mosiah/3?lang=eng&id=p19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Apr 8', title: 'Beware of Worldly Imitations 🎭', text: 'Pharaoh’s magicians used cheap tricks to imitate Moses\'s early miracles, but their imitations actually made the plagues worse and offered no real deliverance. The adversary still offers us imitations of joy today—like seeking validation through status, wealth, or worldly applause. These imitations might look appealing at first, but only the true power of Jesus Christ offers permanent healing and lasting peace.', prompt: 'Reflection: Are there any \'worldly imitations\' of happiness distracting you from the lasting joy found in the gospel of Jesus Christ?', scriptureRef: 'Exodus 8:18-19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/8?lang=eng&id=p18-19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Apr 9', title: 'The Lamb Without Blemish 🐑', text: 'The Lord commanded Israel to use an unblemished male lamb for the Passover ritual. This specific instruction perfectly foreshadowed Jesus Christ, the true \'Lamb of God,\' who was completely sinless and unspotted by the world. Because of His absolute perfection, He was the only one capable of paying the ultimate price to deliver us from spiritual death and the bondage of sin.', prompt: 'Reflection: How does recognizing the Savior\'s absolute perfection and purity deepen your personal gratitude for His atoning sacrifice?', scriptureRef: 'Exodus 12:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Apr 10', title: 'Blood on the Doorposts 🚪', text: 'The Israelites were saved from the destroying angel by placing the lamb\'s blood on their doorposts as a token of their obedience. Elder Gerrit W. Gong taught that this \'passing over\' represents Christ overcoming sin and death, and His atoning blood gives the Good Shepherd power to gather and protect us. We symbolically apply His protective blood today by making and faithfully keeping our sacred temple covenants.', prompt: 'Challenge: What can you do today to make your home a holier place, symbolically applying the Savior\'s spiritual protection to the \'doorposts\' of your own life?', scriptureRef: 'Exodus 12:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Apr 11', title: 'Leaving \'Egypt\' in Haste 🏃‍♂️', text: 'The Israelites were commanded to eat the Passover meal in haste, with shoes on their feet, ready to depart at a moment\'s notice. They ate unleavened bread, symbolizing a swift departure from the \'leaven\' of corruption. When the Lord prompts us to repent or leave a bad habit behind, we shouldn\'t linger, hesitate, or negotiate with our sins. We must abandon worldly influences with absolute urgency!', prompt: 'Reflection: Is there a habit, grudge, or worldly influence in your life right now that you need to leave behind \'in haste\'?', scriptureRef: 'Exodus 12:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Apr 12', title: 'Are You Still Willing? 🍞💧', text: 'Just as the Passover helped ancient Israel remember their physical deliverance, the sacrament helps us remember our spiritual deliverance. Elder Kevin W. Pearson reminds us that taking the sacrament isn\'t a passive ritual; it\'s a powerful moment to witness to God that we are \'willing\' to take His Son\'s name upon us. It is a weekly opportunity to increase our determination to center our lives completely on Jesus Christ.', prompt: 'Challenge: As you partake of the sacrament today, silently ask yourself Elder Pearson\'s penetrating question: \'Am I still willing?\' Commit to renewing your covenants with greater, more deliberate intent this week.', scriptureRef: 'Moroni 4:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/moroni/4?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' }
        ];

        const YM_DATA = [
            { id: 'monday', day: 'Mon', date: 'Apr 6', title: 'True Power vs. Cheap Tricks 🪄', text: 'Pharaoh’s magicians tried to copy Moses’s miracles with their own magic tricks, but their imitations actually made the plagues worse and offered zero real deliverance. The adversary tries to do the exact same thing today by offering us fake \'happiness\' through temporary thrills, sketchy media, or seeking popularity. Those worldly tricks might look cool at first, but only God holds true priesthood power, and only the Savior can offer permanent peace and joy.', prompt: 'Reflection: What is a \'cheap trick\' the world uses to try to imitate true happiness, and how does the Savior\'s true power beat it every time?', scriptureRef: 'Exodus 9:14', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/9?lang=eng&id=p14', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Apr 7', title: 'Be a Sponge, Not a Rock 🧽', text: 'Pharaoh had a \'hard heart,\' which meant he was stubborn, prideful, and totally refused to submit to God. Think about pouring water on a rock versus a sponge. A rock repels the water, but a sponge absorbs it. Being a strong Aaronic Priesthood man doesn\'t mean being tough and stubborn; it actually means being humble, submissive, and coachable so you can absorb the promptings of the Holy Spirit!', prompt: 'Challenge: Are you acting like a rock or a sponge when your parents or leaders give you advice? Try being extra \'absorbent\' and teachable today.', scriptureRef: 'Mosiah 3:19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/mosiah/3?lang=eng&id=p19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 8', title: 'The Unblemished Hero 🐑', text: 'For the Passover meal, God told the Israelites to use a male lamb \'without blemish\'. This was a perfect, ancient symbol for Jesus Christ! Because the Savior was completely perfect and unblemished by the sins of the world, He was the only one capable of stepping up to pay the ultimate price to rescue us from our own mistakes and spiritual captivity.', prompt: 'Reflection: How does knowing that Jesus Christ was perfectly sinless increase your gratitude that He chose to suffer for your mistakes?', scriptureRef: 'Exodus 12:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 9', title: 'The Ultimate Defense Shield 🛡️', text: 'The Israelites painted the blood of the lamb on their doorposts as a token of obedience to protect their families from the destroying angel. Today, you don\'t need literal blood on your door, but you definitely need spiritual protection! Elder Gerrit W. Gong taught that keeping your covenants applies the Savior\'s Atonement to your life, acting like the ultimate defense shield against the adversary\'s plagues.', prompt: 'Challenge: What is one specific thing you can do today to invite the Spirit and build up the spiritual \'defense shield\' around your bedroom or your home?', scriptureRef: 'Exodus 12:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 10', title: 'Drop It and Run 🏃‍♂️💨', text: 'When it was finally time to leave Egypt, God commanded the Israelites to eat their Passover meal \'in haste\' with their shoes already on and staffs in their hands. They couldn\'t even wait for their bread to rise! When the Spirit prompts you to repent, drop a bad habit, or walk away from a sketchy situation, don\'t linger or try to negotiate. Drop the worldly \'leaven\' and run toward the Savior immediately!', prompt: 'Reflection: Is there a worldly habit, app, or influence you need to leave behind \'in haste\' right now so you can be spiritually prepared?', scriptureRef: 'Exodus 12:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 11', title: 'Celebrate the Wins! 🎉', text: 'After escaping Egypt, the Israelites sang, danced, and celebrated their massive victory with tambourines! Being a disciple doesn\'t mean you have to be serious 100% of the time. The gospel is a \'voice of gladness\'. God wants you to be happy! When you overcome a temptation, ace a hard test, or feel God\'s help in your life, it is totally appropriate to celebrate the miracles God performs for you.', prompt: 'Challenge: What is a \'win\' or a miracle God has helped you with recently? Take a minute to celebrate it and thank Him for having your back.', scriptureRef: 'Doctrine and Covenants 136:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/136?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 12', title: 'Are You Still Willing? 🍞💧', text: 'Taking the sacrament isn\'t just a passive ritual where you sit back, eat bread, and drink water. Elder Kevin W. Pearson reminds us that it is a powerful moment to witness to God that you are truly \'willing\' to take His Son\'s name upon you and keep His commandments. It is your weekly opportunity to hit the reset button and prove your loyalty to the Savior.', prompt: 'Challenge: As you prepare, bless, or pass the sacrament today, silently ask yourself, \'Am I still willing to follow Jesus Christ no matter what?\' Treat the ordinance with the respect of a true disciple.', scriptureRef: 'Moroni 4:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/moroni/4?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Apr 6', title: 'The Ultimate Influencer 👑', text: 'God sent the plagues to show that "there is none like Him in all the earth." It is so easy to get caught up in who is popular or powerful on social media, but Heavenly Father holds the ultimate power! When life gets overwhelming or you feel trapped, remember that the God of the universe is in your corner, and His loving influence is the only one that truly matters.', prompt: 'Reflection: Who or what are you letting influence you the most right now? How can you let God be the biggest influence in your life today?', scriptureRef: 'Exodus 9:14', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/9?lang=eng&id=p14', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Apr 7', title: 'Sponge vs. Rock 🧽', text: 'Pharaoh had a "hard heart," meaning he was stubborn and totally ignored God’s miracles. Think of a rock and a sponge. A rock completely repels water, but a sponge soaks it right up! As a covenant daughter of God, having a "soft heart" means being humble and ready to soak up the promptings of the Holy Ghost, instead of being stubborn when you receive good advice.', prompt: 'Challenge: Try to be a "sponge" today! When a parent or Young Women leader gives you advice, or when you feel a prompting from the Spirit, soak it up and act on it instead of resisting.', scriptureRef: 'Mosiah 3:19', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/mosiah/3?lang=eng&id=p19', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 8', title: 'The Perfect Rescuer 🐑', text: 'For the very first Passover, the Israelites were told to use a lamb "without blemish." This was a beautiful, ancient symbol pointing straight to Jesus Christ! Because the Savior was completely pure, perfect, and sinless, He is the only one capable of stepping in to rescue us from our mistakes, heartaches, and spiritual captivity.', prompt: 'Reflection: How does knowing that Jesus Christ is perfectly pure and sinless make you feel about His loving choice to suffer for you?', scriptureRef: 'Exodus 12:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 9', title: 'Your Spiritual Safe Space 🚪✨', text: 'The Israelites painted the lamb\'s blood on their doorposts as a sign of obedience to protect their families from the destroying angel. Today, you don\'t need paint on your door, but you *do* need spiritual protection! When you keep your covenants and try your best to follow the Savior, you are applying His protective power to your life, making your heart and your home a safe space from the world\'s negativity.', prompt: 'Challenge: What is one simple thing you can do today to make your bedroom a spiritual "safe space" where the Holy Ghost can easily dwell?', scriptureRef: 'Exodus 12:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 10', title: 'Ditch the Drama in Haste 🏃‍♀️💨', text: 'When it was finally time to escape Egypt, God told the Israelites to eat their Passover meal "in haste" with their shoes already on! They didn\'t even wait for their bread to rise. When the Spirit prompts you to walk away from toxic gossip, drop a bad habit, or leave a sketchy situation, don\'t linger or make excuses. Ditch the worldly influences and run toward the Savior immediately.', prompt: 'Reflection: Is there a worldly habit, a negative app on your phone, or a toxic situation you need to walk away from "in haste" right now?', scriptureRef: 'Exodus 12:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/12?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 11', title: 'Dance It Out! 💃🎉', text: 'Did you know that after finally escaping Egypt, Miriam and the women grabbed their tambourines, sang, and danced to celebrate their miracle? Sometimes we think being righteous means being super serious all the time, but the gospel is actually a "voice of gladness." Heavenly Father loves it when you are happy and when you celebrate the amazing things He does for you!', prompt: 'Challenge: Think of one specific "win" or mini-miracle God has blessed you with this week. Put on your favorite uplifting song and celebrate it today!', scriptureRef: 'Doctrine and Covenants 136:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/136?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 12', title: 'Are You Still Willing? 🍞💧', text: 'Taking the sacrament isn\'t just a passive routine where you sit back and eat bread. Elder Kevin W. Pearson reminds us that the sacrament prayers actually ask us if we are truly "willing" to take the Savior\'s name upon us. It’s your weekly chance to hit the reset button, show your total loyalty to Jesus Christ, and invite the Holy Ghost to be your constant companion!', prompt: 'Challenge: During the sacrament today, silently ask yourself, "Am I still willing to follow Jesus Christ no matter what?" Listen closely to the prayers and make a fresh, genuine commitment to Him.', scriptureRef: 'Moroni 4:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/moroni/4?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/15?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'There is None Like Him 🌍', devotionalText: 'The plagues of Egypt were undeniable proof that Jehovah is infinitely more powerful than any worldly influence or false god. The Lord wanted to leave no doubt in the minds of the Israelites that \'there is none like me in all the earth.\' When we face our own modern trials or feel trapped by impossible circumstances, we can find peace in remembering that the exact same God who parted the Red Sea is fighting our battles today!', 
                hymnTitle: 'Redeemer of Israel', hymnLink: 'https://www.youtube.com/watch?v=qIK4rXTG8KQ', hymnAnalysis: '"Redeemer of Israel" is a magnificent hymn that echoes the awe and reverence of Israel\'s miraculous deliverance. The devotional focuses on God\'s infinite power and the proof that there is none like Jehovah in all the earth. As the choir sings, "Our shadow by day, and our pillar by night," we are reminded that the exact same God who led the Israelites and parted the Red Sea continues to fight our battles today. The majestic and triumphant tone of The Tabernacle Choir\'s performance reinforces the certainty that the Lord is undeniably powerful. When we face our own modern trials and feel trapped by impossible circumstances, this hymn serves as a musical anchor. It invites us to ponder the reflection question by recognizing the unmistakable ways the Lord rescues and sustains us, acting as our personal Redeemer and Deliverer.' ,
                songTitle: 'Way Maker', songArtist: 'Leeland', songLink: 'https://www.youtube.com/watch?v=Ecxjgu9P-dk', songAnalysis: '"Way Maker" is a profound contemporary anthem that powerfully testifies of God\'s unique ability to perform miracles and alter impossible circumstances. The devotional teaches that God wanted to leave no doubt in the minds of the Israelites regarding His supreme power. The lyrics declare Him to be a "Way maker, miracle worker, promise keeper, light in the darkness," perfectly describing the God of the Exodus. Listening to this live performance, we can feel a deep sense of trust and surrender. The repeated chorus of "That is who You are" acts as a personal testimony that God is the same yesterday, today, and forever. It helps us face our trials with faith, answering the devotional\'s reflection by instilling a quiet confidence that the Lord is actively working in our lives, even when we cannot fully see it.' },
            { id: 'tuesday', day: 'Tue', title: 'Softening Our Hearts 💧', devotionalText: 'Pharaoh repeatedly hardened his heart, stubbornly refusing to yield to God\'s will despite witnessing clear miracles. As adults navigating complex lives, we can sometimes develop our own \'hard hearts\' through pride, resentment, or by ignoring the promptings of the Spirit. True spiritual maturity requires us to intentionally put off the natural man and soften our hearts through daily repentance and humility.', 
                hymnTitle: 'More Holiness Give Me', hymnLink: 'https://www.youtube.com/watch?v=sLxv4v9OB3A', hymnAnalysis: '"More Holiness Give Me" is a deeply introspective hymn that serves as a personal plea for a softer, more submissive heart. The devotional warns against the pride and resentment that characterized Pharaoh, urging us to intentionally put off the natural man. The lyrics, "More patience in suff\'ring, more sorrow for sin... More meekness in trial," are a perfect prayer for the spiritual maturity discussed in the day\'s message. The Tabernacle Choir\'s gentle, pleading rendition brings a spirit of profound humility. It creates a space for introspection, perfectly setting up the day\'s challenge to identify areas where we might be resisting the Spirit. Singing or listening to this hymn allows us to express our desire for the Savior\'s help, turning our hardened hearts over to His refining and softening touch.' ,
                songTitle: 'Lord, I Need You', songArtist: 'Matt Maher', songLink: 'https://www.youtube.com/watch?v=m5yJI5-OehI', songAnalysis: '"Lord, I Need You" is a raw, honest admission of our constant reliance on Jesus Christ to overcome our mortal flaws. The devotional reminds us that true spiritual maturity requires daily repentance and humility. The song\'s chorus, "Lord, I need You, oh, I need You; every hour I need You," strips away any facade of pride and replaces it with complete submission to God\'s will. Matt Maher\'s earnest delivery acts as a personal confession of faith and reliance. The lyrics, "Where sin runs deep, Your grace is more," provide comfort when we recognize areas where we have resisted the Spirit. This song empowers us to approach the Savior with a broken heart and contrite spirit, beautifully supporting the challenge to pray for His help to soften our hearts and yield completely to His promptings.' },
            { id: 'wednesday', day: 'Wed', title: 'Beware of Worldly Imitations 🎭', devotionalText: 'Pharaoh’s magicians used cheap tricks to imitate Moses\'s early miracles, but their imitations actually made the plagues worse and offered no real deliverance. The adversary still offers us imitations of joy today—like seeking validation through status, wealth, or worldly applause. These imitations might look appealing at first, but only the true power of Jesus Christ offers permanent healing and lasting peace.',

            { id: 'thursday', day: 'Thu', title: 'The Lamb Without Blemish 🐑', devotionalText: 'The Lord commanded Israel to use an unblemished male lamb for the Passover ritual. This specific instruction perfectly foreshadowed Jesus Christ, the true \'Lamb of God,\' who was completely sinless and unspotted by the world. Because of His absolute perfection, He was the only one capable of paying the ultimate price to deliver us from spiritual death and the bondage of sin.',

                songTitle: 'Run to the Father', songArtist: 'Cody Carnes', songLink: 'https://www.youtube.com/watch?v=Ckheg2Ts0Gc&list=RDCkheg2Ts0Gc&start_radio=1', songAnalysis: '"Run to the Father" beautifully illustrates the emotional and spiritual urgency of leaving our "Egypt" behind. The devotional teaches us not to negotiate with our sins but to abandon them with absolute urgency. The lyrics describe the exhaustion of trying to manage our own lives and the relief of fleeing to God: "I\'m done with the hiding, no reason to wait... I run to the Father, I fall into grace." The raw, sincere vocal delivery in this live performance helps the listener feel the desperation of needing a Savior. It teaches us that leaving "Egypt" isn\'t just about running away from a bad habit; it is fundamentally about running toward a loving Heavenly Father. It encourages us to stop lingering in our mistakes and to embrace the absolute urgency of repentance.' },

        const IconBookOpen = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconShare = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>;
        const IconChevronDown = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
        const IconChevronRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const IconLink = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
        const IconPlayCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>;
        const IconPrinter = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;


        // ==========================================
        // COMPONENTS
        // ==========================================

        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);
            if (!show) return null;
            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

        const ToggleAnswer = ({ question, answer }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="mb-6 border-l-4 border-amber-200 pl-4">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="text-left font-bold text-amber-900 w-full hover:text-amber-700 transition-colors flex items-start gap-2"
                    >
                        <span className="mt-1">{isOpen ? <IconChevronDown className="w-5 h-5" /> : <IconChevronRight className="w-5 h-5" />}</span>
                        <span>{question}</span>
                    </button>
                    {isOpen && (
                        <div className="mt-3 p-4 bg-stone-100 rounded-lg text-stone-700 italic border border-stone-200 fade-in">
                            <span className="font-bold not-italic text-stone-500 text-xs uppercase tracking-wider block mb-1">Possible Answer</span>
                            <div className="whitespace-pre-line">{answer}</div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('devotional');
            const [activeDayId, setActiveDayId] = useState('');
            const [showToast, setShowToast] = useState(false);
            const [youthGroup, setYouthGroup] = useState('ym'); 

            useEffect(() => {
                const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
                const todayIndex = new Date().getDay();
                setActiveDayId(dayMap[todayIndex]);
            }, []);

            const getActiveData = (dataArray) => {
                return dataArray.find(d => d.id === activeDayId) || dataArray[0];
            };

            const copyToClipboard = (dayData) => {
                const promptParts = dayData.prompt.split(':');
                const promptLabel = promptParts[0];
                const promptText = promptParts.slice(1).join(':').trim();
                const scriptureText = (dayData.scriptureRef && dayData.scriptureLink)
                    ? `Scripture: ${dayData.scriptureRef}\n${dayData.scriptureLink}\n\n`
                    : ""; 
                const dateStr = dayData.date ? dayData.date : "";
                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                            <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">Deliverance and Devotion: A Thematic Musical Companion</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (
                                        typeof p === 'string' ? <p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p> : <React.Fragment key={i}>{p}</React.Fragment>
                                    ))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
