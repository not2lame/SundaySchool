<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday School - Website Retired</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for Gospel-study style typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0B3A5A', /* A classic navy blue */
                        }
                    },
                    fontFamily: {
                        serif: ['Merriweather', 'serif'],
                        sans: ['Open Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #334155;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased">
    <div class="max-w-2xl w-full bg-white rounded-xl shadow-lg border-t-8 border-brand-blue overflow-hidden">
        <div class="p-8 md:p-14 text-center">
            
            <!-- Book Icon -->
            <svg class="w-16 h-16 text-brand-blue mx-auto mb-6 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
            
            <h1 class="text-3xl md:text-4xl font-serif font-bold text-gray-900 mb-5 tracking-tight">
                This Website is No Longer Being Updated
            </h1>
            
            <p class="text-lg md:text-xl font-sans text-gray-600 mb-10 leading-relaxed max-w-lg mx-auto">
                If you are interested in studying the gospel of Jesus Christ through the 
                <em class="text-gray-800 font-serif font-medium italic">Come, Follow Me</em> program, please visit the official Church website.
            </p>
            
            <!-- Validated Link -->
            <a href="https://www.churchofjesuschrist.org/study/come-follow-me?lang=eng" 
               class="inline-flex items-center justify-center font-sans px-8 py-4 text-lg font-semibold text-white bg-brand-blue rounded-full hover:bg-opacity-90 hover:shadow-md transition-all duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-blue">
                <span>Visit Come, Follow Me</span>
                <svg class="ml-2 -mr-1 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                </svg>
            </a>
            
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-5 text-center border-t border-gray-100">
            <p class="text-sm font-sans text-gray-500">
                Thank you for your past visits and continued study.
            </p>
        </div>
    </div>
</body>
</html>
