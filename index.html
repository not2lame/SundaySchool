        const WEEK_INFO = {
            title: "All That the Lord Hath Spoken We Will Do",
            dateRange: "April 20 – April 26, 2026",
            valediction: "Embrace your identity as God's valued treasure. Keep His commandments, put Him first, and honor the Sabbath as a sign of love, relying on His mercy when you wander."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Apr 20', title: 'A Peculiar Treasure 💎', text: 'In Exodus 19, the Lord calls His covenant people a "peculiar treasure." President Russell M. Nelson explained that the original Hebrew word, *segullah*, translates to "valued property" or "treasure." When we make covenants with God, we aren\'t just joining an organization; we become His cherished possession. Knowing our true identity provides a profound sense of belonging that worldly labels can never match.', prompt: 'Reflection: How does knowing you are Heavenly Father\'s "valued treasure" change how you view your self-worth and your relationship with Him today?', scriptureRef: 'Exodus 19:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/19?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Apr 21', title: 'Preparing for the Sacred ⛰️', text: 'Before the Israelites could "meet with God" at Mount Sinai, the Lord commanded them to take three days to physically and spiritually prepare. Sacred experiences require intentional preparation. When we rush into the temple or sacrament meeting without preparing our hearts, we risk missing out on the profound power God wants to offer us.', prompt: 'Challenge: What is one thing you can do this week to intentionally prepare your heart and mind before partaking of the sacrament on Sunday?', scriptureRef: 'Exodus 19:10-11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/19?lang=eng&id=p10-11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Apr 22', title: 'Our Ultimate Priority 🥇', text: 'The very first commandment is "Thou shalt have no other gods before me." President Dallin H. Oaks taught that the real question we must ask ourselves is, "What is our ultimate priority?" If we prioritize our careers, material possessions, or the praise of the world over God, we are serving other gods. When we put God first, all other things fall into their proper place or drop out of our lives.', prompt: 'Reflection: Are there any worldly priorities or pursuits in your life currently competing with your commitment to Heavenly Father?', scriptureRef: 'Exodus 20:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Apr 23', title: 'Carrying His Name 🏳️', text: 'We are commanded not to take the Lord\'s name in vain. Elder Dale G. Renlund explained that the ancient Hebrew word for "take" means to lift up or carry like a banner. To take His name in vain means to identify as His disciple without the intent to represent Him well. As covenant adults, we carry His name everywhere we go—at home, at work, and in our communities.', prompt: 'Challenge: What is one way you can more intentionally "carry" the Savior\'s name with honor in your workplace or home today?', scriptureRef: 'Exodus 20:7', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p7', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Apr 24', title: 'Blood of the Covenant 🩸', text: 'To formalize their promises to God, Moses sprinkled the blood of a sacrifice on the altar and the people. This "blood of the covenant" vividly represented the future Atonement of Jesus Christ. Today, we don\'t use animal sacrifices, but we participate in the sacrament—a sacred meal that continually renews our connection to Christ and applies His atoning blood to our lives.', prompt: 'Reflection: How does viewing the sacrament as a weekly renewal of the "blood of the covenant" deepen your reverence for the ordinance?', scriptureRef: 'Exodus 24:8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/24?lang=eng&id=p8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Apr 25', title: 'What Sign Do I Want to Give? 🛑', text: 'The Lord called the Sabbath day a "perpetual sign" between Him and His people. President Russell M. Nelson shared that he used to focus on lists of dos and don\'ts for Sunday, until he realized the Sabbath was a sign of his love. Now, he simply asks, "What sign do I want to give to God?" That simple perspective makes our choices about Sunday activities crystal clear.', prompt: 'Challenge: As you plan your schedule for tomorrow, ask yourself, "What sign do I want to give to God this Sabbath?" and adjust your plans to reflect your love for Him.', scriptureRef: 'Exodus 31:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/31?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Apr 26', title: 'Turning Back to God 🔄', text: 'It is heartbreaking that just forty days after making a covenant with God, the Israelites built a golden calf. They "turned aside quickly." Yet, even after this serious transgression, the Lord revealed Himself to Moses as "merciful and gracious, longsuffering, and abundant in goodness." No matter how far we have wandered or what idols we have built, true repentance is simply the process of turning away from the world and turning back to Him.', prompt: 'Reflection: As you take the sacrament today, take a moment to express profound gratitude for a Savior who is "longsuffering" and always provides a way for us to return.', scriptureRef: 'Exodus 34:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/34?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' }
        ];

        const YM_DATA = [
            { id: 'monday', day: 'Mon', date: 'Apr 20', title: 'You Are Top Tier 💎', text: 'In the scriptures, God calls His covenant people a "peculiar treasure." Sometimes the world makes us feel like being a disciple of Christ just means we are weird or "peculiar" in a bad way. But President Russell M. Nelson taught that the original Hebrew word actually means "valued property" or "treasure." It is the ultimate compliment! You aren\'t just different; as a priesthood man, you are God\'s highly valued, top-tier possession.', prompt: 'Reflection: How does knowing you are God\'s personal "valued treasure" change the way you act around your friends and how you view yourself today?', scriptureRef: 'Exodus 19:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/19?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Apr 21', title: 'Prep Work Matters 🚿', text: 'Before the Israelites could experience God\'s presence at Mount Sinai, they had to spend three days getting ready and washing their clothes. Epic spiritual experiences require solid prep work! As an Aaronic Priesthood holder, you literally prepare and pass the sacrament for your ward. When you prepare yourself spiritually during the week, it helps invite the Spirit for everyone on Sunday.', prompt: 'Challenge: Don\'t just show up on Sunday hoping for a spiritual experience. Do one thing today to spiritually prepare for your priesthood duties this weekend, like reading a scripture or praying for the guys in your quorum.', scriptureRef: 'Exodus 19:10-11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/19?lang=eng&id=p10-11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 22', title: 'Who\'s in First Place? 🥇', text: 'The very first commandment is "Thou shalt have no other gods before me." Today, "other gods" usually aren\'t golden statues; they are screens, sports, video games, or trying to be popular. Elder Dallin H. Oaks taught that if we put God first, everything else will fall into its proper place or drop out of our lives.', prompt: 'Reflection: Look at your screen time or your daily schedule. Does the way you spend your free time show that Heavenly Father and the Savior are your number one priority?', scriptureRef: 'Exodus 20:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 23', title: 'Carrying the Banner 🏳️', text: 'Taking the Lord\'s name in vain isn\'t just about using bad language. Elder Dale G. Renlund taught that the ancient word for "take" means to "carry," like lifting up a banner for a team. To take His name in vain means you claim to be a disciple, but you act in an "empty" or fake way. When you walk the halls at school or hang out with your team, you are carrying the Savior\'s banner. Represent Him well!', prompt: 'Challenge: Think of yourself as carrying a literal banner with the Savior\'s name on it today. Make choices that make that banner look good and honorable!', scriptureRef: 'Exodus 20:7', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p7', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 24', title: 'Don\'t Steal the Hype 🛑', text: '"Thou shalt not steal" is obvious when it comes to taking someone\'s stuff, but there’s a deeper meaning. The Book of Mormon talks about Alma the Younger "stealing away the hearts" of the people. If we mock the gospel, make inappropriate jokes, or tempt our friends to break the rules, we are stealing their spiritual strength. We should be building each other up in our quorums, not tearing each other down!', prompt: 'Reflection: Are you a guy who builds up the faith of the young men in your quorum, or do your jokes sometimes "steal" the Spirit away from the group?', scriptureRef: 'Exodus 20:15', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p15', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 25', title: 'The Ultimate Comeback Coach 🤝', text: 'Just 40 days after making a huge promise to God, the Israelites messed up big time and built a golden calf. It’s easy to judge them, but sometimes we also make mistakes right after feeling the Spirit. The good news? God revealed Himself as "merciful and gracious." Even when you mess up, He is always ready to help you repent, forgive you, and get you back in the game.', prompt: 'Challenge: If you\'ve messed up this week or fallen into a bad habit, don\'t hide. Talk to Heavenly Father in prayer tonight and let Him help you course-correct.', scriptureRef: 'Exodus 34:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/34?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 26', title: 'Sending the Right Signal 📡', text: 'President Russell M. Nelson said he used to stress out about lists of what he could and couldn\'t do on Sunday. Then he realized the Sabbath is a "sign" between him and God. He started asking himself one simple question: "What sign do I want to give to God?" When you look at it that way, choosing how to spend your Sunday and how to act during Church becomes super clear.', prompt: 'Reflection: As you participate in your Aaronic Priesthood duties today, what "sign" is your attitude and reverence sending to Heavenly Father?', scriptureRef: 'Exodus 31:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/31?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Apr 20', title: 'You Are Top Tier 💎', text: 'In the scriptures, God calls His covenant people a "peculiar treasure." Sometimes the world makes us feel like being a disciple of Christ just means we are weird or missing out. But President Russell M. Nelson taught that the original Hebrew word actually translates to "valued property" or "treasure." It is the ultimate compliment! You aren\'t just different; as a covenant daughter of God, you are His highly valued, precious treasure.', prompt: 'Reflection: How does knowing you are God\'s personal "valued treasure" change how you view your self-worth today, especially when scrolling through social media?', scriptureRef: 'Exodus 19:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/19?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Apr 21', title: 'The Spiritual Glow-Up ✨', text: 'Before the Israelites could experience God\'s presence at Mount Sinai, they had to spend three days getting ready and washing their clothes. Epic spiritual experiences require solid prep work! If you want to feel the Spirit strongly on Sunday, at Girls Camp, or in the temple, you have to prepare your heart during the week. A true spiritual glow-up comes from daily, intentional effort.', prompt: 'Challenge: Don\'t just show up on Sunday hoping for a spiritual experience. Do one small thing today to spiritually prepare for this weekend, like listening to your favorite youth theme song or praying for a friend.', scriptureRef: 'Exodus 19:10-11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/19?lang=eng&id=p10-11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 22', title: 'Who Gets Your #1 Spot? 🥇', text: 'The very first commandment is "Thou shalt have no other gods before me." Today, our "other gods" usually aren\'t golden statues; they are our screens, the pursuit of popularity, focusing too much on our appearance, or caring what influencers think. Elder Dallin H. Oaks taught that if we put God first, everything else will beautifully fall into its proper place or drop out of our lives.', prompt: 'Reflection: Look at your screen time or how you spend your free time. Does your schedule show that Heavenly Father and the Savior are truly holding the #1 spot in your heart?', scriptureRef: 'Exodus 20:3', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p3', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 23', title: 'Carrying the Banner 🏳️💖', text: 'Taking the Lord\'s name in vain isn\'t just about using bad language. Elder Dale G. Renlund taught that the ancient word for "take" means to "carry," like lifting up a beautiful banner. To take His name in vain means you claim to be a disciple, but you act in a fake or empty way. When you walk the halls at school or hang out with your friends, you are carrying the Savior\'s banner. Represent Him beautifully!', prompt: 'Challenge: Think of yourself as literally carrying a banner with the Savior\'s name on it today. Make choices with your words and actions that make that banner look honorable!', scriptureRef: 'Exodus 20:7', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p7', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 24', title: 'Don\'t Steal Their Light 🛑', text: '"Thou shalt not steal" is obvious when it comes to taking someone\'s thins or money, but there’s a deeper meaning. The Book of Mormon talks about Alma the Younger "stealing away the hearts" of the people. If we gossip, exclude other girls, or tempt our friends to break the rules, we are stealing their spiritual strength and confidence. We should be building our sisters up, not tearing them down!', prompt: 'Reflection: Are you a friend who builds up the light of the young women around you, or do your words sometimes "steal" their joy and the Spirit?', scriptureRef: 'Exodus 20:15', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/20?lang=eng&id=p15', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 25', title: 'The Ultimate Second Chance 🕊️', text: 'Just 40 days after making a huge promise to God, the Israelites messed up big time and built a golden calf. It’s easy to judge them, but sometimes we also make mistakes right after feeling the Spirit. The amazing news? God revealed Himself as "merciful and gracious, longsuffering, and abundant in goodness." Even when you mess up, His arms are wide open to forgive you and help you try again.', prompt: 'Challenge: If you\'ve messed up this week or fallen into a bad habit, don\'t hide. Talk to Heavenly Father in prayer tonight and let Him wrap you in His mercy and grace.', scriptureRef: 'Exodus 34:6', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/34?lang=eng&id=p6', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 26', title: 'Sending the Right Signal 📡', text: 'President Russell M. Nelson said he used to stress out about lists of what he could and couldn\'t do on Sunday. Then he realized the Sabbath is a "sign" between him and God. He started asking himself one simple question: "What sign do I want to give to God?" When you look at it that way, choosing how to spend your Sunday and how to act during Church becomes so much easier.', prompt: 'Reflection: As you participate in your Young Women class and sacrament meeting today, what "sign" is your attitude, your dress, and your reverence sending to Heavenly Father?', scriptureRef: 'Exodus 31:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/31?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/17?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'A Peculiar Treasure 💎', devotionalText: 'In Exodus 19, the Lord calls His covenant people a "peculiar treasure." President Russell M. Nelson explained that the original Hebrew word, segullah, translates to "valued property" or "treasure." When we make covenants with God, we aren\'t just joining an organization; we become His cherished possession. Knowing our true identity provides a profound sense of belonging that worldly labels can never match.', 
                hymnTitle: 'I Am a Child of God', hymnLink: 'https://www.youtube.com/watch?v=xglz6kryORQ', hymnAnalysis: '"I Am a Child of God" profoundly encapsulates the core message of discovering our true identity as Heavenly Father\'s "peculiar treasure." The devotional emphasizes that we are His cherished possession and that recognizing this brings a deep sense of belonging. The hymn perfectly echoes this truth, anchoring the listener in the simple yet awe-inspiring reality of their divine heritage. The reverent and sweeping voices of The Tabernacle Choir stir the soul, reminding us that no worldly label can replace the eternal worth of being a beloved child of heavenly parents. Listening to this arrangement prepares our hearts to reflect on how our self-worth is inherently tied to our covenant relationship with God.' ,
                songTitle: 'Who You Say I Am', songArtist: 'Hillsong Worship', songLink: 'https://www.youtube.com/watch?v=lKw6uqtGFfo', songAnalysis: 'This powerful contemporary anthem complements the day\'s reflection by addressing the modern struggle with self-worth and worldly labels. The lyrics boldly declare, "I am chosen, not forsaken; I am who You say I am," which aligns beautifully with the Hebrew word segullah ("valued property" or "treasure"). When the world tries to define us, this uplifting song acts as a musical shield, redirecting our focus back to God\'s promises. Its passionate, driving chorus inspires confidence and helps us internalize the profound sense of belonging that comes from stepping fully into our covenant identity.' },
            { id: 'tuesday', day: 'Tue', title: 'Preparing for the Sacred ⛰️', devotionalText: 'Before the Israelites could "meet with God" at Mount Sinai, the Lord commanded them to take three days to physically and spiritually prepare. Sacred experiences require intentional preparation. When we rush into the temple or sacrament meeting without preparing our hearts, we risk missing out on the profound power God wants to offer us.', 
                hymnTitle: 'Sweet Hour of Prayer', hymnLink: 'https://www.youtube.com/watch?v=NaR44ReK05c', hymnAnalysis: 'The devotional reminds us that the Israelites were commanded to take time to physically and spiritually prepare before meeting with God, underscoring that sacred experiences require intentional preparation. "Sweet Hour of Prayer" captures the essence of carving out quiet, dedicated time to prepare our hearts for the divine. The soothing and meditative arrangement by The Tabernacle Choir invites the listener to retreat from the rush of the world and find solace in communion with God. It serves as a gentle reminder that slowing down and engaging in sincere prayer is one of the most effective ways to ready our minds before partaking of the sacrament or entering the temple.' ,
                songTitle: 'Here I Am to Worship', songArtist: 'Michael W. Smith', songLink: 'https://www.youtube.com/watch?v=O1FVi0QgTq8', songAnalysis: '"Here I Am to Worship" is a beautiful expression of arriving before the Lord with a humble and prepared heart. The lyrics, "Here I am to worship, here I am to bow down," perfectly capture the attitude required to truly "meet with God," as the Israelites did at Sinai. The soft, acoustic start that builds into a sweeping chorus helps transition our minds from everyday distractions to a state of reverence and awe. It directly addresses the day\'s challenge by helping us cultivate a mindful, worshipful posture before Sunday, ensuring we don\'t miss out on the profound power God offers us.' },
            { id: 'wednesday', day: 'Wed', title: 'Our Ultimate Priority 🥇', devotionalText: 'The very first commandment is "Thou shalt have no other gods before me." President Dallin H. Oaks taught that the real question we must ask ourselves is, "What is our ultimate priority?" If we prioritize our careers, material possessions, or the praise of the world over God, we are serving other gods. When we put God first, all other things fall into their proper place or drop out of our lives.', 
                hymnTitle: 'Come, Follow Me', hymnLink: 'https://www.youtube.com/watch?v=wI21Cpid9CE', hymnAnalysis: 'When confronted with the commandment to have "no other gods before me," we are invited to evaluate our ultimate priorities. "Come, Follow Me" is an unyielding call to discipleship, demanding that we place the Savior at the absolute forefront of our lives. The majestic rendering by The Tabernacle Choir stirs a deep desire to leave behind the "other gods" of worldly praise and material possessions. The hymn reinforces the teaching that when we truly follow Christ and put Him first, everything else will find its proper place. It provides the perfect spiritual backdrop for pondering what worldly pursuits might be competing for our devotion.' ,
                songTitle: 'First', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=gzLkD3fnBdA', songAnalysis: 'Lauren Daigle\'s "First" is a vibrant, contemporary prayer that explicitly targets the human tendency to prioritize the world over God. With lyrics like, "Before I bring my need, I will bring my heart... I want to seek You first," the song tackles the day\'s reflection question head-on. The upbeat, driving rhythm brings an energizing clarity to the principle of putting God above our careers, worries, and temporal needs. It serves as an empowering anthem for modern believers navigating a distracted world, inspiring us to intentionally choose Heavenly Father as our ultimate priority each day.' },
            { id: 'thursday', day: 'Thu', title: 'Carrying His Name 🏳️', devotionalText: 'We are commanded not to take the Lord\'s name in vain. Elder Dale G. Renlund explained that the ancient Hebrew word for "take" means to lift up or carry like a banner. To take His name in vain means to identify as His disciple without the intent to represent Him well. As covenant adults, we carry His name everywhere we go—at home, at work, and in our communities.',

            { id: 'friday', day: 'Fri', title: 'Blood of the Covenant 🩸', devotionalText: 'To formalize their promises to God, Moses sprinkled the blood of a sacrifice on the altar and the people. This "blood of the covenant" vividly represented the future Atonement of Jesus Christ. Today, we don\'t use animal sacrifices, but we participate in the sacrament—a sacred meal that continually renews our connection to Christ and applies His atoning blood to our lives.', 
                hymnTitle: 'I Stand All Amazed', hymnLink: 'https://www.youtube.com/watch?v=sTHtpjfe0QE', hymnAnalysis: 'The "blood of the covenant" sprinkled by Moses vividly pointed to the future Atonement of Jesus Christ. "I Stand All Amazed" perfectly captures the awe and deep reverence we should feel when considering the Savior\'s supreme sacrifice. The lyrics speak directly of His "blood that he so freely shed" and the profound grace offered to the "sinner so prone to rebel." The Tabernacle Choir\'s breathtaking and deeply emotional performance invites a spirit of profound gratitude. It helps transform the weekly ordinance of the sacrament from a routine action into a sacred, miraculous renewal of our connection to Christ.' ,
                songTitle: 'Thank You Jesus for the Blood', songArtist: 'Charity Gayle', songLink: 'https://www.youtube.com/watch?v=is_ccOVNOgU', songAnalysis: 'This contemporary worship song is a passionate expression of gratitude for the very "blood of the covenant" discussed in the devotional. Charity Gayle\'s powerful vocals bring the ancient concept of sacrifice into sharp, personal focus for the modern believer. The lyrics trace the journey from being "a sinner, saved by grace" to being redeemed entirely by the blood of Christ. Listening to this moving performance helps answer the day\'s reflection question by magnifying our appreciation for the Atonement, making the sacrament feel more vital and deeply moving.' },
            { id: 'saturday', day: 'Sat', title: 'What Sign Do I Want to Give? 🛑', devotionalText: 'The Lord called the Sabbath day a "perpetual sign" between Him and His people. President Russell M. Nelson shared that he used to focus on lists of dos and don\'ts for Sunday, until he realized the Sabbath was a sign of his love. Now, he simply asks, "What sign do I want to give to God?" That simple perspective makes our choices about Sunday activities crystal clear.', 
                hymnTitle: 'Sweet Is the Work', hymnLink: 'https://www.youtube.com/watch?v=grmSXBBCjXg', hymnAnalysis: 'President Nelson’s perspective of treating the Sabbath as a sign of love completely shifts Sunday from a list of rules to a day of joy. "Sweet Is the Work" is a classic hymn that embodies this exact joyful, worshipful attitude. The opening line declares that it is a "sweet" privilege to praise the Lord on His holy day. The magnificent orchestration and harmonious voices of The Tabernacle Choir elevate the listener\'s perspective, reminding us that resting from worldly cares to focus on God is a beautiful gift. It beautifully supports the challenge to adjust our Sabbath plans to reflect genuine love for Heavenly Father.' ,
                songTitle: 'Heart of Worship', songArtist: 'Matt Redman', songLink: 'https://www.youtube.com/watch?v=AJhJdGjVQtA', songAnalysis: 'When President Nelson abandoned his lists of dos and don\'ts, he essentially returned to the "Heart of Worship." Matt Redman\'s beloved song addresses the realization that true devotion isn\'t about outward routines or performing specific actions; it\'s about stripping away distractions and realizing "it\'s all about You, Jesus." The acoustic nature of this song invites a quiet humility and perfectly illustrates the shift from legalistic Sabbath observance to a sincere offering of love. It encourages us to ask ourselves what sign we are truly giving to God when we worship.' },
            { id: 'sunday', day: 'Sun', title: 'Turning Back to God 🔄', devotionalText: 'It is heartbreaking that just forty days after making a covenant with God, the Israelites built a golden calf. They "turned aside quickly." Yet, even after this serious transgression, the Lord revealed Himself to Moses as "merciful and gracious, longsuffering, and abundant in goodness." No matter how far we have wandered or what idols we have built, true repentance is simply the process of turning away from the world and turning back to Him.', 
                hymnTitle: 'Come, Thou Fount of Every Blessing', hymnLink: 'https://www.youtube.com/watch?v=yMjgemSir0E', hymnAnalysis: 'The tragic story of the golden calf illustrates human frailty and the tendency to "turn aside quickly." "Come, Thou Fount of Every Blessing" resonates deeply with this reality through the lyric, "Prone to wander, Lord, I feel it, prone to leave the God I love." Despite this tendency, the hymn acts as a desperate plea for God\'s merciful grace to bind our wandering hearts back to Him. The majestic and soul-stirring arrangement by The Tabernacle Choir captures both the heartbreak of our mistakes and the triumphant joy of returning to a Savior who is "longsuffering, and abundant in goodness," perfectly aligning with the day\'s reflection on the sacrament.' ,
                songTitle: 'Lord, I Need You', songArtist: 'Matt Maher', songLink: 'https://www.youtube.com/watch?v=LuvfMDhTyMA', songAnalysis: '"Lord, I Need You" is a raw and honest admission of our constant reliance on God\'s mercy. Much like the Israelites who needed the Lord\'s long-suffering forgiveness after the golden calf, this song acknowledges that without Him, we are prone to fall. The lyric, "Where sin runs deep, Your grace is more," beautifully encapsulates the truth that repentance is simply the process of turning back to Him. This earnest, acoustic prayer of a song helps prepare our hearts for the sacrament, fostering a profound sense of gratitude for a Savior who always provides a way for us to return.' }

        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);
            if (!show) return null;
            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

            const [activeTab, setActiveTab] = useState('devotional');
            const [activeDayId, setActiveDayId] = useState('');
            const [showToast, setShowToast] = useState(false);
            const [youthGroup, setYouthGroup] = useState('ym'); 

            useEffect(() => {
                const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
                const todayIndex = new Date().getDay();
                setActiveDayId(dayMap[todayIndex]);
            }, []);

            const getActiveData = (dataArray) => {
                return dataArray.find(d => d.id === activeDayId) || dataArray[0];
            };

            const copyToClipboard = (dayData) => {
                const promptParts = dayData.prompt.split(':');
                const promptLabel = promptParts[0];
                const promptText = promptParts.slice(1).join(':').trim();
                const scriptureText = (dayData.scriptureRef && dayData.scriptureLink)
                    ? `Scripture: ${dayData.scriptureRef}\n${dayData.scriptureLink}\n\n`
                    : ""; 
                const dateStr = dayData.date ? dayData.date : "";
                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                            <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">Covenants at Sinai: A Thematic Musical Companion</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (
                                        typeof p === 'string' ? <p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p> : <React.Fragment key={i}>{p}</React.Fragment>
                                    ))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
