        const WEEK_INFO = {
            title: "Stand Still, and See the Salvation of the Lord",
            dateRange: "April 13 – April 19, 2026",
            valediction: "Trust in the Lord’s salvation. Stand still at your personal Red Sea, gather daily spiritual manna, drink from the Living Water, and bear one another's burdens on your journey."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Apr 13', title: 'Stand Still and See 🌊', text: 'When the Israelites were trapped between the impassable Red Sea and Pharaoh\'s charging army, Moses didn\'t tell them to panic or fight in their own strength. He commanded them to "stand still"—to take their proper position as disciples and trust God. President Jeffrey R. Holland taught that when we face impossible challenges and urgently need heavenly direction, the Red Sea will open to the honest seeker of revelation.', prompt: 'Reflection: When you feel trapped by your current trials, how can you mentally and spiritually "stand still" and let the Lord fight your battles?', scriptureRef: 'Exodus 14:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/14?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Apr 14', title: 'Making Bitter Things Sweet 💧', text: 'After their miraculous escape, the Israelites found water at Marah, but it was too bitter to drink. The Lord showed Moses a tree that, when cast into the waters, made them sweet. That tree is a beautiful, ancient symbol of Jesus Christ! Through His Atonement, the Savior can take the most bitter, painful, and unfair experiences of our lives and ultimately consecrate them for our peace and spiritual growth.', prompt: 'Reflection: How has the Savior brought sweetness, perspective, or peace to a "bitter" experience in your past?', scriptureRef: 'Exodus 15:23-25', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/15?lang=eng&id=p23-25', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Apr 15', title: 'Our Daily Manna 🍞', text: 'The Lord miraculously fed Israel with manna, but required them to gather it *daily*. Elder D. Todd Christofferson taught that God was teaching them to trust Him one day at a time. Likewise, Elder Dieter F. Uchtdorf explained that without "daily restoration" through prayer and scripture study, we slowly drift off course like people wandering in circles in a dense forest. We cannot survive on yesterday\'s spiritual nourishment!', prompt: 'Challenge: Elder Uchtdorf asked, "Do you want to change the shape of your life? Change the shape of your day." Choose to intentionally gather your spiritual manna today through a sincere prayer or scripture study.', scriptureRef: 'Exodus 16:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/16?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Apr 16', title: 'The Spiritual Rock 🪨', text: 'When the Israelites were dying of thirst in the wilderness, the Lord brought forth life-saving water from a solid rock at Horeb. The Apostle Paul later revealed the profound symbolism here, declaring that "that Rock was Christ." In a world that is constantly shifting and draining our spiritual reserves, Jesus Christ is our dependable foundation and the only true source of living water that brings deep, eternal peace.', prompt: 'Reflection: In what ways has the Savior been a solid, unchanging rock for your family during a storm?', scriptureRef: '1 Corinthians 10:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/10?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Apr 17', title: 'Heavy Hands and Willing Hearts 🤝', text: 'During a crucial battle, Israel only prevailed when Moses kept his hands raised. When he grew exhausted, Aaron and Hur brought him a stone to sit on and physically held up his hands until sunset. No one is meant to do the Lord\'s work alone! Whether it is a weary bishop, an overwhelmed parent, or a struggling ministering sister, we are all called to lift each other\'s heavy hands.', prompt: 'Challenge: Pray for the gift of discernment today to recognize someone in your ward or family whose "hands are heavy," and proactively offer them specific, meaningful help.', scriptureRef: 'Exodus 17:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/17?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Apr 18', title: 'The Pillar of Fire 🔥', text: 'The Lord didn\'t just deliver Israel from Egypt and abandon them; He guided them daily with a pillar of cloud by day and fire by night. The Apostle Paul compared their journey through the Red Sea to our own baptism. Just as Israel left their old lives of slavery behind to follow God\'s light, we have covenanted to leave the world behind and follow the constant, guiding companionship of the Holy Ghost.', prompt: 'Reflection: How can you more fully rely on the "pillar of fire" (the Holy Ghost) to guide your daily decisions and family leadership this week?', scriptureRef: '1 Corinthians 10:1-2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/10?lang=eng&id=p1-2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Apr 19', title: 'Grace for the Moment ✨', text: 'When facing a harrowing financial trial, Elder D. Todd Christofferson initially prayed for an immediate miracle to solve the problem. Instead, he received grace just for that day—his "daily bread." He learned that sometimes the Savior doesn\'t immediately remove the trial, but patiently walks through it with us, providing just enough help for the moment. Over time, walking with Him daily incrementally changes our hearts and transforms our souls.', prompt: 'Reflection: As you partake of the sacrament today, how can you show gratitude for the daily, incremental help the Savior provides, even when the final outcome of a trial is still unknown?', scriptureRef: 'Matthew 6:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/matt/6?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' }
        ];

        const YM_DATA = [
            { id: 'monday', day: 'Mon', date: 'Apr 13', title: 'Stand Still and See 🌊', text: 'Imagine being completely trapped between the massive Red Sea and a charging army. Instead of telling the Israelites to panic or fight, Moses told them to "stand still." President Jeffrey R. Holland taught that when we face impossible challenges and urgently need heavenly direction, the Red Sea will open to the honest seeker of revelation. When you feel trapped by school stress or life\'s pressures, don\'t panic—take your position as a priesthood man and let God fight your battles!', prompt: 'Reflection: What is a "Red Sea" problem you are facing right now, and how can you step back and let God help you solve it?', scriptureRef: 'Exodus 14:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/14?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Apr 14', title: 'Making the Bitter Sweet 💧', text: 'After their crazy escape, the Israelites were dying of thirst, but the water at Marah was totally bitter. God showed Moses a tree to throw into the water, and it instantly became sweet! That tree is an ancient symbol of Jesus Christ. Through His Atonement, the Savior can take the most bitter, unfair, or frustrating things in your life and actually turn them into something good that makes you spiritually stronger.', prompt: 'Challenge: Next time you face a bitter disappointment today (like a bad grade or a tough loss), ask the Savior to help you find the "sweetness" or the lesson in it.', scriptureRef: 'Exodus 15:25', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/15?lang=eng&id=p25', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 15', title: 'Your Spiritual GPS 🧭', text: 'Elder Dieter F. Uchtdorf shared a study where people trying to walk straight in a dense forest without landmarks actually just walked in circles! Without a spiritual GPS, we do the exact same thing. Gathering your spiritual "manna" every single day through prayer and scriptures keeps you from drifting off course. You can\'t survive today\'s temptations on yesterday\'s spiritual food!', prompt: 'Challenge: Try Elder Uchtdorf\'s "Daily Restoration" challenge. Change the shape of your day by reading just one chapter of scripture or saying one sincere prayer tonight before bed.', scriptureRef: 'Exodus 16:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/16?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 16', title: 'The Ultimate Rock 🪨', text: 'When Israel was dying of thirst again, God brought life-saving water straight out of a solid rock at Horeb. The Apostle Paul later taught that the "Rock" was actually a symbol of Jesus Christ! When your life feels dry, exhausting, or chaotic, the Savior is your ultimate solid foundation. His "living water" satisfies way better than any temporary hype the world offers.', prompt: 'Reflection: How can you build your life on the "Rock" of Jesus Christ this week so you stay strong when things get crazy?', scriptureRef: '1 Corinthians 10:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/10?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 17', title: 'Hold Up the Heavies 🤝', text: 'During a massive battle, Israel only won when Moses kept his hands raised. When his arms got exhausted, Aaron and Hur literally pulled up a rock for him to sit on and physically held his hands up until they won the fight! Being in an Aaronic Priesthood quorum means having each other\'s backs. No one is meant to face their challenges or do the Lord\'s work alone.', prompt: 'Challenge: Look around your quorum, your friend group, or your family. Who has "heavy hands" right now? Send an encouraging text or step up to help them carry their load today.', scriptureRef: 'Exodus 17:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/17?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 18', title: 'Daily Help for Daily Problems ⏳', text: 'Sometimes we want God to instantly fix our massive problems right now. Elder D. Todd Christofferson taught that when he was going through a brutal financial trial, he didn\'t get an immediate miracle to solve it all. Instead, he got his "daily bread"—just enough help for that specific day. God will give you the strength you need for today, even if tomorrow is still a question mark.', prompt: 'Reflection: Are you stressing too far into the future? Try taking a deep breath and just asking God for the strength to get through today.', scriptureRef: 'Matthew 6:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/matt/6?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 19', title: 'The Pillar of Fire 🔥', text: 'God didn\'t just free the Israelites and say, "Good luck!" He literally guided them through the wilderness with a pillar of cloud by day and a pillar of fire by night. Today, that pillar of fire is the Holy Ghost! When you keep your covenants and take the sacrament, you are promised that His Spirit will always be with you to guide you through the wilderness of your teenage years.', prompt: 'Challenge: As you prepare or pass the sacrament today, silently ask for the Holy Ghost to be your personal "pillar of fire" to guide your decisions and keep you safe this week.', scriptureRef: '1 Corinthians 10:1-2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/10?lang=eng&id=p1-2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Apr 13', title: 'Stand Still and Breathe 🌊', text: 'Ever feel completely overwhelmed by drama, school stress, or anxiety about the future, like there\'s literally no way out? The Israelites felt totally trapped at the Red Sea, but Moses told them to simply "stand still." Sometimes when we are panicking, we just need to stop, take a deep breath, and trust that Heavenly Father will part our personal "Red Seas" and fight our battles for us.', prompt: 'Reflection: What is a stressful situation right now where you need to "stand still" and let God help you solve it?', scriptureRef: 'Exodus 14:13', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/14?lang=eng&id=p13', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Apr 14', title: 'Turning Bitter to Sweet 💧', text: 'The Israelites finally found water in the desert, but they were super disappointed because it was too bitter to drink. God showed Moses a tree to throw into the water, and it instantly became sweet! That tree is a beautiful symbol of Jesus Christ. When you go through bitter experiences—like a friend group changing, a disappointment, or feeling left out—the Savior’s Atonement can heal that pain and turn it into something that makes you beautifully strong.', prompt: 'Challenge: Is there a "bitter" disappointment in your life right now? Ask the Savior today to help you find the sweetness, peace, or growth in it.', scriptureRef: 'Exodus 15:25', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/15?lang=eng&id=p25', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Apr 15', title: 'Your Spiritual GPS 🧭', text: 'Elder Dieter F. Uchtdorf shared an story where people walking in a dense forest without a GPS ended up walking in complete circles without even realizing it! Without our spiritual GPS, we do the exact same thing. Gathering your spiritual "manna" every single day through prayer and scriptures keeps you from drifting off course. You can\'t survive today\'s challenges on yesterday\'s spiritual food!', prompt: 'Challenge: Try Elder Uchtdorf\'s challenge to "change the shape of your day." Make a goal to read just a few verses of scripture or say a sincere prayer before checking your phone in the morning!', scriptureRef: 'Exodus 16:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/16?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Apr 16', title: 'The Ultimate Rock 🪨', text: 'Life changes super fast. Trends fade, friend groups shift, and our emotions can go up and down. But when the Israelites needed life-saving water, God brought it out of a solid rock. The Apostle Paul taught that the "Rock" was a perfect symbol of Jesus Christ! He is the only constant, unshakeable foundation you can always rely on when your world feels crazy or insecure.', prompt: 'Reflection: How does knowing that Jesus Christ is an unchanging "Rock" give you confidence when everything else in life feels unpredictable?', scriptureRef: '1 Corinthians 10:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/10?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Apr 17', title: 'Sisterhood & Heavy Hands 🤝', text: 'Even a mighty prophet like Moses got exhausted! During a huge battle, his arms were so tired that his friends Aaron and Hur had to physically hold his hands up for him. Being in a Young Women class means we are a sisterhood. When a friend is struggling with anxiety, a tough class, or a bad day, we get to be the ones who step up, hold their hands, and help carry their load.', prompt: 'Challenge: Look around your class, friend group, or family. Who might have "heavy hands" today? Send them a sweet text or do a random act of kindness to lift them up!', scriptureRef: 'Exodus 17:11-12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ex/17?lang=eng&id=p11-12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Apr 18', title: 'Grace for Today ⏳', text: 'Sometimes we want God to instantly fix all our problems and tell us exactly how our future will turn out. But Elder D. Todd Christofferson learned through a really hard trial that God often just gives us our "daily bread"—enough grace and strength just to get through today. You don\'t have to figure out your whole life right now; just let Him help you with today\'s worries.', prompt: 'Reflection: Are you stressing too much about the future? Take a deep breath today and ask Heavenly Father for just the grace and strength you need for today.', scriptureRef: 'Matthew 6:11', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/matt/6?lang=eng&id=p11', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Apr 19', title: 'Your Pillar of Fire 🔥', text: 'God didn’t just free the Israelites and let them wander blindly; He actively guided them with a pillar of cloud by day and fire by night. Today, your personal "pillar of fire" is the Holy Ghost! When you take the sacrament and renew your covenants, you are promised that His Spirit will always be with you to guide you through the confusing "wilderness" of your teenage years.', prompt: 'Challenge: As you take the sacrament today, silently ask the Holy Ghost to be your personal "pillar of fire" this week, guiding your decisions, comforting your heart, and keeping you safe.', scriptureRef: '1 Corinthians 10:1-2', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/1-cor/10?lang=eng&id=p1-2', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'Stand Still and See 🌊', devotionalText: 'When the Israelites were trapped between the impassable Red Sea and Pharaoh\'s charging army, Moses didn\'t tell them to panic or fight in their own strength. He commanded them to "stand still"—to take their proper position as disciples and trust God. President Jeffrey R. Holland taught that when we face impossible challenges and urgently need heavenly direction, the Red Sea will open to the honest seeker of revelation.', 
                hymnTitle: 'Be Still, My Soul', hymnLink: 'https://www.youtube.com/watch?v=OudatufR4To', hymnAnalysis: '"Be Still, My Soul" is a profound and comforting hymn that directly echoes Moses\'s command to the Israelites to "stand still" in the face of an impossible challenge. The devotional reminds us that true discipleship often requires us to avoid panicking or fighting in our own strength, but rather to wait upon heavenly direction. The lyrics beautifully validate this principle: "Be still, my soul: The Lord is on thy side; With patience bear thy cross of grief or pain."\nListening to this serene and reverent performance instills a deep sense of peace that counteracts the panic of feeling "trapped." The musical arrangement builds gradually, much like the parting of the Red Sea, reminding us that when we seek revelation and trust the Lord to fight our battles, He will open a way. This hymn provides the emotional and spiritual space to deeply ponder the day\'s reflection question, helping us quiet our minds and surrender our fears to God.' ,
                songTitle: 'Trust in You', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=n_aVFVveJNs', songAnalysis: '"Trust in You" is a powerful contemporary declaration of faith that brilliantly captures the essence of standing still when the way forward seems completely blocked. The devotional focuses on trusting God when we face impossible challenges, much like an impassable Red Sea. Lauren Daigle\'s lyrics speak directly to this mortal reality: "When You don\'t part the waters I wish I could walk through, when You don\'t give the answers as I cry out to You, I will trust in You."\nThe upbeat yet deeply faithful tone of this song acts as a musical anchor in times of distress. It reassures us that even if the miracle doesn\'t happen exactly when or how we expect, God\'s character remains perfectly trustworthy. This modern anthem complements the devotional\'s reflection by inspiring us to yield our timeline to the Lord, knowing that as we "stand still," He is actively working for our eternal good.' },
            { id: 'tuesday', day: 'Tue', title: 'Making Bitter Things Sweet 💧', devotionalText: 'After their miraculous escape, the Israelites found water at Marah, but it was too bitter to drink. The Lord showed Moses a tree that, when cast into the waters, made them sweet. That tree is a beautiful, ancient symbol of Jesus Christ! Through His Atonement, the Savior can take the most bitter, painful, and unfair experiences of our lives and ultimately consecrate them for our peace and spiritual growth.',

                songTitle: 'Blessings', songArtist: 'Laura Story', songLink: 'https://www.youtube.com/watch?v=WmQxAYdCdpM', songAnalysis: 'Laura Story\'s "Blessings" directly addresses how God\'s sweetest gifts often come wrapped in bitter trials. The devotional teaches that the Savior consecrates our painful experiences for our spiritual growth, and this song echoes that profound truth by asking, "What if your blessings come through raindrops? What if your healing comes through tears?"\nThis contemplative acoustic performance shifts our perspective on adversity, suggesting that the "bitter waters" we are forced to drink might actually be the Lord\'s mercies in disguise. It beautifully supports the reflection question, encouraging us to look back at our painful moments and recognize the Savior\'s consecrating hand making the bitter things sweet.' },
            { id: 'wednesday', day: 'Wed', title: 'Our Daily Manna 🍞', devotionalText: 'The Lord miraculously fed Israel with manna, but required them to gather it daily. Elder D. Todd Christofferson taught that God was teaching them to trust Him one day at a time. Likewise, Elder Dieter F. Uchtdorf explained that without "daily restoration" through prayer and scripture study, we slowly drift off course like people wandering in circles in a dense forest. We cannot survive on yesterday\'s spiritual nourishment!', 
                hymnTitle: 'I Need Thee Every Hour', hymnLink: 'https://www.youtube.com/watch?v=PPEdmbgga_o', hymnAnalysis: 'The devotional highlights the absolute necessity of "daily restoration," warning that we cannot survive on yesterday\'s spiritual nourishment. "I Need Thee Every Hour" perfectly captures this moment-by-moment reliance on the Savior. The lyrics, "I need thee, oh, I need thee; Every hour I need thee," serve as a personal plea for the daily manna of God\'s presence, echoing the Israelites\' reliance on heaven for their very survival.\nThe reverent and sweeping Tabernacle Choir arrangement invites profound introspection. It creates a spiritual atmosphere that motivates the listener to answer the day\'s challenge to "change the shape of your day." Singing or listening to this hymn acts as a catalyst for intentional prayer, reminding us that we need the Savior’s rich promises fulfilled in our lives on a daily basis.' ,
                songTitle: 'Give Me Jesus', songArtist: 'Fernando Ortega', songLink: 'https://www.youtube.com/watch?v=_KuGrM6sNhc', songAnalysis: '"Give Me Jesus" is a traditional spiritual, beautifully and meditatively arranged by Fernando Ortega, that strips away the distractions of the world to focus on the singular necessity of Christ. The simple, repetitive petition, "You can have all this world, but give me Jesus," perfectly complements the Israelites\' daily routine of leaving their tents to gather manna. It teaches that spiritual survival requires choosing the Savior over everything else.\nThe song’s peaceful pace creates a perfect environment for sincere scripture study and morning prayer. It reinforces the truth that true spiritual endurance isn\'t built on occasional bursts of devotion, but on the daily, quiet decision to seek Jesus Christ first, perfectly fulfilling the day\'s challenge to gather spiritual nourishment.' },
            { id: 'thursday', day: 'Thu', title: 'The Spiritual Rock 🪨', devotionalText: 'When the Israelites were dying of thirst in the wilderness, the Lord brought forth life-saving water from a solid rock at Horeb. The Apostle Paul later revealed the profound symbolism here, declaring that "that Rock was Christ." In a world that is constantly shifting and draining our spiritual reserves, Jesus Christ is our dependable foundation and the only true source of living water that brings deep, eternal peace.', 
                hymnTitle: 'Rock of Ages', hymnLink: 'https://www.youtube.com/watch?v=_JbmSq4Jb5w', hymnAnalysis: 'The devotional connects the life-saving water flowing from Horeb to Jesus Christ, the ultimate "Spiritual Rock" and source of living water. The classic hymn "Rock of Ages" directly employs this rich scriptural imagery, with lyrics pleading, "Rock of Ages, cleft for me, let me hide myself in thee." It draws our minds to the physical rock that was struck to save Israel, representing the Savior who was bruised to save us.\nThe soaring brass and magnificent voices of The Tabernacle Choir underscore the majesty and permanence of our Savior. Listening to this powerful performance inspires us to recognize the steadfastness of Christ\'s love. It perfectly facilitates the reflection question by inviting us to remember how the Savior has been a solid, unchanging foundation for our families amidst the shifting sands of mortality.' ,
                songTitle: 'Cornerstone', songArtist: 'Hillsong Worship', songLink: 'https://www.youtube.com/watch?v=izrk-erhDdk', songAnalysis: '"Cornerstone" is a powerful modern anthem built upon the traditional hymn "My Hope is Built on Nothing Less." The lyrics declare, "Christ alone, Cornerstone, weak made strong in the Savior\'s love." This aligns seamlessly with the devotional\'s message of finding a dependable foundation in a spiritually draining world.\nThe passionate, driving melody reinforces the security and deep, eternal peace that comes when we anchor our faith to Jesus Christ. It reminds us that when darkness seems to hide His face, and through every high and stormy gale, our anchor holds. This song is a bold declaration that Jesus is the only true Rock upon which we can safely build our lives.' },
            { id: 'friday', day: 'Fri', title: 'Heavy Hands and Willing Hearts 🤝', devotionalText: 'During a crucial battle, Israel only prevailed when Moses kept his hands raised. When he grew exhausted, Aaron and Hur brought him a stone to sit on and physically held up his hands until sunset. No one is meant to do the Lord\'s work alone! Whether it is a weary bishop, an overwhelmed parent, or a struggling ministering sister, we are all called to lift each other\'s heavy hands.', 
                hymnTitle: 'Lord, I Would Follow Thee', hymnLink: 'https://www.youtube.com/watch?v=XivyFAqXv3Q', hymnAnalysis: '"Lord, I Would Follow Thee" is a tender hymn about developing a compassionate, ministering heart. The devotional uses the story of Aaron and Hur to teach that no one is meant to do the Lord\'s work alone, and we are called to lift each other\'s heavy hands. The hymn\'s lyrics perfectly echo this call to action: "I would be my brother\'s keeper; I would learn the healer\'s art."\nThe gentle, pleading nature of The Tabernacle Choir\'s performance softens our hearts, serving as a perfect musical prayer to prepare for the day\'s challenge of seeking the gift of discernment. The lyrics prompt us to look beyond our own needs and notice the "hidden sorrow" in the lives of our ward and family members, becoming the very hands that lift the weary.' ,
                songTitle: 'Brother', songArtist: 'NEEDTOBREATHE', songLink: 'https://www.youtube.com/watch?v=VoqTLWF7ofI', songAnalysis: 'NEEDTOBREATHE\'s "Brother" is an impassioned contemporary song that captures the fierce loyalty and support we owe one another in the gospel. The devotional teaches us that we are all called to lift each other\'s heavy hands during crucial battles. The lyrics powerfully promise: "Brother, let me be your shelter, never leave you all alone. I can be the one you call when you\'re low."\nThe raw, acoustic energy of this live performance helps the listener feel the urgency and necessity of being a support system. It takes the ancient story of Moses and brings it into our modern relationships, reminding us that providing a stone to sit on or holding up a friend\'s hands is the essence of true discipleship, and motivating us to proactively offer meaningful help.' },
            { id: 'saturday', day: 'Sat', title: 'The Pillar of Fire 🔥', devotionalText: 'The Lord didn\'t just deliver Israel from Egypt and abandon them; He guided them daily with a pillar of cloud by day and fire by night. The Apostle Paul compared their journey through the Red Sea to our own baptism. Just as Israel left their old lives of slavery behind to follow God\'s light, we have covenanted to leave the world behind and follow the constant, guiding companionship of the Holy Ghost.', 
                hymnTitle: 'Lead, Kindly Light', hymnLink: 'https://www.youtube.com/watch?v=cG_FVkxRJ68', hymnAnalysis: '"Lead, Kindly Light" is a masterful, poetic prayer for the exact step-by-step divine direction the Israelites received in the wilderness. The devotional describes the pillar of fire that provided constant light in the darkness, and this hymn echoes that reality: "Lead, kindly Light, amid th\'encircling gloom... I do not ask to see the distant scene—one step enough for me."\nThe Tabernacle Choir\'s moving arrangement evokes a profound sense of reverence and dependence on God\'s light. It encourages us to more fully rely on the Holy Ghost as our personal pillar of fire in daily decisions, trusting that the Lord\'s guidance often illuminates just enough of the path for us to safely take our next step out of darkness.' ,
                songTitle: 'Thy Word', songArtist: 'Amy Grant', songLink: 'https://www.youtube.com/watch?v=a6LC8cu03Ig', songAnalysis: 'Amy Grant\'s "Thy Word" is a beautiful, scripture-based song that highlights the guiding light of God\'s truth. The devotional discusses leaving the world\'s darkness behind to follow God\'s light. Drawing from the Psalms, the chorus declares, "Thy word is a lamp unto my feet and a light unto my path," perfectly capturing the essence of the pillar of fire that illuminated the night for the Israelites.\nThe reassuring melody brings a feeling of safety and clarity, reminding us that when the future seems dark, we can rely on the light of the gospel to reveal our next steps. It encourages us to let the scriptures and the Holy Ghost chase away our fears and guide our family leadership step by step.' },
            { id: 'sunday', day: 'Sun', title: 'Grace for the Moment ✨', devotionalText: 'When facing a harrowing financial trial, Elder D. Todd Christofferson initially prayed for an immediate miracle to solve the problem. Instead, he received grace just for that day—his "daily bread." He learned that sometimes the Savior doesn\'t immediately remove the trial, but patiently walks through it with us, providing just enough help for the moment. Over time, walking with Him daily incrementally changes our hearts and transforms our souls.', 
                hymnTitle: 'Abide with Me; \'Tis Eventide', hymnLink: 'https://www.youtube.com/watch?v=gAhAVBtGhy8', hymnAnalysis: 'The devotional describes the Savior patiently walking through our trials with us, offering His grace and presence for just that day. "Abide with Me; \'Tis Eventide" is a tender, earnest plea for that exact, continuous companionship. The lyrics, "O Savior, stay this night with me," capture the yearning for His incremental, daily help rather than demanding an immediate escape from the darkness.\nThe sweeping, gorgeous arrangement by The Tabernacle Choir creates an atmosphere of deep reverence and peace. It sets a perfect spiritual tone for the Sabbath day and the ordinance of the sacrament, helping us reflect on the quiet grace the Lord extends to us and fostering immense gratitude for His steadfast companionship in our hardest hours.' ,
                songTitle: 'Sufficient for Today', songArtist: 'Maverick City Music', songLink: 'https://www.youtube.com/watch?v=_mjI1axEs98', songAnalysis: 'Maverick City Music\'s "Sufficient for Today" is a breathtaking musical testimony of daily grace. The devotional focuses on the "daily bread" of God\'s sustaining power when the final outcome of our trials is still completely unknown. The song\'s lyrics boldly declare that His mercy and grace are indeed "sufficient for today," teaching us to stop borrowing tomorrow\'s worries and rest in the moment.\nThis soulful, worshipful performance anchors us in the present moment, allowing us to express profound gratitude for the incremental grace that sustains us today and transforms our souls over time. It is a triumphant, faith-filled conclusion to a week of studying God\'s miraculous deliverance and provision.' }

            {
                title: "Background and Introduction",
                content: [
                    "After generations of bondage, the children of Israel were finally free—but their dramatic escape from Egypt was only the beginning of their journey. Almost immediately, they found themselves trapped between the impassable Red Sea and the charging army of Pharaoh. It was a terrifying moment of perceived hopelessness. Yet, through Moses, the Lord delivered a timeless message: \"Fear ye not, stand still, and see the salvation of the Lord.\" The chapters we study this week are filled with breathtaking miracles—the parting of the Red Sea, the sweetening of the bitter waters of Marah, the daily provision of manna, and water flowing from a rock. But beyond the physical miracles, these events are profound types and shadows pointing us to Jesus Christ. He is our living water, our bread of life, and our ultimate Deliverer who provides daily spiritual nourishment as we wander through the wilderness of mortality.",
                    <span>Full Lesson: <a href="https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng" target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:underline break-all">https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/16?lang=eng</a></span>
                ]

            {
                title: "Section 1: April 13–19: “Stand Still, and See the Salvation of the Lord” (Exodus 14–18) & The Lord can do a “great work” in my life",
                discussionPoint: "When the Israelites saw Pharaoh's army approaching, they were terrified. In Hebrew, the phrase Moses used for \"stand still\" can also mean \"to take one’s proper or assigned position.\" Moses was inviting them to shift their focus away from their own limited, mortal strength and place their complete trust in God’s power. Additionally, modern revelation teaches us that the parting of the Red Sea is a powerful example of how the Spirit of revelation works. President Jeffrey R. Holland taught that just as Moses faced an impossible predicament and needed heavenly information, \"The Red Sea will open to the honest seeker of revelation.\"\n\nRead Exodus 14:13–14, 30 \n13 And Moses said unto the people, Fear ye not, stand still, and see the salvation of the Lord, which he will shew to you to day: for the Egyptians whom ye have seen to day, ye shall see them again no more for ever. \n14 The Lord shall fight for you, and ye shall hold your peace. \n30 Thus the Lord saved Israel that day out of the hand of the Egyptians; and Israel saw the Egyptians dead upon the sea shore.\n\nAbout These Verses: \nThese verses capture a pivotal moment of deliverance for the house of Israel. Facing what seemed like certain destruction, Moses commanded the people to \"stand still\" and witness God's power rather than panicking or trying to fight in their own strength. Verse 30 confirms that God was true to His word, providing a miraculous escape through the Red Sea and securing their freedom from Egyptian bondage once and for all.",
                questions: [
                    {
                        q: "What does it mean for us to \"stand still\" or take our \"proper position\" when we feel trapped by our challenges?",

                    {
                        q: "How can remembering the miracle of the Red Sea give us courage when we are seeking crucial personal revelation for our own lives?",

            },
            {
                title: "Section 2: The Lord can make bitter things sweet. (Exodus 15:22–27; 16:1–15; 17:1–7)",
                discussionPoint: "Shortly after their miraculous deliverance, the Israelites faced a new crisis: they had no water. When they finally found water at Marah, it was bitter and unfit to drink. The Lord instructed Moses to cast a tree into the waters, which immediately made them sweet and pure. This event is highly symbolic. The tree that brought healing to the bitter waters represents Jesus Christ and His Atonement, which has the power to cleanse us and remove the bitterness from our own mortal experiences.\n\nExodus 15:23–25\n23 And when they came to Marah, they could not drink of the waters of Marah, for they were bitter: therefore the name of it was called Marah.\n24 And the people murmured against Moses, saying, What shall we drink?\n25 And he cried unto the Lord; and the Lord shewed him a tree, which when he had cast into the waters, the waters were made sweet: there he made for them a statute and an ordinance, and there he proved them,\n\nAbout These Verses:\nIn these verses from Exodus 15, we learn about the Israelites' experience at Marah shortly after their miraculous crossing of the Red Sea. When they encountered bitter water that they could not drink, the Lord provided a way to make it sweet, teaching them that He could heal their circumstances and provide for their needs even in the wilderness. Exodus 15:23–25 describes the trial of thirst faced by the children of Israel in the wilderness of Shur. Upon finding water at Marah, they were disappointed to find it too bitter to drink, leading them to \"murmur\" or complain against Moses. In response to Moses's prayer, the Lord revealed a specific tree that, when cast into the water, miraculously made it sweet. This account serves as a powerful symbol of how the Savior can transform the \"bitter\" experiences of our lives into something \"sweet\" and sustaining as we follow His direction.",
                questions: [
                    {
                        q: "It is easy to be critical of the Israelites for murmuring so soon after a miracle, but how do we sometimes exhibit that same behavior today?",
                        a: "[We often murmur when our immediate comfort is threatened, quickly forgetting the profound spiritual experiences or blessings God has given us in the past. We let present inconveniences overshadow our gratitude.]"

                    {

            {
                title: "Section 3: The Lord offers me daily spiritual nourishment. (Exodus 16)",
                discussionPoint: "To sustain Israel in the wilderness, the Lord miraculously provided manna. Crucially, they were commanded to gather it daily. Elder D. Todd Christofferson explained that Jehovah was teaching them to walk with Him today and trust Him for tomorrow, showing that He could never be far from their minds. Sometimes, when facing heavy trials, we want an immediate, complete deliverance. Yet, Elder Christofferson noted that we must learn to be content with receiving \"daily help\" and taking life one day at a time. Elder Dieter F. Uchtdorf has also taught that just as getting lost in a forest happens by drifting in small circles, we need \"daily restoration\" through prayer and scripture study to consistently realign our path with the Savior.\n\nExodus 16:4\n4 Then said the Lord unto Moses, Behold, I will rain bread from heaven for you; and the people shall go out and gather a certain rate every day, that I may prove them, whether they will walk in my law, or no.\n\nAbout This Verse:\nExodus 16:4 introduces the miracle of the manna. As the children of Israel struggled with hunger in the desert, the Lord revealed that He would provide sustenance directly from heaven. Crucially, He commanded them to gather only a \"certain rate every day.\" This requirement was designed to \"prove\" (or test) their obedience and faith, teaching them to trust that the Lord would provide for their needs one day at a time. In this verse, the Lord promises to provide \"bread from heaven\" to sustain the Israelites in the wilderness, establishing a pattern of daily reliance on Him.",

            {
                title: "Section 4: Jesus Christ is my spiritual rock and living water. (Exodus 17:1–7)",
                discussionPoint: "When the Israelites were again dying of thirst, the Lord commanded Moses to strike a rock at Horeb, and life-saving water poured out. The Apostle Paul beautifully clarified the symbolism of this event, teaching that the Israelites drank from a \"spiritual Rock that followed them,\" explicitly identifying that Rock as Jesus Christ. He is the true source of living water that sustains us in the arid wilderness of mortality.\n\n1 Corinthians 10:4\n4 And did all drink the same spiritual drink: for they drank of that spiritual Rock that followed them: and that Rock was Christ.\n\nAbout This Verse:\n1 Corinthians 10:4 teaches that Jesus Christ was the source of spiritual strength for the children of Israel long before His mortal ministry. By identifying Christ as the \"spiritual Rock,\" Paul emphasizes that the Savior is the constant provider of life-giving water and support. Just as the Israelites relied on physical water to survive the desert, all people must rely on the \"spiritual drink\" of the gospel and the Atonement of Jesus Christ to survive the spiritual challenges of mortality.",
                questions: [

            {
                title: "Section 5: Disciples help each other “bear the burden” of doing the Lord’s work. (Exodus 17:8–16; 18:13–26)",
                discussionPoint: "During the battle against the Amalekites, Israel prevailed only as long as Moses held up his hands. When Moses grew weary, Aaron and Hur physically held his hands up so the battle could be won. Later, Moses’s father-in-law, Jethro, observed Moses exhaustively trying to judge all the people alone and counseled him to delegate. Both stories powerfully illustrate that no one, not even a mighty prophet, is meant to do the Lord's work alone. We must bear one another's burdens.\n\nExodus 17:11–12\n11 And it came to pass, when Moses held up his hand, that Israel prevailed: and when he let down his hand, Amalek prevailed.\n12 But Moses’ hands were heavy; and they took a stone, and put it under him, and he sat thereon; and Aaron and Hur stayed up his hands, the one on the one side, and the other on the other side; and his hands were steady until the going down of the sun.\n\nAbout These Verses:\nExodus 17:11–12 recounts a specific moment during the Israelites' battle with Amalek at Rephidim. Moses stood on top of a hill with the \"rod of God\" in his hand; when his hands were raised, Israel had the advantage, but when they dropped due to exhaustion, the enemy began to win. To ensure victory, Aaron and Hur provided a stone for Moses to sit on and physically held his arms up until sunset. This passage is frequently used in the Church to teach the principle of sustaining the prophet and other local leaders, reminding us that we all have a role to play in supporting those who have heavy responsibilities.",
                questions: [

            {
                title: "Section 6: The Pillar of cloud and a pillar of fire",
                discussionPoint: "The Lord guided the Israelites through the wilderness with a pillar of cloud by day and a pillar of fire by night, symbolizing His constant presence and protection. The Apostle Paul taught that passing through the Red Sea under this cloud was highly symbolic of baptism by water and fire. By passing through the sea, the Israelites left their old lives of slavery behind and emerged into a new life as the Lord's covenant people.\n\n1 Corinthians 10:1–2\n1 Moreover, brethren, I would not that ye should be ignorant, how that all our fathers were under the cloud, and all passed through the sea;\n2 And were all baptized unto Moses in the cloud and in the sea;\n\nAbout These Verses:\n1 Corinthians 10:1–2 uses the history of the Exodus to teach about covenants and ordinances. In these verses, the Apostle Paul draws a parallel between the ancient Israelites' journey through the wilderness and the spiritual path of a Christian. He describes their experience with the pillar of cloud and the crossing of the Red Sea as a symbolic form of baptism that united them under Moses’s leadership.\nPaul explains that the physical protection of the \"cloud\" (the presence of the Lord) and the miracle of passing through the Red Sea were not just historical events, but spiritual symbols. By being \"baptized unto Moses,\" the Israelites were essentially entering into a covenant relationship with God through their prophet, just as we enter into a covenant with God through the ordinance of baptism today.",
                questions: [

        const IconChevronRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const IconLink = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
        const IconPlayCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>;
        const IconPrinter = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;

        // ==========================================
        // COMPONENTS
        // ==========================================

        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);
            if (!show) return null;
            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

        const ToggleAnswer = ({ question, answer }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="mb-6 border-l-4 border-amber-200 pl-4">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="text-left font-bold text-amber-900 w-full hover:text-amber-700 transition-colors flex items-start gap-2"
                    >
                        <span className="mt-1">{isOpen ? <IconChevronDown className="w-5 h-5" /> : <IconChevronRight className="w-5 h-5" />}</span>
                        <span>{question}</span>
                    </button>
                    {isOpen && (
                        <div className="mt-3 p-4 bg-stone-100 rounded-lg text-stone-700 italic border border-stone-200 fade-in">
                            <span className="font-bold not-italic text-stone-500 text-xs uppercase tracking-wider block mb-1">Possible Answer</span>
                            <div className="whitespace-pre-line">{answer}</div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('devotional');
            const [activeDayId, setActiveDayId] = useState('');
            const [showToast, setShowToast] = useState(false);
            const [youthGroup, setYouthGroup] = useState('ym'); 

            useEffect(() => {
                const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
                const todayIndex = new Date().getDay();
                setActiveDayId(dayMap[todayIndex]);
            }, []);

            const getActiveData = (dataArray) => {
                return dataArray.find(d => d.id === activeDayId) || dataArray[0];
            };

            const copyToClipboard = (dayData) => {
                const promptParts = dayData.prompt.split(':');
                const promptLabel = promptParts[0];
                const promptText = promptParts.slice(1).join(':').trim();
                const scriptureText = (dayData.scriptureRef && dayData.scriptureLink)
                    ? `Scripture: ${dayData.scriptureRef}\n${dayData.scriptureLink}\n\n`
                    : ""; 
                const dateStr = dayData.date ? dayData.date : "";
                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                            <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button onClick={() => setYouthGroup('ym')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Men</button>
                            <button onClick={() => setYouthGroup('yw')} className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}>Young Women</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button onClick={() => copyToClipboard(data)} className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors">
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Restoration</h2>
                            <p className="mt-2 text-stone-500 text-sm">Journey Through the Wilderness: A Thematic Musical Companion</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Hymn Selection</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>
                                <hr className="border-stone-100" />
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2"><IconMusic className="w-3 h-3" /> Contemporary Song</span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors"><IconPlayCircle className="w-8 h-8" /></a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full"><h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1></div>
                                 <button onClick={() => window.print()} className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all" aria-label="Print Discussion Guide"><IconPrinter className="w-6 h-6" /></button>
                            </div>
                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            <div className="mb-8">
                                <img src="Graphic.jpg" alt="Infographic: Old Testament" className="w-full h-auto rounded-lg shadow-md border border-stone-200" onError={(e) => {e.target.style.display = 'none'}} />
                            </div>
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    {section.content && section.content.map((p, i) => (
                                        typeof p === 'string' ? <p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p> : <React.Fragment key={i}>{p}</React.Fragment>
                                    ))}
                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}
                                    {section.questions && section.questions.map((qItem, qIdx) => (<ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" /><span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button key={d.id} onClick={() => setActiveDayId(d.id)} className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}>
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>
                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
