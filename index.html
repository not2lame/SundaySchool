    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "God Meant It unto Good",
            dateRange: "March 16 – March 22, 2026",
            valediction: "May you find peace in the Savior’s grace , trusting that He turns every trial into eternal good."
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Mar 16', title: 'God Meant It Unto Good 🌅', text: 'Joseph\'s brothers sold him into slavery, but looking back, Joseph realized God used that trial to save his family. Elder Neal A. Maxwell taught that even the \"evil intent of Joseph\'s brothers was folded into the plans of God\". When we trust Heavenly Father, our deepest sorrows can be consecrated for our good, turning painful betrayals into tools that eventually bless our lives and the lives of others.', prompt: 'Reflection: How has a past painful experience or trial eventually worked together for your good?', scriptureRef: 'Genesis 50:20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/50?lang=eng&id=p20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Mar 17', title: 'A Willing Substitute 🤝', text: 'Years earlier, Judah was the one who suggested selling Joseph into slavery. But when his younger brother Benjamin was later accused in Egypt, Judah offered to take his punishment so Benjamin could go free. This beautiful act of substitution reminds us of Judah’s future descendant, Jesus Christ. Just as Judah offered to take the punishment, the Savior took our sins upon Himself so we can return to our Heavenly Father.', prompt: 'Challenge: Take a moment today to express profound gratitude in your personal prayers for the Savior\'s willingness to take your place and pay for your mistakes.', scriptureRef: 'Genesis 44:33', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/44?lang=eng&id=p33', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Mar 18', title: 'The Miracle of Forgiveness ❤️‍🩹', text: 'Forgiving deep offenses can feel impossible on our own. Chris Williams, a Latter-day Saint who lost his wife and children to a drunk driver, taught that his ability to extend forgiveness was simply the Savior working through him. Elder Gerrit W. Gong reminded us that trusting the Savior\'s merits, mercy, and grace frees us from contention, anger, and unfairness. We don\'t have to forgive alone; Christ can give us the strength to heal.', prompt: 'Reflection: Is there someone you are struggling to forgive right now? How can you invite the Savior\'s healing grace to help you let go of that burden?', scriptureRef: 'Doctrine and Covenants 64:10', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/64?lang=eng&id=p10', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Mar 19', title: 'Sent Before to Preserve Life 🌾', text: 'When Joseph finally revealed himself to his brothers, he told them not to be angry with themselves, explaining that God had sent him to Egypt \"to preserve life\". Joseph saved his family from physical starvation, beautifully foreshadowing Jesus Christ, who is the true \"Bread of Life\". No matter the spiritual famines or trials we face, the Savior has already gone before us to prepare a way for our eternal survival and deliverance.', prompt: 'Reflection: In what ways is the Savior providing \"bread\" for your soul during your current mortal challenges?', scriptureRef: 'Genesis 45:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/45?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Mar 20', title: 'The Sceptre of Shiloh 👑', text: 'Before he died, Jacob gave prophetic blessings to his sons. He prophesied that the right to rule would remain with Judah until \"Shiloh\" came. In Hebrew, Shiloh means \"He to whom it belongs\" and refers directly to Jesus Christ, who was a descendant of Judah. It is a powerful reminder that all priesthood blessings, covenants, and ancient prophecies ultimately point our souls to the Savior.', prompt: 'Challenge: As you study your scriptures this weekend, specifically look for verses and stories that point you toward Jesus Christ, the true King.', scriptureRef: 'Genesis 49:10', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/49?lang=eng&id=p10', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Mar 21', title: 'A Personal Liahona 🧭', text: 'Just as Jacob laid his hands on his descendants to give them inspired blessings, we receive personalized, inspired direction today through patriarchal blessings. Elder Randall K. Bennett taught that his blessing was a \"personal Liahona\" that helped him understand his true eternal identity as a child of the covenant when life was incredibly stressful. These sacred blessings provide a direct reminder that Heavenly Father knows and loves us individually.', prompt: 'Reflection: When was the last time you read your patriarchal blessing? Take time this weekend to study it and look for a specific reminder of God\'s love and direction for you.', scriptureRef: 'Genesis 48:8-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/48?lang=eng&id=p8-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Mar 22', title: 'A Choice Seer 📖', text: 'In the Joseph Smith Translation of Genesis 50, we learn that Joseph of Egypt prophesied of the latter days. He foresaw a \"choice seer\" named Joseph who would bring forth the writings of his descendants to grow together with the Bible. This ancient prophecy reminds us that the Restoration of the gospel was planned by God millennia ago to bring us to a knowledge of His everlasting covenants.', prompt: 'Challenge: As you partake of the sacrament today, give silent thanks for the Prophet Joseph Smith and the restored gospel that allows our families to be sealed together forever.', scriptureRef: '2 Nephi 3:15', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/2-ne/3?lang=eng&id=p15', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' }
        ];

        const YM_DATA = [
             { id: 'monday', day: 'Mon', date: 'Mar 16', title: 'God Meant It Unto Good 🌅', text: 'Joseph\'s brothers sold him out, but God ultimately used that terrible experience to save their whole family,. When people treat you badly or life gets rough, God can turn it into something that makes you stronger. Elder Neal A. Maxwell said the evil intent of Joseph\'s brothers was folded right into the plans of God. He can take your hardest days and use them to build your spiritual muscles.', prompt: 'Reflection: What is a hard thing you\'ve faced recently (like an injury, a failure, or a disappointment) that has actually made you a better, stronger priesthood man?', scriptureRef: 'Genesis 50:20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/50?lang=eng&id=p20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 17', title: 'Taking the Hit 🛡️', text: 'Judah was originally the brother who suggested selling Joseph as a slave. But years later, he completely stepped up and offered to become a slave himself so his little brother Benjamin could go free. He was willing to take the hit! That is exactly what Jesus Christ did for us. He took our punishment upon Himself so we could return to Heavenly Father.', prompt: 'Challenge: How does knowing the Savior \"took the hit\" for your mistakes change the way you feel about repenting? Take a moment today to thank Him for having your back.', scriptureRef: 'Genesis 44:33', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/44?lang=eng&id=p33', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 18', title: 'The Ultimate Flex 💪❤️‍🩹', text: 'Joseph had the power to crush his brothers for what they did to him, but he chose to forgive them instead. Chris Williams, a man whose family was tragically killed by a drunk teenage driver, was able to forgive the teen by letting the Savior work through him,. Holding a grudge is easy, but true strength is trusting Jesus Christ enough to let it go.', prompt: 'Reflection: Is there someone at school, on your team, or in your family you are holding a grudge against? Decide today to let it go and let the Savior heal the situation.', scriptureRef: 'Doctrine and Covenants 64:10', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/64?lang=eng&id=p10', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 19', title: 'Your Personal Liahona 🧭', text: 'Before he died, Jacob laid his hands on his grandsons\' heads to give them inspired priesthood blessings. Today, we receive Patriarchal Blessings. Elder Randall K. Bennett said his blessing was like a \"personal Liahona\" that helped him know his true eternal identity when he was young and going through serious anxiety about his family,. It’s a direct message from God just for you!', prompt: 'Challenge: If you don\'t have your patriarchal blessing yet, talk to your parents or bishop this week about preparing for it. If you do have it, read it tonight!', scriptureRef: 'Genesis 48:8-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/48?lang=eng&id=p8-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 20', title: 'Branches Over the Wall 🌿', text: 'Jacob prophesied that Joseph’s descendants would be like branches running \"over the wall\". President Ezra Taft Benson taught this means Lehi\'s family crossing the ocean to the Americas. As a member of the Church, you have the Book of Mormon—the literal record of Joseph\'s descendants! It proves that God keeps His ancient promises.', prompt: 'Reflection: Read just one chapter of the Book of Mormon today, remembering that it’s the incredible fulfillment of a prophecy made thousands of years ago.', scriptureRef: 'Genesis 49:22', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/49?lang=eng&id=p22', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 21', title: 'The Choice Seer 📖', text: 'Joseph of Egypt was a powerful leader, but he actually prophesied about someone else named Joseph—Joseph Smith! He said God would raise up a \"choice seer\" from his family line to restore the gospel and the priesthood in the last days,. Because of that ancient prophecy coming true, you hold actual priesthood authority from God today.', prompt: 'Challenge: Next time you prepare or pass the sacrament, think about the Prophet Joseph Smith and how grateful you are that the Aaronic Priesthood was restored to the earth.', scriptureRef: '2 Nephi 3:15', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/2-ne/3?lang=eng&id=p15', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 22', title: 'A Bent Branch Isn\'t a Bad Tree 🌳', text: 'No family is perfect. Joseph\'s brothers literally sold him into slavery! Elder Gerrit W. Gong shared a story about a man who realized that \"a bent branch does not mean a bad tree\". Even if your family has serious flaws or drama right now, the Savior\'s Atonement can help you break bad cycles and build a righteous future,.', prompt: 'Challenge: How can you use your Aaronic Priesthood to bring more peace and less drama into your home today? Try being the first one to apologize or offer help.', scriptureRef: 'Genesis 45:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/45?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Mar 16', title: 'The Ultimate Plot Twist 📖✨', text: 'Joseph\'s life seemed like a tragedy when his brothers sold him out, but the ultimate plot twist was that God used that exact trial to save their whole family! Elder Neal A. Maxwell taught that God folded their bad choices right into His perfect plan. When life feels unfair or people treat you badly, trust that Heavenly Father can take your hardest chapters and turn them into something beautiful.', prompt: 'Reflection: What is a difficult chapter in your life right now? How can you trust Heavenly Father to write a beautiful ending for it?', scriptureRef: 'Genesis 50:20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/50?lang=eng&id=p20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 17', title: 'He Took Your Spot ❤️', text: 'When Benjamin was in huge trouble in Egypt, his older brother Judah stepped up and offered to take his punishment so Benjamin could go free. This beautiful moment points straight to Jesus Christ. He willingly stepped in to take the punishment for our mistakes so we could return to Heavenly Father safely. You never have to face your mistakes alone!', prompt: 'Challenge: Take a minute today to express pure gratitude in your prayers that the Savior was willing to take your spot and pay for your mistakes.', scriptureRef: 'Genesis 44:33', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/44?lang=eng&id=p33', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 18', title: 'The Power to Let It Go 🎈', text: 'Joseph had every reason to hold a massive grudge against his brothers, but he chose to forgive them. Chris Williams, a man who forgave the driver who caused his family\'s tragic accident, said that his ability to forgive was actually the Savior working through him. Holding onto grudges with friends or siblings is exhausting. Let the Savior help you drop the heavy baggage of resentment!', prompt: 'Reflection: Is there a grudge you\'re holding against a friend or family member? Decide today to let it go and ask the Savior to help heal your heart.', scriptureRef: 'Doctrine and Covenants 64:10', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/64?lang=eng&id=p10', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 19', title: 'Your Personal Liahona 🧭💖', text: 'Before he died, Jacob gave inspired priesthood blessings to his grandsons. Today, you can receive a patriarchal blessing! Elder Randall K. Bennett said his blessing was like a \"personal Liahona\" that helped him know his true eternal identity when life was super stressful. It’s a literal letter of love and guidance from Heavenly Father, showing exactly how much He knows you and wants the best for you.', prompt: 'Challenge: If you haven\'t received your patriarchal blessing, ask your parents or bishop what you can do to prepare. If you have it, read it tonight before bed!', scriptureRef: 'Genesis 48:8-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/48?lang=eng&id=p8-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 20', title: 'The Bread of Life 🍞💕', text: 'Joseph saved his family from physical starvation by giving them the grain they desperately needed. He is a perfect symbol of Jesus Christ, who rescues us from spiritual starvation. Whenever you feel spiritually empty, exhausted, or famished by the drama of the world, the Savior is ready to feed you with His love, peace, and the ultimate \"Bread of Life.\"', prompt: 'Reflection: What is one thing you can do today to \"feed\" your spirit? (Like listening to uplifting music, reading a conference talk, or saying a sincere prayer).', scriptureRef: 'Genesis 45:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/45?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 21', title: 'Prophecy Fulfilled 🌟', text: 'Did you know Joseph of Egypt actually prophesied about a \"choice seer\" who would be named Joseph? He was talking about Joseph Smith! He knew thousands of years ago that a prophet would be raised up to bring forth the Book of Mormon and restore God\'s covenants. The gospel you get to participate in today was planned millennia ago just for you.', prompt: 'Challenge: Next time you read the Book of Mormon, remember it is the literal fulfillment of an ancient prophecy. Try reading just one chapter today!', scriptureRef: '2 Nephi 3:15', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/2-ne/3?lang=eng&id=p15', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 22', title: 'Happy and Forever 🏰✨', text: 'No family is perfectly put together. Joseph\'s brothers literally sold him into slavery! But Elder Gerrit W. Gong reminds us that true, enduring joy and \"happy and forever\" families are the whole point of God\'s plan. Because of Jesus Christ\'s Atonement and temple covenants, even broken family relationships can eventually be healed and knit together with eternal love.', prompt: 'Challenge: As you take the sacrament today, ask Heavenly Father how you can be a peacemaker and bring a little more \"happy\" into your family this week.', scriptureRef: 'Genesis 50:17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/50?lang=eng&id=p17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/12?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'God Meant It Unto Good 🌅', devotionalText: 'Joseph\'s brothers sold him into slavery, but looking back, Joseph realized God used that trial to save his family. Elder Neal A. Maxwell taught that even the \"evil intent of Joseph\'s brothers was folded into the plans of God\". When we trust Heavenly Father, our deepest sorrows can be consecrated for our good, turning painful betrayals into tools that eventually bless our lives and the lives of others.', 
                hymnTitle: 'Come, Come, Ye Saints', hymnLink: 'https://www.youtube.com/watch?v=4ia3gYSvG8M', hymnAnalysis: '\"Come, Come, Ye Saints\" captures the essence of consecrating profound sorrow for our ultimate good. Just as Joseph recognized that God was orchestrating a divine rescue through his hardships, the lyrics \"all is well\" remind us that God\'s overarching plans will never forsake us. The Choir\'s triumphant arrangement echoes Joseph\'s realization that when we submit patiently to trials, our past heartaches eventually result in a joyful \"tale to tell.\"' ,
                songTitle: 'Trust In You', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=zorHlbilFQU', songAnalysis: '\"Trust In You\" is a raw, relatable declaration of faith when life doesn\'t go as planned. The lyrics confess the pain of unmet expectations, yet the chorus resounds with the deliberate choice to trust God anyway. This beautifully mirrors Joseph\'s attitude during his decades of slavery and imprisonment, holding fast to faith when his brothers\' betrayal seemed to have ruined his life. It teaches us that true trust isn\'t dependent on immediate rescue, but on knowing the loving character of God.' },
            { id: 'tuesday', day: 'Tue', title: 'A Willing Substitute 🤝', devotionalText: 'Years earlier, Judah was the one who suggested selling Joseph into slavery. But when his younger brother Benjamin was later accused in Egypt, Judah offered to take his punishment so Benjamin could go free. This beautiful act of substitution reminds us of Judah’s future descendant, Jesus Christ. Just as Judah offered to take the punishment, the Savior took our sins upon Himself so we can return to our Heavenly Father.', 
                hymnTitle: 'There Is a Green Hill Far Away', hymnLink: 'https://www.youtube.com/watch?v=9nG79ft4jgQ', hymnAnalysis: '\"There Is a Green Hill Far Away\" beautifully captures the awe and solemnity of the Savior\'s substituting sacrifice. The devotional highlights Judah\'s willingness to take his brother\'s punishment, perfectly foreshadowing the Savior\'s Atonement. The gentle, poignant lyrics remind us that \"He died that we might be forgiven,\" directly reflecting the supreme act of substitution that took place on Calvary.' ,
                songTitle: 'Redeemer', songArtist: 'Nicole C. Mullen', songLink: 'https://www.youtube.com/watch?v=T3wSeKqzEzo', songAnalysis: '\"Redeemer\" is a passionate declaration of faith in a living, active Savior who reaches into our brokenness to redeem us. The song’s central theme of a Redeemer who rescues and restores perfectly aligns with Judah stepping in to save his younger brother, pointing our minds directly to Jesus Christ. Listening to this song inspires a deep, personal gratitude for the ultimate Substitute who conquered the grave so we could return to our Heavenly Father.' },
            { id: 'wednesday', day: 'Wed', title: 'The Miracle of Forgiveness ❤️‍🩹', devotionalText: 'Forgiving deep offenses can feel impossible on our own. Chris Williams, a Latter-day Saint who lost his wife and children to a drunk driver, taught that his ability to extend forgiveness was simply the Savior working through him. Elder Gerrit W. Gong reminded us that trusting the Savior\'s merits, mercy, and grace frees us from contention, anger, and unfairness. We don\'t have to forgive alone; Christ can give us the strength to heal.', 
                hymnTitle: 'Lord, I Would Follow Thee', hymnLink: 'https://www.youtube.com/watch?v=XivyFAqXv3Q', hymnAnalysis: '\"Lord, I Would Follow Thee\" is a gentle, introspective hymn that pleads for the Savior\'s healing grace in our interpersonal relationships. The profound lyric, \"I would be my brother\'s keeper; I would learn the healer\'s art,\" is a direct prayer for the strength to forgive and to heal the wounds caused by others. By listening to this sincere plea, we are inspired to invite the Savior\'s grace into our own lives to overcome contention and anger.' ,

        // 1. Toast Notification Component
        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);

            if (!show) return null;

            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>

                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>

                            <button 
                                onClick={() => copyToClipboard(data)}
                                className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors"
                            >
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        {/* Toggle Switch for YM/YW */}
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button 
                                onClick={() => setYouthGroup('ym')}
                                className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}
                            >
                                Young Men
                            </button>
                            <button 
                                onClick={() => setYouthGroup('yw')}
                                className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}
                            >
                                Young Women
                            </button>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            {/* Decorative Top Border */}
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>

                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button 
                                onClick={() => copyToClipboard(data)}
                                className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors"
                            >
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Soul</h2>
                            <p className="mt-2 text-stone-500 text-sm">Music to invite the Spirit into your daily study.</p>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            
                            <div className="space-y-8">
                                {/* Hymn Section */}
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Hymn Selection
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>

                                <hr className="border-stone-100" />

                                {/* Song Section */}
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Contemporary Song
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full">
                                    <h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1>
                                 </div>
                                 <button 
                                    onClick={() => window.print()} 
                                    className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all"
                                    aria-label="Print Discussion Guide"
                                    title="Print Discussion Guide"
                                >
                                    <IconPrinter className="w-6 h-6" />
                                </button>
                            </div>

                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            
                            {/* --- ADDED IMAGE HERE --- */}
                            <div className="mb-8">
                                <img 
                                    src="Graphic.jpg" 
                                    alt="Infographic: Old Testament" 
                                    className="w-full h-auto rounded-lg shadow-md border border-stone-200"
                                    onError={(e) => {e.target.style.display = 'none'}} 
                                />
                            </div>
                            {/* ------------------------ */}
                            
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    
                                    {section.content && section.content.map((p, i) => (
                                        <p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p>
                                    ))}

                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}

                                    {section.quote && (
                                        <blockquote className="border-l-4 border-stone-300 pl-4 py-1 my-4 text-stone-600 italic bg-stone-50 p-3 rounded-r-lg">
                                            {section.quote}
                                        </blockquote>
                                    )}

                                    {section.question && (
                                        <ToggleAnswer question={section.question} answer={section.answer} />
                                    )}

                                    {section.questions && section.questions.map((qItem, qIdx) => (
                                        <ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // Dynamic Footer based on view
            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    {/* Header */}
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>

                            {/* Main Nav Tabs */}
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Secondary Day Navigation (Horizontal Scroll) - Only show for Daily, Youth, Songs */}
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button
                                            key={d.id}
                                            onClick={() => setActiveDayId(d.id)}
                                            className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}
                                        >
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Content Area - Scrollable */}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>

                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
