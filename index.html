    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "Is Any Thing Too Hard for the Lord",
            dateRange: "February 23 – March 1, 2026",
            valediction: "May your faith always point toward the future, trusting completely that nothing is too hard for the Lord"
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Feb 23', title: 'The Proving Ground 🌍', text: 'The lives of Abraham and Sarah were filled with dramatic extremes, from heartbreaking delays to heartwarming miracles. Their journey is a powerful testament to a profound truth: we are on earth to be proven. God wants to see if we will remain faithful and obedient to His commands, even when the fulfillment of His promises seems impossible. In proving us, God also improves us.', prompt: 'Reflection: How do your current trials give you an opportunity to prove your trust in God and grow spiritually?', scriptureRef: 'Abraham 3:25', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/pgp/abr/3?lang=eng&id=p25', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Feb 24', title: 'Is Anything Too Hard for the Lord? ⏳', text: 'God makes glorious promises to the faithful, but life\'s circumstances can sometimes cause us to wonder how or when those promises will be fulfilled. Abraham and Sarah waited decades for the birth of Isaac. When the Lord reiterated the promise to them in their old age, He gently reminded them: "Is any thing too hard for the Lord?" His power transcends physical limitations, and His promises are always fulfilled in His appointed time.', prompt: 'Challenge: Identify a promised blessing you are still waiting for. Express gratitude in your prayers today for God\'s perfect timing and power.', scriptureRef: 'Genesis 18:14', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/18?lang=eng&id=p14', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Feb 25', title: 'Flee Without Lingering 🏃‍♂️', text: 'When the Lord sent angels to destroy the wicked city of Sodom, they provided Lot\'s family a way of escape, urgently commanding them to flee to the mountains and to "look not behind thee." Following Christ often requires us to leave worldly environments and behaviors completely behind. The urgency of the angels shows that we cannot linger or compromise with sin.', prompt: 'Reflection: Is there an environment, habit, or media influence in your life that you need to urgently "flee" from today?', scriptureRef: 'Genesis 19:17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/19?lang=eng&id=p17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Feb 26', title: 'Faith Points to the Future 🌅', text: 'While fleeing Sodom, Lot\'s wife looked back and was lost. Elder Jeffrey R. Holland provided profound insight into her mistake, noting that she didn\'t just look back with her eyes; she looked back longingly with her heart. Her attachment to the past outweighed her confidence in the future. As disciples of Christ, we are asked to learn from the past, but our faith must always be pointed toward the future.', prompt: 'Challenge: Are you holding onto past mistakes or "ashes" from your old life? Make a conscious choice today to fully commit to your covenant path moving forward.', scriptureRef: 'Luke 17:32', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/luke/17?lang=eng&id=p32', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Feb 27', title: 'God Will Provide a Lamb 🐑', text: 'As Abraham and Isaac climbed Mount Moriah, Isaac noticed they had wood and fire, but no animal for the sacrifice. Abraham faithfully replied, "God will provide himself a lamb." This was not just reassurance for his son; it was a profound prophetic foreshadowing. Just as God provided a ram in the thicket to save Isaac, Heavenly Father provided His Only Begotten Son as the ultimate Lamb of God to save all of mankind.', prompt: 'Reflection: Think about the relief Abraham must have felt when the ram was provided. How does knowing Jesus Christ is the "Lamb of God" bring relief and peace to your soul?', scriptureRef: 'Genesis 22:7-8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/22?lang=eng&id=p7-8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Feb 28', title: 'A Willing Son 🪵', text: 'We often picture Isaac as a small boy during the events on Mount Moriah, but historical and biblical context suggests he was a strong young man who carried the heavy wood for the sacrifice. He could have easily resisted his elderly father. Instead, Isaac willingly submitted to his father’s will, beautifully mirroring how Jesus Christ willingly carried His cross and submitted to the will of His Father in Heaven.', prompt: 'Challenge: Look for an opportunity today to willingly submit to the Lord\'s will in a difficult situation, following the example of Isaac and the Savior.', scriptureRef: 'Jacob 4:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/jacob/4?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Mar 1', title: 'The Ultimate Similitude 🍞💧', text: 'The command for Abraham to sacrifice Isaac is one of the most poignant moments in scripture. Through this agonizing trial, Abraham gained a profound, empathetic understanding of the sacrifice Heavenly Father would make for all of us. God did not spare His own Son, but offered Him up out of pure love so that we might live.', prompt: 'Reflection: As you partake of the sacrament today, ponder the infinite love of Heavenly Father in providing His Only Begotten Son, and the perfect love of the Savior in offering Himself for you.', scriptureRef: 'John 3:16', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/3?lang=eng&id=p16', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' }
        ];

        const YM_DATA = [
             { id: 'monday', day: 'Mon', date: 'Feb 23', title: 'The Ultimate Proving Ground 🌍', text: 'Life can be tough, but Abraham learned in a vision that earth is basically a giant proving ground to see if we\'ll follow God\'s commands. Just like working out or trying to level up in a game, the challenges you face aren\'t there to make you fail—they are there to make you stronger. As the lesson manual says, "In proving us, God also improves us."', prompt: 'Challenge: When a challenge hits today (a hard test, sports practice, or a tough choice), treat it like a spiritual workout. Tell yourself, "I can handle this. This is making me stronger."', scriptureRef: 'Abraham 3:25', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/pgp/abr/3?lang=eng&id=p25', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Feb 24', title: 'Is Anything Too Hard? 💪', text: 'Have you ever prayed for something and felt like it was taking forever? Abraham and Sarah waited decades for their promised son, Isaac. When they wondered how it could even be possible in their old age, the Lord simply asked, "Is any thing too hard for the Lord?" Spoiler alert: No, it\'s not. His power is absolute, and His timing is perfect.', prompt: 'Reflection: What is a righteous goal or blessing you are waiting and praying for right now? How can you show God you trust His timing?', scriptureRef: 'Genesis 18:14', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/18?lang=eng&id=p14', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Feb 25', title: 'Escape the Danger Zone 🏃‍♂️', text: 'When angels told Lot to get his family out of the wicked city of Sodom, they didn\'t say, "Take your time." They said, "Escape for thy life; look not behind thee." Following Christ often means leaving worldly environments entirely. When you find yourself in a bad spot—like a toxic group chat, a bad movie, or a sketchy party—don\'t linger. Get out of the danger zone fast!', prompt: 'Challenge: Have an "exit strategy" ready. Decide right now what you will say or do to leave a situation if it suddenly turns bad.', scriptureRef: 'Genesis 19:17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/19?lang=eng&id=p17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Feb 26', title: 'Don\'t Look Back 👀', text: 'Lot\'s wife turned into a pillar of salt because she looked back at Sodom. But it wasn\'t just a quick glance. Elder Holland taught that she looked back longingly. She missed the worldly stuff she was leaving behind. True repentance means dropping our bad habits and facing forward. As a priesthood man, your faith should always point to the future!', prompt: 'Challenge: Delete an app, a song, or a game today that you know isn\'t helping you spiritually. Delete it, and don\'t look back!', scriptureRef: 'Luke 17:32', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/luke/17?lang=eng&id=p32', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Feb 27', title: 'The Strength to Submit 🪵', text: 'We usually picture Isaac as a little boy when Abraham took him to Mount Moriah. But history and biblical context suggest he was actually a strong young adult who carried the heavy wood for the sacrifice up the mountain himself! He could have easily overpowered his elderly dad, but he willingly submitted to God\'s command. That takes massive spiritual and mental strength.', prompt: 'Reflection: Real strength isn\'t just physical; it\'s being strong enough to obey. How can you show real strength by willingly submitting to your parents\' or the Lord\'s rules today?', scriptureRef: 'Genesis 22:6-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/22?lang=eng&id=p6-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Feb 28', title: 'The Ultimate Spotter 🐑', text: 'On the way up the mountain, Isaac noticed they had fire and wood, but no animal to sacrifice. Abraham told his son, "God will provide himself a lamb." God did provide a ram that day, but this was a profound foreshadowing. God provided His Only Begotten Son, the ultimate "Lamb of God," to step in, take our place, and save us all.', prompt: 'Reflection: Think about what it means to you that Jesus Christ stepped in to take your place and pay for your mistakes. How does that change how you view Him?', scriptureRef: 'Genesis 22:7-8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/22?lang=eng&id=p7-8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 1', title: 'A Father\'s Love ❤️', text: 'Abraham being asked to sacrifice his beloved son is one of the most intense stories in scripture. But it was meant to be a "similitude" or symbol of Heavenly Father offering His Son, Jesus Christ. Through that agonizing test, Abraham got a glimpse of exactly how much the Father loves us. He loved us enough to let His Son pay the price for your salvation.', prompt: 'Challenge: As you prepare or pass the sacrament today, think about the teamwork between Heavenly Father and Jesus Christ to provide a way back home for you. Do your duty with exactness and reverence to honor Them.', scriptureRef: 'Jacob 4:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/jacob/4?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Feb 23', title: 'The Ultimate Glow-Up ✨', text: 'Abraham and Sarah’s life was full of extreme highs and heartbreaking lows, but Abraham learned a powerful truth: earth is a proving ground. We are here to see if we will trust God and keep His commandments. Sometimes trials can feel overwhelming, but they aren\'t here to crush you—they are here to polish you. As the lesson manual says, "In proving us, God also improves us."', prompt: 'Challenge: Look at a difficult thing you are facing right now (like a hard class, a tricky friendship, or a personal struggle) and ask yourself, "How is the Lord using this to improve me?"', scriptureRef: 'Abraham 3:25', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/pgp/abr/3?lang=eng&id=p25', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Feb 24', title: 'Trusting God\'s Timeline ⏳', text: 'Sarah waited a really long time for her promised baby, Isaac. When she was told she would finally have a son in her old age, it probably felt entirely impossible! But the Lord asked, "Is any thing too hard for the Lord?" When you are stressed about your future—school, dating, your patriarchal blessing promises, or what comes next—remember that God\'s timeline is flawless and His power is absolute.', prompt: 'Reflection: What is a blessing or goal you are anxiously waiting for right now? Take a deep breath today and practice handing the timeline over to Heavenly Father.', scriptureRef: 'Genesis 18:14', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/18?lang=eng&id=p14', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Feb 25', title: 'Flee the Drama 🏃‍♀️💨', text: 'When angels warned Lot’s family to get out of the wicked city of Sodom, they didn\'t say to casually pack their bags. They said, "Escape for thy life; look not behind thee." Sometimes we find ourselves in spiritually dangerous spots—like a toxic group chat, a bad party, or watching a questionable movie. The angels\' advice applies to us, too: don\'t linger or try to compromise. Just get out!', prompt: 'Challenge: Plan your "escape route" today. Decide exactly what you will say or do to gracefully (and quickly!) exit an uncomfortable situation the next time one pops up.', scriptureRef: 'Genesis 19:15-17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/19?lang=eng&id=p15-17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Feb 26', title: 'Eyes Front! 👀➡️', text: 'Lot\'s wife turned into a pillar of salt because she looked back at Sodom. Elder Jeffrey R. Holland taught that she didn\'t just glance; she looked back longingly. She missed the worldly stuff she was leaving behind! When you repent or decide to drop a bad habit, leave it in the past. As a covenant daughter of God, your faith should always point toward your bright future!', prompt: 'Challenge: Unfollow a negative account, delete an app, or let go of a habit that keeps pulling you back to old mistakes. Delete it, and don\'t look back!', scriptureRef: 'Luke 17:32', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/nt/luke/17?lang=eng&id=p32', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Feb 27', title: 'Real Strength 💪', text: 'We usually picture Isaac as a little boy when Abraham took him to Mount Moriah, but historical context suggests he was actually a strong young adult who carried the heavy wood up the mountain himself! He could have easily overpowered his elderly dad, but he willingly submitted to God\'s command. True strength is having the power to do whatever you want, but choosing to follow God\'s will.', prompt: 'Reflection: Think of a time when you really wanted to do things your own way, but you chose to follow the guidance or your parents instead. How did that choice show your spiritual strength?', scriptureRef: 'Genesis 22:6-9', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/22?lang=eng&id=p6-9', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Feb 28', title: 'God Will Provide a Lamb 🐑', text: 'On the way up the mountain, Isaac noticed they had fire and wood, but no animal to sacrifice. Abraham faithfully told his son, "God will provide himself a lamb." God did provide a ram to save Isaac that day, but this was a beautiful foreshadowing of an even greater miracle. Heavenly Father provided His Only Begotten Son, the ultimate "Lamb of God," to step in, take our place, and save us all.', prompt: 'Reflection: Because of Jesus, we don\'t have to carry the heavy weight of our mistakes and sorrows alone. How does knowing Jesus Christ stepped in to take your place change how you view Him?', scriptureRef: 'Genesis 22:7-8', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/22?lang=eng&id=p7-8', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 1', title: 'The Ultimate Love Story ❤️', text: 'The command for Abraham to sacrifice his beloved son is one of the most intense stories in the scriptures. But it was meant to be a "similitude"—a symbol—of Heavenly Father offering His Son, Jesus Christ. Through that agonizing test, Abraham got a tiny glimpse of exactly how much the Father loves us. He loved you enough to let His perfect Son pay the price for your salvation.', prompt: 'Challenge: During the quiet moments of the sacrament today, think about the teamwork between Heavenly Father and Jesus Christ to provide a way back home for you. Say a silent "thank you" for Their perfect love.', scriptureRef: 'Jacob 4:5', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/jacob/4?lang=eng&id=p5', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/09?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'The Proving Ground 🌍', devotionalText: 'Abraham learned that earth is basically a giant proving ground to see if we\'ll follow God\'s commands. In proving us, God also improves us.', 
                hymnTitle: 'Be Still, My Soul', hymnLink: 'https://www.youtube.com/watch?v=cHNT6G9ZKik', hymnAnalysis: 'The devotional reminds us that earth is a "proving ground" where God tests and improves us through extremes and delays. "Be Still, My Soul" is a profound hymn of comfort for the distressed and weary traveler on this proving ground. The lyrics teach that our Heavenly Friend leads us "through thorny ways... to a joyful end." The sweeping, majestic music of Sibelius’s Finlandia evokes the exact feeling of enduring a difficult trial while holding onto the peace that God is ultimately in control.', 
                songTitle: 'Thy Will', songArtist: 'Hillary Scott & The Scott Family', songLink: 'https://www.youtube.com/watch?v=Dp4WC_YZAuw', songAnalysis: 'The devotional teaches that "we are on earth to be proven," and that "in proving us, God also improves us". Hillary Scott\'s beautiful song, "Thy Will," captures the raw emotion of walking through life\'s "dramatic extremes" and "heartbreaking delays". The lyrics express the pain of not understanding why a difficult trial is happening or why a blessing is delayed, yet making the conscious, faithful choice to say, "Thy will be done." This perfectly mirrors Abraham and Sarah\'s journey.' },
            { id: 'tuesday', day: 'Tue', title: 'Is Anything Too Hard? 💪', devotionalText: 'Abraham and Sarah waited decades for their promised son. The Lord asked: "Is any thing too hard for the Lord?" His power is absolute, and His timing is perfect.', 
                hymnTitle: 'Lead, Kindly Light', hymnLink: 'https://www.youtube.com/watch?v=PnIYLEXHeFk', hymnAnalysis: 'Abraham and Sarah had to walk by faith for decades, waiting for the promised son. "Lead, Kindly Light" is the ultimate hymn of trusting God\'s timeline in the dark. The famous plea, "I do not ask to see the distant scene; one step enough for me," perfectly describes the patience required of them. It acknowledges the confusion we sometimes feel while waiting for promises, but affirms a deep trust that God\'s light will lead us exactly where we need to go.', 
                songTitle: 'Haven\'t Seen It Yet', songArtist: 'Danny Gokey', songLink: 'https://www.youtube.com/watch?v=b3zZNfTkLGc', songAnalysis: 'In the devotional we read that "Abraham and Sarah waited decades for the birth of Isaac." Danny Gokey’s song "Haven\'t Seen It Yet" speaks directly to the heart of someone waiting on the Lord. The lyrics validate the struggle of praying for an answer that seems delayed, while powerfully reminding the listener that God is still working behind the scenes. It encourages us to hold on to faith because the breakthrough is coming.' },
            { id: 'wednesday', day: 'Wed', title: 'Flee Without Lingering 🏃‍♂️', devotionalText: 'When the Lord sent angels to destroy the wicked city of Sodom, they provided Lot\'s family a way of escape, urgently commanding them to flee to the mountains and to "look not behind thee."', 
                hymnTitle: 'True to the Faith', hymnLink: 'https://www.youtube.com/watch?v=cAfK7s7FYlE', hymnAnalysis: 'Escaping the influence of a wicked environment like Sodom requires an aggressive, unwavering spiritual defense. "True to the Faith" serves as a martial anthem for this kind of determination. The resolute question in the chorus, "Shall we shrink or shun the fight? No!" mirrors the urgency of the angels\' command to flee. It bolsters our courage to physically and spiritually separate ourselves from compromising situations without hesitation.', 
                songTitle: 'Burn the Ships', songArtist: 'for KING & COUNTRY', songLink: 'https://www.youtube.com/watch?v=UxRG-pIrdnA', songAnalysis: 'The devotional emphasizes the angels\' urgent command to Lot\'s family to "flee to the mountains and to \'look not behind thee.\'" The song "Burn the Ships" is a powerful anthem about making a decisive, permanent break from the past. The phrase "burn the ships" refers to the historical concept of cutting off any route of retreat so that going back to old, destructive ways is no longer an option.' },

                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Soul</h2>
                            <p className="mt-2 text-stone-500 text-sm">Music to invite the Spirit into your daily study.</p>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            
                            <div className="space-y-8">
                                {/* Hymn Section */}
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Hymn Selection
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>

                                <hr className="border-stone-100" />

                                {/* Song Section */}
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Contemporary Song
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full">
                                    <h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1>
                                 </div>
                                 <button 
                                    onClick={() => window.print()} 
                                    className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all"
                                    aria-label="Print Discussion Guide"
                                    title="Print Discussion Guide"
                                >
                                    <IconPrinter className="w-6 h-6" />
                                </button>
                            </div>

                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            
                            {/* --- ADDED IMAGE HERE --- */}
                            <div className="mb-8">
                                <img 
                                    src="Graphic.jpg" 
                                    alt="Infographic: Old Testament" 
                                    className="w-full h-auto rounded-lg shadow-md border border-stone-200"
                                    onError={(e) => {e.target.style.display = 'none'}} 
                                />
                            </div>
                            {/* ------------------------ */}
                            
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    
                                    {section.content && section.content.map((p, i) => (
                                        <p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p>
                                    ))}

                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700">{section.discussionPoint}</p>
                                        </div>
                                    )}

                                    {section.quote && (
                                        <blockquote className="border-l-4 border-stone-300 pl-4 py-1 my-4 text-stone-600 italic bg-stone-50 p-3 rounded-r-lg">
                                            {section.quote}
                                        </blockquote>
                                    )}

                                    {section.question && (
                                        <ToggleAnswer question={section.question} answer={section.answer} />
                                    )}

                                    {section.questions && section.questions.map((qItem, qIdx) => (
                                        <ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // Dynamic Footer based on view
            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    {/* Header */}
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>

                            {/* Main Nav Tabs */}
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Secondary Day Navigation (Horizontal Scroll) - Only show for Daily, Youth, Songs */}
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button
                                            key={d.id}
                                            onClick={() => setActiveDayId(d.id)}
                                            className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}
                                        >
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Content Area - Scrollable */}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>

                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
