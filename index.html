    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEEK_INFO = {
            title: "Let God Prevail",
            dateRange: "March 2 – March 8, 2026",
            valediction: "How can you more fully let God prevail in your life?"
        };

        const DEVOTIONAL_DATA = [
            { id: 'monday', day: 'Mon', fullDay: 'Monday', date: 'Mar 2', title: 'Let God Prevail 🤲', text: 'Jacob\'s name originally meant "supplanter," but God later changed his name to Israel, which means "let God prevail". President Russell M. Nelson taught that to be of Israel means "to let God be the most powerful influence in our lives". God freely offers His covenant blessings to all who turn to Him and let Him prevail, rather than trying to seize or force blessings on our own timeline.', prompt: 'Reflection: In what area of your life do you need to stop forcing your own timeline and truly "let God prevail" today?', scriptureRef: 'Genesis 32:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/32?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'tuesday', day: 'Tue', fullDay: 'Tuesday', date: 'Mar 3', title: 'The Eternal Pattern of Heaven 💍', text: 'Abraham went to great lengths to ensure his son Isaac married within the covenant. President Dieter F. Uchtdorf taught that families are not just a convenient social arrangement, but the "eternal pattern of heaven". God\'s greatest promises to Abraham and Isaac were dependent on a righteous family to carry them forward to bless all the families of the earth.', prompt: 'Challenge: Do one small and simple thing today to strengthen your marriage or a family relationship, showing through your actions that family is eternally important to you.', scriptureRef: 'Genesis 24:60', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/24?lang=eng&id=p60', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'wednesday', day: 'Wed', fullDay: 'Wednesday', date: 'Mar 4', title: 'Trading Birthrights for Soup 🥣', text: 'Esau came from the field hungry and sold his eternal birthright to Jacob for a bowl of red pottage. It is easy to judge him, but we must be careful not to trade our own eternal blessings for worldly "pottage". As President Dallin H. Oaks taught, we cannot serve two masters—we must choose God over the things of the world that offer no eternal nourishment.', prompt: 'Reflection: What modern "pottage" (like wealth, comparison, or temporary comfort) is distracting you from your eternal birthright, and how can you refocus on the Savior today?', scriptureRef: 'Genesis 25:34', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/25?lang=eng&id=p34', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'thursday', day: 'Thu', fullDay: 'Thursday', date: 'Mar 5', title: 'Climbing the Covenant Ladder 🪜', text: 'While resting his head on a pillow of stones, Jacob had a profound dream of a ladder reaching to heaven. President Dieter F. Uchtdorf compared the rungs of this ladder to our covenants. The teachings, ordinances, and covenants of the temple connect heaven and earth, drawing us step-by-step closer to the Lord.', prompt: 'Reflection: Ponder the covenants you have made in the house of the Lord. Which covenant has brought you the most strength or clarity recently?', scriptureRef: 'Genesis 28:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/28?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'friday', day: 'Fri', fullDay: 'Friday', date: 'Mar 6', title: 'Drawing Upon God\'s Power ⚡', text: 'When Jacob awoke from his dream at Bethel, he felt deep reverence for the house of God. President Camille N. Johnson taught that "every man and every woman who participates in priesthood ordinances and who makes and keeps covenants with God has direct access to the power of God". This divine power transforms us, calms us, and gives us confidence in our daily, mortal struggles.', prompt: 'Challenge: Notice a moment today where you feel a sense of calm, patience, or confidence during a stressful situation. Acknowledge it as power drawn from your covenants with God.', scriptureRef: 'Genesis 28:16-17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/28?lang=eng&id=p16-17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'saturday', day: 'Sat', fullDay: 'Saturday', date: 'Mar 7', title: 'The Lord Remembers You 💧', text: 'Both Leah and Rachel experienced deep heartache and long periods of waiting. Yet the scriptures record that God "looked upon [their] affliction" and "remembered" them. In the midst of our own trials, we might feel alone or forgotten, but Heavenly Father is acutely aware of our struggles and remembers us in His perfect time.', prompt: 'Reflection: Think of a time when the Lord sent a tender mercy to show you He "remembered" you during a difficult trial. How can you look for His hand in your life today?', scriptureRef: 'Genesis 30:22', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/30?lang=eng&id=p22', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'sunday', day: 'Sun', fullDay: 'Sunday', date: 'Mar 8', title: 'Healing the Family Divide ❤️‍🩹', text: 'After years of estrangement and fear, Jacob prayed fervently before reuniting with Esau. Instead of reacting with anger, Esau ran to meet him with embraces and tears. Sibling rivalry and family contention are common, but this reunion is a testament that through the Savior, deep familial wounds can be healed and hardened hearts can be softened.', prompt: 'Challenge: If there is a strained relationship in your family, pray sincerely for that person today and ask Heavenly Father to help soften both of your hearts.', scriptureRef: 'Genesis 33:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/33?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' }
        ];

        const YM_DATA = [
             { id: 'monday', day: 'Mon', date: 'Mar 2', title: 'The Ultimate Flex 💪', text: 'Jacob was used to trying to force things to go his way. But during a massive spiritual "wrestle," God changed his name to Israel, which means "let God prevail." President Russell M. Nelson taught that true strength comes when we let God be the most powerful influence in our lives. You don\'t have to force your way to success or stress about controlling everything; true power comes when you let God lead the way.', prompt: 'Challenge: Before making a big decision today (or responding to a tough text), pause and ask yourself, "What choice would let God prevail in this situation?"', scriptureRef: 'Genesis 32:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/32?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 3', title: 'Don\'t Trade Your Birthright for Soup 🍲', text: 'Esau came in from hunting completely starving and literally traded his eternal birthright for a bowl of soup. Crazy, right? But the adversary tries to get us to do the same thing today—trading our spiritual power and covenants for quick, worldly stuff like social media clout, a few minutes of bad media, or fitting in with the crowd. Don\'t trade what you want *most* for what you want *right now*.', prompt: 'Reflection: What is a modern "bowl of soup" that tempts you to compromise your standards, and how can you prepare to say no?', scriptureRef: 'Genesis 25:34', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/25?lang=eng&id=p34', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 4', title: 'Stepping Up to Serve 🐪', text: 'When Abraham\'s servant needed water, Rebekah didn\'t just give him a drink. She offered to draw water for all 10 of his thirsty camels. That is backbreaking work! As a priesthood holder, you are called to be someone who steps up and does the heavy lifting for others. True greatness is found in going the extra mile without being asked.', prompt: 'Challenge: Find someone who needs help today (like your mom carrying groceries, a sibling doing chores, or a friend struggling with homework) and jump in to help without them having to ask.', scriptureRef: 'Genesis 24:19-20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/24?lang=eng&id=p19-20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 5', title: 'Leveling Up 🪜', text: 'Jacob had a dream of a ladder reaching all the way to heaven. Think of your covenants (like baptism, receiving the priesthood, and going to the temple) as the rungs on that ladder. You don\'t have to jump to the top all at once. Taking the sacrament and honoring your priesthood are steps that "level you up" spiritually and connect you directly to God\'s power.', prompt: 'Reflection: Which step or "rung" on the covenant path are you preparing for next, like a mission or the temple? What can you do today to get spiritually ready for it?', scriptureRef: 'Genesis 28:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/28?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 6', title: 'Fixing the Family Drama 🤝', text: 'Jacob and his brother Esau had serious beef—Esau literally wanted to kill him. But years later, after Jacob prayed for help, Esau ran to meet him and they hugged it out. Sibling rivalry is real, but the Savior has the power to heal even the most broken family relationships. You can be the peacemaker in your house.', prompt: 'Challenge: If you\'ve got friction with a brother, sister, or parent right now, pray for them today and be the strong one who offers a kind word or an apology first.', scriptureRef: 'Genesis 33:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/33?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 7', title: 'Conquering the Mountain 🏔️', text: 'Sometimes your problems—like school stress, sports injuries, or loneliness—feel like a massive mountain standing in your way. But the scriptures remind us that God "remembered" Rachel and Leah in their struggles, and He remembers you too. When you face challenges that seem way too big, ask God for help. He sees the trails over the mountain that you can\'t see yet.', prompt: 'Reflection: When a trial feels totally overwhelming, how does knowing that Heavenly Father and Jesus Christ are in your corner change your perspective?', scriptureRef: 'Genesis 30:22', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/30?lang=eng&id=p22', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 8', title: 'Priesthood Power in the Real World ⚡', text: 'When Jacob woke up from his vision at Bethel, he realized how sacred the house of the Lord was and that God was with him. As an Aaronic Priesthood holder, when you prepare or pass the sacrament, you are helping others connect to that same divine presence. The covenants you help administer give you and your ward direct access to Jesus Christ\'s strength to resist temptation and succeed during the week.', prompt: 'Challenge: As you participate in the sacrament ordinance today, focus closely on the words of the prayers. Think about how the Savior\'s strength can specifically help you tackle a goal this week.', scriptureRef: 'Genesis 28:16-17', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/28?lang=eng&id=p16-17', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' }
        ];

        const YW_DATA = [
            { id: 'monday', day: 'Mon', date: 'Mar 2', title: 'Let God Prevail 💖', text: 'Ever feel like you have to compete with everyone else for success or blessings? Jacob used to feel that way too, but then God changed his name to Israel, which means "let God prevail." President Russell M. Nelson teaches that letting God be the most powerful influence in our lives changes everything. You don\'t have to force things to happen on your own timeline; God freely offers His richest blessings when we just trust Him!', prompt: 'Reflection: What is one thing you are stressing over right now that you can hand over to Heavenly Father today and just "let God prevail"?', scriptureRef: 'Genesis 32:28', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/32?lang=eng&id=p28', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'tuesday', day: 'Tue', date: 'Mar 3', title: 'Don\'t Trade Your Birthright for Soup 🍲🙄', text: 'Imagine trading your eternal birthright for a single bowl of soup because you were hungry *right now*. Sounds crazy, right? But Esau did exactly that. Sometimes we do it too, by trading our spiritual power and peace for quick, worldly stuff like social media clout, popularity, or bad media. Don\'t trade what you want *most* for what you want *right now*!', prompt: 'Challenge: What is a modern "bowl of soup" that tempts you to lower your standards? Decide right now how you will say no the next time you face it.', scriptureRef: 'Genesis 25:34', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/25?lang=eng&id=p34', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'wednesday', day: 'Wed', date: 'Mar 4', title: 'The Ultimate Extra Mile 🐪💦', text: 'When Abraham\'s servant asked Rebekah for a drink, she didn\'t just give him water. She drew water for all 10 of his thirsty camels! That is some serious hard work and totally going the extra mile. Rebekah\'s proactive kindness is a superpower we can develop right now, whether it\'s helping at home, at school, or in our Young Women class.', prompt: 'Challenge: Find someone who needs help today (like your mom carrying groceries, a sibling doing chores, or a friend who is feeling down) and jump in to help *before* they even have to ask!', scriptureRef: 'Genesis 24:19-20', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/24?lang=eng&id=p19-20', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'thursday', day: 'Thu', date: 'Mar 5', title: 'Leveling Up Your Covenants 🪜✨', text: 'Jacob had an amazing dream of a ladder reaching all the way to heaven. Think of your covenants—like baptism and going to the temple—as the rungs on that ladder. You don\'t have to jump to the top all at once! President Camille N. Johnson teaches that as covenant women, keeping these promises gives us direct access to God\'s power to calm us, strengthen us, and give us total confidence.', prompt: 'Reflection: Which step or "rung" on the covenant path has brought you the most strength or peace recently?', scriptureRef: 'Genesis 28:12', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/28?lang=eng&id=p12', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'friday', day: 'Fri', date: 'Mar 6', title: 'Fixing the Family Drama 🩹💕', text: 'Jacob and his brother Esau had some major family drama—Esau was super angry at him for years. But after Jacob prayed for help, Esau ran to meet him, and they hugged and cried. Sibling rivalry and family friction happen to all of us, but the Savior can heal even the most broken relationships. You can be the ultimate peacemaker in your home!', prompt: 'Challenge: If things are tense with a sibling or parent right now, pray for them today. Try being the brave one who offers a smile, a compliment, or an apology first.', scriptureRef: 'Genesis 33:4', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/33?lang=eng&id=p4', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'saturday', day: 'Sat', date: 'Mar 7', title: 'You Are Not Forgotten 🏔️👀', text: 'Sometimes your problems—like school stress, friend drama, or loneliness—feel like a massive mountain standing in your way. But the scriptures remind us that God "remembered" Rachel and Leah in their struggles, and He remembers you too. When you face challenges that seem way too big, ask God for help. He sees the whole picture and knows exactly how to guide you through it!', prompt: 'Reflection: Think of a time when the Lord sent a "tender mercy" to show you He remembered you. How can you look for His hand in your life today?', scriptureRef: 'Genesis 30:22', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/30?lang=eng&id=p22', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' },
            { id: 'sunday', day: 'Sun', date: 'Mar 8', title: 'The Ultimate Heart Check 💖🩺', text: 'Jacob "wrestled" spiritually to get a blessing from God, showing he wanted it with all his heart. Elder Ronald M. Barcellos taught that the Savior isn\'t just looking at *what* we do, but *why* we do it—the Lord looks on the heart! He doesn\'t need us to be perfect right now; He just wants us to turn our hearts fully to Him.', prompt: 'Challenge: As you take the sacrament today, think about your motives. Show Heavenly Father you are giving Him your whole heart, and ask Him to help you follow Him out of pure love.', scriptureRef: 'Genesis 32:26', scriptureLink: 'https://www.churchofjesuschrist.org/study/scriptures/ot/gen/32?lang=eng&id=p26', lessonLink: 'https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/10?lang=eng' }
        ];

        const SONGS_DATA = [
            { id: 'monday', day: 'Mon', title: 'Let God Prevail 🤲', devotionalText: 'Jacob\'s name originally meant "supplanter," but God later changed his name to Israel, which means "let God prevail". President Russell M. Nelson taught that to be of Israel means "to let God be the most powerful influence in our lives". God freely offers His covenant blessings to all who turn to Him and let Him prevail, rather than trying to seize or force blessings on our own timeline.', 
                hymnTitle: 'Redeemer of Israel', hymnLink: 'https://www.youtube.com/watch?v=qWv6VlzLmKY', hymnAnalysis: 'When Jacob\'s name was changed to Israel, it marked a monumental shift from relying on his own cunning to relying entirely on the Lord. "Redeemer of Israel" is a triumphant anthem that celebrates what happens when we make this same shift and allow God to prevail in our lives. The lyrics declare that He is "our only delight" and our "shadow by day and our pillar by night." Listening to this joyful, resolute performance helps us feel the strength and deliverance that come when we surrender our will to the Redeemer of Israel, rather than trying to force our own outcomes.' ,
                songTitle: 'Trust In You', songArtist: 'Lauren Daigle', songLink: 'https://www.youtube.com/watch?v=F4dmG9DU_io', songAnalysis: 'The devotional reminds us that letting God prevail means trusting Him "rather than trying to seize or force blessings on our own timeline." Lauren Daigle\'s powerful song "Trust In You" perfectly captures the internal struggle of wanting to force a specific outcome. The lyrics speak openly about moments when God doesn\'t move the mountains we need Him to move or part the waters we wish to walk through. Yet, the song builds to a resolute declaration of choosing to trust Him anyway. It is a deeply moving modern anthem that reinforces the daily challenge of letting go of our own timelines and letting God\'s perfect will prevail.' },
            { id: 'tuesday', day: 'Tue', title: 'The Eternal Pattern of Heaven 💍', devotionalText: 'Abraham went to great lengths to ensure his son Isaac married within the covenant. President Dieter F. Uchtdorf taught that families are not just a convenient social arrangement, but the "eternal pattern of heaven". God\'s greatest promises to Abraham and Isaac were dependent on a righteous family to carry them forward to bless all the families of the earth.', 
                hymnTitle: 'O My Father', hymnLink: 'https://www.youtube.com/watch?v=t6vKDSdgqpk', hymnAnalysis: 'The lengths to which Abraham went to secure a covenant marriage for Isaac underscore that the family is central to the Creator\'s plan. "O My Father" beautifully illustrates why this is the case: the family is the "eternal pattern of heaven." The hymn teaches the profound doctrine that our earthly families are modeled after our heavenly parents, asking, "In the heav\'ns are parents single? No, the thought makes reason stare!" The sweeping, reverent melody deepens our appreciation for the sacredness of family bonds. It elevates marriage and family from a "convenient social arrangement" to a divine institution.' ,
                songTitle: 'I Will Be Here', songArtist: 'Steven Curtis Chapman', songLink: 'https://www.youtube.com/watch?v=Ed6eAXcr-K8', songAnalysis: 'The devotional challenges us to show through our actions that family is eternally important to us. Steven Curtis Chapman\'s classic song "I Will Be Here" is a moving tribute to the enduring nature of true, covenant love. The lyrics celebrate a promise to remain faithful and present through all the changing seasons and trials of life. This beautiful message mirrors the covenant promises made by Abraham and Isaac—promises that look beyond the present moment and stretch into eternity. Listening to this song can inspire us to fulfill the day\'s challenge by committing deeply to our own marriages and families.' },
            { id: 'wednesday', day: 'Wed', title: 'Trading Birthrights for Soup 🥣', devotionalText: 'Esau came from the field hungry and sold his eternal birthright to Jacob for a bowl of red pottage. It is easy to judge him, but we must be careful not to trade our own eternal blessings for worldly "pottage". As President Dallin H. Oaks taught, we cannot serve two masters—we must choose God over the things of the world that offer no eternal nourishment.', 
                hymnTitle: 'Choose the Right', hymnLink: 'https://www.youtube.com/watch?v=gIqKsJ5xG9c', hymnAnalysis: 'Esau\'s story is a tragic example of choosing immediate, temporary gratification over lasting, eternal joy. "Choose the Right" serves as a musical shield against the temptation of worldly pottage. The lyrics urge us to let the Holy Spirit guide us when we are faced with choices between the world and our covenants, promising that "wisdom will point the way." The bright, confident tempo of this hymn energizes our resolve to choose God. It reminds us that there is a "right the Holy Spirit guides" that will always lead us safely past the temporary allure of the world.' ,
                songTitle: 'Give Me Jesus', songArtist: 'Fernando Ortega', songLink: 'https://www.youtube.com/watch?v=4Phmrb8StG8', songAnalysis: 'The devotional warns us not to trade eternal blessings for things "that offer no eternal nourishment." Fernando Ortega\'s hauntingly beautiful rendition of the spiritual "Give Me Jesus" provides a powerful, emotional contrast to Esau\'s short-sightedness. The lyrics simply but repeatedly declare, "You can have all this world, but give me Jesus." While Esau built his momentary happiness on a bowl of soup, this song invites us to prioritize the Savior above all earthly comfort. The stripped-down, reverent tone of the music provides a perfect space for reflection.' },

        // 1. Toast Notification Component
        const Toast = ({ message, show, onClose }) => {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);

            if (!show) return null;

            return (
                <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 animate-bounce toast-notification">
                    <span className="text-green-400">&#10003;</span>
                    {message}
                </div>
            );
        };

                    )}

            };

            const copyToClipboard = (dayData) => {
                const promptParts = dayData.prompt.split(':');
                const promptLabel = promptParts[0];
                const promptText = promptParts.slice(1).join(':').trim();
                const scriptureText = (dayData.scriptureRef && dayData.scriptureLink)
                    ? `Scripture: ${dayData.scriptureRef}\n${dayData.scriptureLink}\n\n`
                    : ""; 

                // Use dayData.date if available, otherwise fallback to empty string or generic
                const dateStr = dayData.date ? dayData.date : "";

                const textToCopy = `✨ Daily Devotional ✨\n\n${dateStr}\n*${dayData.title}*\n\n${dayData.text}\n\n*${promptLabel}:* ${promptText}\n\n${scriptureText}Full Lesson:\n${dayData.lessonLink}`;

                // Modern clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                      navigator.clipboard.writeText(textToCopy).then(() => {
                        setShowToast(true);
                    }).catch(err => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            };

            const fallbackCopy = (text) => {
                 try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    
                    // Avoid scrolling to bottom
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
        
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setShowToast(true);
                 } catch (err) {
                     console.error("Fallback copy failed", err);
                 }
            };

            const renderDevotional = () => {
                const data = getActiveData(DEVOTIONAL_DATA);
                return (
                    <div className="space-y-6 fade-in max-w-2xl mx-auto">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <span className="text-amber-600 text-sm font-bold uppercase tracking-widest">{data.date}</span>
                            <h2 className="text-3xl font-serif font-bold text-stone-800 mt-2 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed text-lg">{data.text}</p>
                            
                            <div className="mt-8 p-5 bg-amber-50 rounded-xl border border-amber-100">
                                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full"></span>
                                    {data.prompt.split(':')[0]}
                                </h3>
                                <p className="text-stone-700 italic">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>

                            <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className="flex items-center justify-center gap-2 bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition">
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>

                            <button 
                                onClick={() => copyToClipboard(data)}
                                className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-amber-600 font-medium flex items-center justify-center gap-2 transition-colors"
                            >
                                <IconShare className="w-4 h-4" /> Share Devotional
                            </button>
                        </div>
                    </div>
                );
            };

            const renderYouth = () => {
                const data = getActiveData(youthGroup === 'ym' ? YM_DATA : YW_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                        {/* Toggle Switch for YM/YW */}
                        <div className="flex justify-center mb-6 bg-stone-200 p-1 rounded-xl inline-flex w-full sm:w-auto mx-auto">
                            <button 
                                onClick={() => setYouthGroup('ym')}
                                className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'ym' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}
                            >
                                Young Men
                            </button>
                            <button 
                                onClick={() => setYouthGroup('yw')}
                                className={`flex-1 sm:flex-none px-8 py-2 rounded-lg font-bold transition-all ${youthGroup === 'yw' ? 'bg-white shadow-sm text-amber-700' : 'text-stone-500 hover:text-stone-700'}`}
                            >
                                Young Women
                            </button>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative overflow-hidden">
                            {/* Decorative Top Border */}
                            <div className={`absolute top-0 left-0 w-full h-2 ${youthGroup === 'ym' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>

                            <h2 className="text-2xl font-serif font-bold text-stone-800 mt-4 mb-4">{data.title}</h2>
                            <p className="text-stone-600 leading-relaxed">{data.text}</p>
                            
                            <div className="mt-6 p-5 bg-stone-50 rounded-xl border border-stone-100">
                                <h3 className="font-bold text-stone-800 mb-2">{data.prompt.split(':')[0]}</h3>
                                <p className="text-stone-600">{data.prompt.split(':').slice(1).join(':')}</p>
                            </div>
                             <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {data.scriptureLink && (
                                    <a href={data.scriptureLink} target="_blank" className={`flex items-center justify-center gap-2 text-white py-3 rounded-lg font-medium transition ${youthGroup === 'ym' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                        <IconBookOpen className="w-4 h-4" /> Read Scripture: {data.scriptureRef}
                                    </a>
                                )}
                                <a href={data.lessonLink} target="_blank" className="flex items-center justify-center gap-2 bg-stone-200 text-stone-700 py-3 rounded-lg font-medium hover:bg-stone-300 transition">
                                    <IconLink className="w-4 h-4" /> Full Lesson
                                </a>
                            </div>
                             <button 
                                onClick={() => copyToClipboard(data)}
                                className="w-full mt-4 py-4 border-t border-stone-100 text-stone-500 hover:text-stone-800 font-medium flex items-center justify-center gap-2 transition-colors"
                            >
                                <IconShare className="w-4 h-4" /> Share Content
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSongs = () => {
                const data = getActiveData(SONGS_DATA);
                return (
                    <div className="fade-in max-w-3xl mx-auto">
                         <div className="text-center bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-6">
                            <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconMusic className="w-6 h-6 text-amber-700" />
                            </div>
                            <h2 className="text-2xl font-serif font-bold text-stone-800">Songs of the Soul</h2>
                            <p className="mt-2 text-stone-500 text-sm">Music to invite the Spirit into your daily study.</p>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h3 className="text-lg font-bold text-stone-400 uppercase tracking-wider mb-4">Daily Selection</h3>
                            <h2 className="text-xl font-bold text-stone-800 mb-2">{data.title}</h2>
                            <p className="text-stone-600 italic mb-8 text-sm border-l-2 border-amber-300 pl-4">{data.devotionalText}</p>
                            
                            <div className="space-y-8">
                                {/* Hymn Section */}
                                <div>
                                    <span className="text-xs font-bold text-amber-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Hymn Selection
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <h3 className="text-xl font-serif font-bold text-stone-800">{data.hymnTitle}</h3>
                                        <a href={data.hymnLink} target="_blank" rel="noopener noreferrer" className="text-amber-600 hover:text-amber-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.hymnAnalysis}</p>
                                </div>

                                <hr className="border-stone-100" />

                                {/* Song Section */}
                                <div>
                                    <span className="text-xs font-bold text-sky-600 tracking-widest uppercase mb-2 block flex items-center gap-2">
                                        <IconMusic className="w-3 h-3" /> Contemporary Song
                                    </span>
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <h3 className="text-xl font-serif font-bold text-stone-800">{data.songTitle}</h3>
                                            <p className="text-xs text-stone-400 mb-2">by {data.songArtist}</p>
                                        </div>
                                        <a href={data.songLink} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:text-sky-700 transition-colors" aria-label="Play Song">
                                            <IconPlayCircle className="w-8 h-8" />
                                        </a>
                                    </div>
                                    <p className="mt-2 text-stone-600 text-sm leading-relaxed">{data.songAnalysis}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                return (
                    <div className="fade-in max-w-6xl mx-auto pb-12">
                         <div id="printable-study-section" className="bg-white p-8 rounded-2xl shadow-sm border border-stone-200 relative">
                            
                            <div className="flex justify-between items-start mb-2">
                                 <div className="w-full">
                                    <h1 className="text-3xl font-serif font-bold text-center text-amber-800">Discussion Guide</h1>
                                 </div>
                                 <button 
                                    onClick={() => window.print()} 
                                    className="no-print absolute top-6 right-6 text-stone-400 hover:text-stone-600 hover:bg-stone-100 p-2 rounded-full transition-all"
                                    aria-label="Print Discussion Guide"
                                    title="Print Discussion Guide"
                                >
                                    <IconPrinter className="w-6 h-6" />
                                </button>
                            </div>

                            <p className="text-center text-stone-500 mb-8 italic">"{WEEK_INFO.title}"</p>
                            
                            {/* --- ADDED IMAGE HERE --- */}
                            <div className="mb-8">
                                <img 
                                    src="Graphic.jpg" 
                                    alt="Infographic: Old Testament" 
                                    className="w-full h-auto rounded-lg shadow-md border border-stone-200"
                                    onError={(e) => {e.target.style.display = 'none'}} 
                                />
                            </div>
                            {/* ------------------------ */}
                            
                            {STUDY_GUIDE_DATA.map((section, idx) => (
                                <div key={idx} className="mb-10 last:mb-0">
                                    <h2 className="text-xl font-bold text-stone-800 mb-3 border-b border-amber-100 pb-2">{section.title}</h2>
                                    
                                    {section.content && section.content.map((p, i) => (
                                        <p key={i} className="text-stone-700 mb-3 leading-relaxed">{p}</p>
                                    ))}

                                    {section.discussionPoint && (
                                        <div className="mb-4">
                                            <h3 className="text-amber-700 font-semibold text-sm uppercase mb-1">Context</h3>
                                            <p className="text-stone-700 whitespace-pre-line">{section.discussionPoint}</p>
                                        </div>
                                    )}

                                    {section.quote && (
                                        <blockquote className="border-l-4 border-stone-300 pl-4 py-1 my-4 text-stone-600 italic bg-stone-50 p-3 rounded-r-lg">
                                            {section.quote}
                                        </blockquote>
                                    )}

                                    {section.question && (
                                        <ToggleAnswer question={section.question} answer={section.answer} />
                                    )}

                                    {section.questions && section.questions.map((qItem, qIdx) => (
                                        <ToggleAnswer key={qIdx} question={qItem.q} answer={qItem.a} />
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // Dynamic Footer based on view
            const renderFooter = () => (
                <footer className="p-6 text-center text-stone-400 text-xs">
                    <p>{WEEK_INFO.valediction}</p>
                </footer>
            );

            return (
                <div className="flex flex-col h-full bg-stone-100">
                    {/* Header */}
                    <header className="bg-white border-b border-stone-200 pt-6 pb-2 px-4 shadow-sm z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase mb-1">Come, Follow Me</h1>
                            <h2 className="text-lg sm:text-xl font-serif font-bold text-stone-800 leading-tight">{WEEK_INFO.title}</h2>
                            <p className="text-stone-500 text-xs mt-1 mb-4">{WEEK_INFO.dateRange}</p>

                            {/* Main Nav Tabs */}
                            <div className="flex justify-center space-x-1 sm:space-x-4 mt-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveTab('devotional')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'devotional' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconSun className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Daily</span>
                                </button>
                                <button onClick={() => setActiveTab('youth')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'youth' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconUsers className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Youth</span>
                                </button>
                                <button onClick={() => setActiveTab('songs')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'songs' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconMusic className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Music</span>
                                </button>
                                <button onClick={() => setActiveTab('study')} className={`flex flex-col sm:flex-row items-center gap-2 px-4 py-2 rounded-xl transition-all ${activeTab === 'study' ? 'bg-amber-50 text-amber-700 ring-1 ring-amber-200' : 'text-stone-400 hover:text-stone-600'}`}>
                                    <IconBookOpen className="w-5 h-5" />
                                    <span className="text-xs sm:text-sm font-medium">Study</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Secondary Day Navigation (Horizontal Scroll) - Only show for Daily, Youth, Songs */}
                    {activeTab !== 'study' && (
                        <div className="bg-white border-b border-stone-200 py-2 px-4 shadow-sm z-10">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex space-x-3 overflow-x-auto hide-scrollbar pb-1 sm:justify-center">
                                    {DEVOTIONAL_DATA.map((d) => (
                                        <button
                                            key={d.id}
                                            onClick={() => setActiveDayId(d.id)}
                                            className={`flex-shrink-0 flex flex-col items-center justify-center w-12 h-14 rounded-lg transition-all border ${activeDayId === d.id ? 'bg-stone-800 text-white border-stone-800 shadow-md transform scale-105' : 'bg-white text-stone-500 border-stone-200 hover:border-stone-300'}`}
                                        >
                                            <span className="text-[10px] font-bold uppercase">{d.day}</span>
                                            <span className={`text-lg font-bold leading-none ${activeDayId === d.id ? 'text-amber-400' : 'text-stone-800'}`}>{d.date.split(' ')[1]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Content Area - Scrollable */}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'devotional' && renderDevotional()}
                        {activeTab === 'youth' && renderYouth()}
                        {activeTab === 'songs' && renderSongs()}
                        {activeTab === 'study' && renderStudy()}
                        {renderFooter()}
                    </main>

                    <Toast message="Copied to Clipboard!" show={showToast} onClose={() => setShowToast(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
